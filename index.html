<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact Home Team — Operations Manual</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   BRAND TOKENS — Impact Home Team
   Primary: Amber #E3A728
   Accent: Crimson #A52325
   Fonts: DM Serif Display / DM Sans
══════════════════════════════════════ */
:root {
  --amber: #E3A728;
  --amber-dark: #C48E1F;
  --amber-light: #F0C35A;
  --amber-pale: #FEF7E0;
  --crimson: #A52325;
  --crimson-light: #C83E40;
  --ink: #1A1A1A;
  --charcoal: #2D2D2D;
  --graphite: #4A4A4A;
  --steel: #7A7A7A;
  --silver: #B0B0B0;
  --fog: #E5E5E5;
  --cloud: #F5F4F1;
  --white: #FFFFFF;
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--cloud);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.7;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 58px; background: var(--ink);
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px; z-index: 200;
  border-bottom: 2px solid var(--amber);
}
.topbar-logo {
  width: 34px; height: 34px; background: var(--amber);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 17px; color: #fff; flex-shrink: 0;
}
.topbar-name { font-family: var(--font-serif); font-size: 16px; color: #fff; }
.topbar-tag {
  font-size: 10px; color: var(--amber); font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: 1px solid var(--amber); border-radius: 20px;
  padding: 2px 9px;
}
.topbar-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.topbar-search {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px; padding: 6px 14px;
  font-family: var(--font-sans); font-size: 13px; color: #fff;
  outline: none; width: 200px; transition: all 0.2s;
}
.topbar-search:focus { background: rgba(255,255,255,0.15); width: 260px; }
.topbar-search::placeholder { color: rgba(255,255,255,0.4); }

/* ── SIDEBAR ── */
.sidebar {
  position: fixed; top: 58px; left: 0; bottom: 0;
  width: 255px; background: var(--white);
  border-right: 1px solid var(--fog);
  overflow-y: auto; z-index: 100;
  scrollbar-width: thin;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--fog); }

.sidebar-section { padding: 14px 0 6px; }
.sidebar-section-header {
  display: flex; align-items: center; gap: 8px;
  padding: 0 18px 6px; cursor: pointer;
  user-select: none;
}
.sidebar-section-header .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sidebar-section-header span {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--steel); flex: 1;
}
.sidebar-section-header .arrow {
  font-size: 11px; color: var(--silver); transition: transform 0.2s;
}
.sidebar-section-header.collapsed .arrow { transform: rotate(-90deg); }

.sidebar-pages { }
.sidebar-pages.hidden { display: none; }

.sidebar-page {
  display: block; padding: 7px 18px 7px 32px;
  font-size: 13px; color: var(--graphite);
  text-decoration: none; cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s; line-height: 1.3;
}
.sidebar-page:hover { background: var(--cloud); color: var(--ink); }
.sidebar-page.active {
  border-left-color: var(--amber);
  background: var(--amber-pale);
  color: var(--ink); font-weight: 600;
}

/* ── MAIN ── */
.main {
  margin-left: 255px;
  padding-top: 58px;
  min-height: 100vh;
}
.content-wrap {
  max-width: 820px;
  padding: 40px 48px 80px;
}

/* ── PAGE HEADER ── */
.page-header {
  border-bottom: 1px solid var(--fog);
  padding-bottom: 24px; margin-bottom: 32px;
}
.page-dept-tag {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 3px 12px;
  border-radius: 20px; margin-bottom: 12px;
}
.page-header h1 {
  font-family: var(--font-serif);
  font-size: 32px; font-weight: 400;
  line-height: 1.2; margin-bottom: 8px;
}
.page-meta {
  font-size: 13px; color: var(--steel);
  display: flex; gap: 20px; flex-wrap: wrap;
}
.page-meta strong { color: var(--graphite); }

/* ── CONTENT ELEMENTS ── */
.prose h2 {
  font-family: var(--font-serif); font-size: 22px; font-weight: 400;
  margin: 36px 0 12px; color: var(--ink);
  padding-bottom: 6px; border-bottom: 1px solid var(--fog);
}
.prose h3 {
  font-size: 15px; font-weight: 700; margin: 24px 0 8px;
  color: var(--charcoal);
}
.prose h4 {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--steel); margin: 20px 0 6px;
}
.prose p { margin-bottom: 14px; }
.prose ul, .prose ol {
  padding-left: 20px; margin-bottom: 14px;
}
.prose li { margin-bottom: 6px; }
.prose strong { font-weight: 600; color: var(--charcoal); }
.prose a { color: var(--amber-dark); text-decoration: none; }
.prose a:hover { text-decoration: underline; }
.prose code {
  background: var(--cloud); border: 1px solid var(--fog);
  border-radius: 4px; padding: 1px 6px;
  font-family: var(--font-mono); font-size: 13px;
}

/* ── CALLOUT BOXES ── */
.callout {
  border-radius: 8px; padding: 16px 20px; margin: 20px 0;
  display: flex; gap: 12px; align-items: flex-start;
}
.callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.callout-body { flex: 1; font-size: 14px; line-height: 1.6; }
.callout-body strong { display: block; margin-bottom: 4px; font-weight: 700; }
.callout.amber {
  background: var(--amber-pale); border-left: 4px solid var(--amber);
}
.callout.crimson {
  background: #FFF0F0; border-left: 4px solid var(--crimson);
}
.callout.green {
  background: #F0FFF4; border-left: 4px solid #16A34A;
}
.callout.blue {
  background: #EFF6FF; border-left: 4px solid #2563EB;
}
.callout.dark {
  background: var(--charcoal); color: #fff; border-left: 4px solid var(--amber);
}
.callout.dark .callout-body strong { color: var(--amber); }

/* ── STEP LIST ── */
.step-list { list-style: none; padding: 0; margin: 16px 0; }
.step-list li {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 12px 0; border-bottom: 1px solid var(--fog);
  font-size: 14px;
}
.step-list li:last-child { border-bottom: none; }
.step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--ink); color: var(--amber);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.step-content { flex: 1; }
.step-content strong { display: block; margin-bottom: 2px; }

/* ── TABLES ── */
.data-table {
  width: 100%; border-collapse: collapse;
  margin: 16px 0; font-size: 14px;
}
.data-table th {
  background: var(--ink); color: #fff;
  padding: 10px 14px; text-align: left;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.data-table th:first-child { border-radius: 8px 0 0 0; }
.data-table th:last-child { border-radius: 0 8px 0 0; }
.data-table td {
  padding: 10px 14px; border-bottom: 1px solid var(--fog);
  vertical-align: top;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:nth-child(even) td { background: var(--cloud); }

/* ── COLOR SWATCH ── */
.swatch-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
.swatch {
  border-radius: 10px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  width: 140px;
}
.swatch-color { height: 70px; }
.swatch-info {
  padding: 10px 12px; background: #fff;
  border: 1px solid var(--fog); border-top: none;
  border-radius: 0 0 10px 10px;
}
.swatch-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.swatch-hex { font-family: var(--font-mono); font-size: 12px; color: var(--steel); }
.swatch-role { font-size: 11px; color: var(--steel); margin-top: 2px; }

/* ── FONT SPECIMEN ── */
.font-spec {
  border: 1px solid var(--fog); border-radius: 10px;
  padding: 20px 22px; margin-bottom: 12px; background: #fff;
}
.font-spec .display { font-size: 28px; margin-bottom: 4px; }
.font-spec .meta { font-size: 12px; color: var(--steel); font-family: var(--font-mono); }
.font-spec .alphabet { font-size: 14px; color: var(--graphite); margin-top: 8px; letter-spacing: 0.03em; }

/* ── LOGO USAGE ── */
.logo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.logo-box {
  border: 1px solid var(--fog); border-radius: 10px;
  overflow: hidden;
}
.logo-preview {
  height: 100px; display: flex; align-items: center; justify-content: center;
}
.logo-label {
  padding: 10px 14px; font-size: 12px; font-weight: 600;
  color: var(--graphite); background: var(--cloud);
  border-top: 1px solid var(--fog);
}
.logo-mark-lg {
  width: 60px; height: 60px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 32px; color: #fff;
}

/* ── CREDIBILITY ELEMENTS ── */
.testimonial {
  background: var(--amber-pale);
  border-left: 4px solid var(--amber);
  border-radius: 0 8px 8px 0;
  padding: 16px 20px; margin: 12px 0;
  font-style: italic; font-size: 15px;
  line-height: 1.6;
}
.testimonial cite {
  display: block; margin-top: 8px;
  font-style: normal; font-size: 13px;
  font-weight: 600; color: var(--graphite);
}

.stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
.stat-box {
  flex: 1; min-width: 130px;
  background: var(--ink); border-radius: 10px;
  padding: 18px 20px; text-align: center;
}
.stat-box .num {
  font-family: var(--font-serif); font-size: 32px;
  color: var(--amber); line-height: 1;
}
.stat-box .label {
  font-size: 12px; color: rgba(255,255,255,0.6);
  margin-top: 4px; font-weight: 500;
}

/* ── WORKFLOW CARD ── */
.workflow-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; padding: 20px; margin: 16px 0;
}
.workflow-card h4 { margin-bottom: 12px; color: var(--amber-dark); font-size: 14px; }

/* ── COMPARISON TABLE ── */
.compare-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
.compare-table th {
  padding: 12px 16px; text-align: center; font-weight: 700; font-size: 13px;
}
.compare-table th:first-child { text-align: left; }
.compare-table th:nth-child(2) { background: var(--amber); color: var(--ink); border-radius: 8px 0 0 0; }
.compare-table th:nth-child(3) { background: var(--fog); color: var(--graphite); border-radius: 0 8px 0 0; }
.compare-table td {
  padding: 10px 16px; border-bottom: 1px solid var(--fog); vertical-align: middle;
}
.compare-table td:nth-child(2) { text-align: center; background: rgba(227,167,40,0.05); }
.compare-table td:nth-child(3) { text-align: center; }
.check { color: #16A34A; font-size: 16px; font-weight: 700; }
.cross { color: #DC2626; font-size: 16px; }

/* ── GHL FIELD ── */
.ghl-field {
  background: var(--cloud); border: 1px solid var(--fog);
  border-radius: 6px; padding: 4px 10px;
  font-family: var(--font-mono); font-size: 13px;
  color: var(--charcoal); display: inline-block;
}

/* ── HOME SCREEN ── */
.home-hero {
  background: var(--ink);
  padding: 48px;
  border-radius: 12px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(227,167,40,0.12) 0%, transparent 60%);
}
.home-hero h1 {
  font-family: var(--font-serif);
  font-size: 38px; font-weight: 400; color: #fff;
  line-height: 1.2; margin-bottom: 10px;
  position: relative;
}
.home-hero h1 span { color: var(--amber); }
.home-hero p {
  color: rgba(255,255,255,0.6); font-size: 16px;
  max-width: 480px; position: relative;
}
.home-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 14px;
  margin-bottom: 28px;
}
.home-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; padding: 20px; cursor: pointer;
  transition: all 0.2s; border-top: 3px solid var(--fog);
}
.home-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
.home-card .dept-dot {
  width: 10px; height: 10px; border-radius: 50%; margin-bottom: 10px;
}
.home-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.home-card p { font-size: 12px; color: var(--steel); }
.home-card .pages-count { font-size: 11px; color: var(--silver); margin-top: 8px; font-weight: 600; }

/* ══════════════════════════════════════
   TRAINING PORTAL & QUIZ ENGINE STYLES
══════════════════════════════════════ */

.tq-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px; margin-top: 4px;
}
.tq-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; padding: 16px 18px;
  cursor: pointer; transition: all 0.15s;
}
.tq-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
.tq-card-dept { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.tq-card-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.3; }
.tq-card-meta { font-size: 11px; color: var(--steel); margin-bottom: 10px; }
.tq-card-cta { font-size: 12px; font-weight: 700; color: var(--amber); }

.qz-progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.qz-progress-bar { flex: 1; height: 6px; background: var(--fog); border-radius: 3px; overflow: hidden; }
.qz-progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.qz-progress-label { font-size: 11px; color: var(--steel); font-weight: 600; white-space: nowrap; }

.qz-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; padding: 24px; margin-bottom: 20px;
}
.qz-q-num { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.qz-q-text { font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.5; margin-bottom: 20px; }

.qz-choices { display: flex; flex-direction: column; gap: 10px; }
.qz-choice {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px; border: 2px solid var(--fog);
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  background: var(--white);
}
.qz-choice:hover { border-color: #d0d0d0; background: var(--cloud); }
.qz-choice.selected { border-color: #7C3AED; background: #F5F3FF; }
.qz-choice-letter {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--fog); display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: var(--steel); flex-shrink: 0;
  transition: all 0.15s;
}
.qz-choice.selected .qz-choice-letter { background: #7C3AED; color: #fff; }
.qz-choice-text { font-size: 14px; color: var(--graphite); line-height: 1.4; }

.qz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.qz-btn {
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  padding: 10px 24px; border-radius: 7px; cursor: pointer;
  border: none; transition: all 0.15s; letter-spacing: .02em;
}
.qz-btn:disabled { opacity: .4; cursor: not-allowed; }
.qz-btn-ghost { background: var(--cloud); color: var(--graphite); border: 1px solid var(--fog); }
.qz-btn-ghost:hover:not(:disabled) { background: var(--fog); }
.qz-btn-next { background: #7C3AED; color: #fff; }
.qz-btn-next:hover:not(:disabled) { background: #6D28D9; }
.qz-btn-submit { background: var(--amber); color: #fff; }
.qz-btn-submit:hover:not(:disabled) { background: var(--amber-dark); }

.qz-result-hero {
  background: var(--white); border: 2px solid; border-radius: 12px;
  padding: 28px; text-align: center; margin-bottom: 8px;
}
.qz-result-pct { font-family: var(--font-serif); font-size: 52px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
.qz-result-msg { font-size: 15px; color: var(--graphite); }

.qz-review { display: flex; flex-direction: column; gap: 10px; }
.qz-review-item {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 8px; padding: 14px 16px;
  border-left: 4px solid;
}
.qz-review-item.correct { border-left-color: #16a34a; }
.qz-review-item.wrong { border-left-color: #dc2626; }
.qz-review-q { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 8px; line-height: 1.4; }
.qz-review-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
.qz-review-badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
.badge-correct { background: #dcfce7; color: #16a34a; }
.badge-wrong { background: #fee2e2; color: #dc2626; }
.qz-review-yours { font-size: 12px; color: var(--steel); }
.qz-review-correct { font-size: 12px; color: #16a34a; font-weight: 600; }
.qz-review-exp { font-size: 12px; color: var(--graphite); font-style: italic; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--fog); }

/* ── PRINT / RESPONSIVE ── */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content-wrap { padding: 28px 20px 60px; }
}

/* ══════════════════════════════════════
   ADMIN PANEL STYLES
══════════════════════════════════════ */
#admin-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  background: var(--cloud);
  overflow: hidden;
  flex-direction: column;
}
#admin-overlay.active { display: flex; }

.adm-topbar {
  height: 54px; background: var(--ink);
  border-bottom: 2px solid var(--amber);
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px; flex-shrink: 0;
}
.adm-logo {
  width: 30px; height: 30px; background: var(--amber);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 15px; color: #fff;
}
.adm-title { font-family: var(--font-serif); font-size: 15px; color: #fff; }
.adm-tag {
  font-size: 9px; color: var(--crimson); font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  border: 1px solid var(--crimson); border-radius: 20px; padding: 2px 8px;
}
.adm-topbar-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.adm-btn {
  font-family: var(--font-sans); font-size: 12px; font-weight: 600;
  padding: 7px 16px; border-radius: 6px; cursor: pointer;
  border: none; transition: all 0.15s; letter-spacing: 0.02em;
}
.adm-btn-ghost { background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2); }
.adm-btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
.adm-btn-amber { background: var(--amber); color: #fff; }
.adm-btn-amber:hover { background: var(--amber-dark); }
.adm-btn-crimson { background: var(--crimson); color: #fff; }
.adm-btn-crimson:hover { background: #8b1e1f; }
.adm-btn-sm { padding: 5px 12px; font-size: 11px; }
.adm-btn-green { background: #16a34a; color: #fff; }
.adm-btn-green:hover { background: #15803d; }

.adm-body {
  display: flex; flex: 1; overflow: hidden;
}

.adm-nav {
  width: 220px; background: var(--white);
  border-right: 1px solid var(--fog);
  overflow-y: auto; flex-shrink: 0;
  display: flex; flex-direction: column;
}
.adm-nav-section {
  padding: 16px 14px 6px;
}
.adm-nav-label {
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--silver); padding: 0 4px;
  margin-bottom: 6px; display: block;
}
.adm-nav-item {
  display: block; padding: 7px 10px; border-radius: 6px;
  font-size: 12px; color: var(--graphite); cursor: pointer;
  text-decoration: none; transition: all 0.12s;
  border: 1px solid transparent;
  margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.adm-nav-item:hover { background: var(--cloud); color: var(--ink); }
.adm-nav-item.active {
  background: var(--amber-pale); color: var(--ink);
  border-color: var(--amber); font-weight: 600;
}
.adm-nav-divider { height: 1px; background: var(--fog); margin: 8px 14px; }

.adm-main {
  flex: 1; overflow-y: auto; padding: 28px 32px;
  background: var(--cloud);
}

.adm-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; margin-bottom: 20px; overflow: hidden;
}
.adm-card-head {
  padding: 14px 18px; border-bottom: 1px solid var(--fog);
  display: flex; align-items: center; gap: 10px;
  background: var(--white);
}
.adm-card-head h3 {
  font-size: 14px; font-weight: 700; color: var(--ink); flex: 1;
}
.adm-card-head .adm-card-sub {
  font-size: 11px; color: var(--steel); font-weight: 400;
}
.adm-card-body { padding: 18px; }

.adm-editor-wrap { position: relative; }
.adm-editor-tabs {
  display: flex; gap: 2px; margin-bottom: 10px;
}
.adm-tab {
  padding: 5px 14px; border-radius: 5px 5px 0 0;
  font-size: 12px; font-weight: 600; cursor: pointer;
  background: var(--fog); color: var(--steel); border: 1px solid var(--fog);
  border-bottom: none; transition: all 0.12s;
}
.adm-tab.active { background: var(--white); color: var(--ink); border-color: var(--fog); }
.adm-editor-panel { display: none; }
.adm-editor-panel.active { display: block; }

.adm-textarea {
  width: 100%; min-height: 320px; font-family: var(--font-mono);
  font-size: 12px; line-height: 1.6; padding: 14px;
  border: 1px solid var(--fog); border-radius: 0 6px 6px 6px;
  background: var(--cloud); color: var(--ink);
  resize: vertical; outline: none;
  transition: border-color 0.15s;
}
.adm-textarea:focus { border-color: var(--amber); }

.adm-preview {
  border: 1px solid var(--fog); border-radius: 0 6px 6px 6px;
  padding: 18px 20px; background: var(--white);
  min-height: 200px; font-size: 14px; line-height: 1.7;
}
.adm-preview h2 { font-family: var(--font-serif); font-size: 20px; margin: 16px 0 8px; }
.adm-preview h3 { font-size: 15px; font-weight: 700; margin: 14px 0 6px; }
.adm-preview p { margin-bottom: 10px; color: var(--graphite); }
.adm-preview ul, .adm-preview ol { padding-left: 20px; margin-bottom: 10px; }
.adm-preview li { margin-bottom: 4px; color: var(--graphite); }
.adm-preview table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.adm-preview table th { background: var(--ink); color: #fff; padding: 8px 10px; text-align: left; }
.adm-preview table td { padding: 7px 10px; border-bottom: 1px solid var(--fog); }
.adm-preview strong { color: var(--ink); }

.adm-editor-actions {
  display: flex; gap: 8px; margin-top: 12px; align-items: center;
}
.adm-save-status {
  font-size: 12px; color: var(--steel); margin-left: 8px;
}
.adm-save-status.saved { color: #16a34a; }
.adm-save-status.unsaved { color: var(--crimson); }

.adm-page-select {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--fog); border-radius: 6px;
  font-family: var(--font-sans); font-size: 13px;
  background: var(--white); color: var(--ink);
  outline: none; margin-bottom: 16px;
  cursor: pointer;
}
.adm-page-select:focus { border-color: var(--amber); }

.adm-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.adm-field { display: flex; flex-direction: column; gap: 4px; }
.adm-field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--steel); }
.adm-input {
  padding: 7px 10px; border: 1px solid var(--fog); border-radius: 6px;
  font-family: var(--font-sans); font-size: 13px; color: var(--ink);
  background: var(--white); outline: none; transition: border-color 0.15s;
}
.adm-input:focus { border-color: var(--amber); }

/* ── QUIZ ADMIN ── */
.adm-quiz-select {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--fog); border-radius: 6px;
  font-family: var(--font-sans); font-size: 13px;
  background: var(--white); color: var(--ink);
  outline: none; cursor: pointer; margin-bottom: 18px;
}
.adm-quiz-select:focus { border-color: var(--amber); }

.adm-q-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 8px; margin-bottom: 10px; overflow: hidden;
  transition: border-color 0.15s;
}
.adm-q-card:hover { border-color: #d0d0d0; }
.adm-q-head {
  padding: 12px 14px; cursor: pointer;
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--white);
}
.adm-q-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--fog); font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  color: var(--steel); flex-shrink: 0; margin-top: 1px;
}
.adm-q-text { font-size: 13px; color: var(--ink); flex: 1; line-height: 1.4; }
.adm-q-meta { font-size: 11px; color: var(--silver); margin-top: 2px; }
.adm-q-toggle { font-size: 12px; color: var(--silver); flex-shrink: 0; margin-top: 3px; }

.adm-q-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--fog); background: #fafafa; }
.adm-q-body.open { display: block; }
.adm-q-field { margin-bottom: 10px; }
.adm-q-field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--steel); margin-bottom: 4px; margin-top: 10px; }
.adm-q-input {
  width: 100%; padding: 7px 10px; border: 1px solid var(--fog);
  border-radius: 5px; font-family: var(--font-sans); font-size: 13px;
  background: var(--white); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.adm-q-input:focus { border-color: var(--amber); }
.adm-q-answer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.adm-q-answer-select {
  width: 100%; padding: 7px 10px; border: 1px solid var(--fog);
  border-radius: 5px; font-size: 13px; font-family: var(--font-sans);
  background: var(--white); color: var(--ink); outline: none; cursor: pointer;
}
.adm-q-actions { display: flex; gap: 8px; margin-top: 12px; }
.adm-btn-danger { background: #FEE2E2; color: var(--crimson); border: 1px solid #FECACA; }
.adm-btn-danger:hover { background: var(--crimson); color: #fff; }

.adm-new-q-form {
  background: var(--amber-pale); border: 1px solid #f0d070;
  border-radius: 8px; padding: 16px; margin-top: 12px;
}
.adm-new-q-form h4 { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 12px; }

.adm-ai-box {
  background: #F0F9FF; border: 1px solid #BAE6FD;
  border-radius: 8px; padding: 16px; margin-top: 6px;
}
.adm-ai-box h4 { font-size: 13px; font-weight: 700; color: #0C4A6E; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.adm-ai-box .adm-ai-note { font-size: 11px; color: #0369A1; margin-bottom: 10px; }
.adm-ai-textarea {
  width: 100%; min-height: 120px; padding: 10px 12px;
  border: 1px solid #BAE6FD; border-radius: 6px;
  font-family: var(--font-sans); font-size: 12px;
  background: var(--white); color: var(--ink);
  resize: vertical; outline: none; margin-bottom: 10px;
}
.adm-ai-textarea:focus { border-color: #38BDF8; }
.adm-ai-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.adm-ai-select {
  padding: 7px 10px; border: 1px solid #BAE6FD; border-radius: 5px;
  font-size: 12px; font-family: var(--font-sans);
  background: var(--white); color: var(--ink); outline: none; cursor: pointer;
}
.adm-ai-status { font-size: 12px; color: #0369A1; font-style: italic; }
.adm-ai-status.error { color: var(--crimson); font-style: normal; }
.adm-ai-status.success { color: #16a34a; font-style: normal; }

.adm-export-box {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 8px; overflow: hidden; margin-bottom: 14px;
}
.adm-export-head {
  padding: 12px 16px; background: var(--ink); color: #fff;
  display: flex; align-items: center; justify-content: space-between;
}
.adm-export-head span { font-size: 13px; font-weight: 600; }
.adm-export-textarea {
  width: 100%; height: 220px; padding: 12px 14px;
  font-family: var(--font-mono); font-size: 11px; line-height: 1.5;
  border: none; background: #1e1e1e; color: #d4d4d4;
  resize: none; outline: none;
}

.adm-login {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; background: var(--cloud); gap: 16px;
}
.adm-login-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 12px; padding: 36px 40px; width: 340px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.adm-login-logo {
  width: 44px; height: 44px; background: var(--amber);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 22px; color: #fff;
  margin: 0 auto 16px;
}
.adm-login-card h2 {
  font-family: var(--font-serif); font-size: 22px; text-align: center;
  color: var(--ink); margin-bottom: 4px;
}
.adm-login-card p { font-size: 13px; color: var(--steel); text-align: center; margin-bottom: 20px; }
.adm-login-input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--fog);
  border-radius: 7px; font-family: var(--font-sans); font-size: 14px;
  color: var(--ink); background: var(--cloud); outline: none;
  transition: border-color 0.15s; margin-bottom: 12px;
}
.adm-login-input:focus { border-color: var(--amber); background: var(--white); }
.adm-login-btn {
  width: 100%; padding: 11px; background: var(--amber); color: #fff;
  border: none; border-radius: 7px; font-family: var(--font-sans);
  font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s;
}
.adm-login-btn:hover { background: var(--amber-dark); }
.adm-login-error { font-size: 12px; color: var(--crimson); text-align: center; display: none; }

.adm-toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 2000;
  background: var(--ink); color: #fff; padding: 12px 20px;
  border-radius: 8px; font-size: 13px; font-weight: 600;
  border-left: 3px solid var(--amber);
  opacity: 0; transform: translateY(10px);
  transition: all 0.3s; pointer-events: none;
}
.adm-toast.show { opacity: 1; transform: translateY(0); }
.adm-toast.success { border-left-color: #16a34a; }
.adm-toast.error { border-left-color: var(--crimson); }

.adm-stat-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.adm-stat {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 20px; padding: 5px 14px;
  font-size: 12px; color: var(--graphite);
}
.adm-stat strong { color: var(--ink); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo" ondblclick="openAdminLogin()" title="Double-click for admin">I</div>
  <div class="topbar-name">Impact Home Team</div>
  <div class="topbar-tag">Operations Manual</div>
  <div class="topbar-right">
    <input class="topbar-search" type="text" placeholder="Search manual..." id="search-input" oninput="handleSearch(this.value)">
  </div>
</div>

<!-- ══════════════════════════════════════
     ADMIN OVERLAY
══════════════════════════════════════ -->
<div id="admin-overlay">

  <!-- LOGIN SCREEN -->
  <div id="adm-login-screen" class="adm-login">
    <div class="adm-login-card">
      <div class="adm-login-logo">I</div>
      <h2>Admin Panel</h2>
      <p>Impact Home Team · Operations Manual</p>
      <input class="adm-login-input" type="password" id="adm-pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')admLogin()">
      <button class="adm-login-btn" onclick="admLogin()">Sign In</button>
      <div class="adm-login-error" id="adm-login-error">Incorrect password. Try again.</div>
      <div style="margin-top:14px;text-align:center;">
        <span style="font-size:12px;color:var(--silver);cursor:pointer;" onclick="closeAdmin()">&#x2190; Back to manual</span>
      </div>
    </div>
  </div>

  <!-- ADMIN MAIN (shown after login) -->
  <div id="adm-main-screen" style="display:none;flex-direction:column;flex:1;overflow:hidden;">

    <!-- Admin topbar -->
    <div class="adm-topbar">
      <div class="adm-logo">I</div>
      <div class="adm-title">Admin Panel</div>
      <div class="adm-tag">&#x2699; Internal Only</div>
      <div class="adm-topbar-right">
        <button class="adm-btn adm-btn-ghost adm-btn-sm" onclick="admNav('export')">Export</button>
        <button class="adm-btn adm-btn-amber adm-btn-sm" onclick="admSaveAll()">Save All Changes</button>
        <button class="adm-btn adm-btn-ghost adm-btn-sm" onclick="closeAdmin()">&#x2715; Close</button>
      </div>
    </div>

    <div class="adm-body">

      <!-- Admin sidebar -->
      <div class="adm-nav" id="adm-nav">
        <div class="adm-nav-section">
          <span class="adm-nav-label">Content Editor</span>
          <div class="adm-nav-item" id="adm-nav-content" onclick="admNav('content')">&#x1F4C4; Page Content</div>
        </div>
        <div class="adm-nav-divider"></div>
        <div class="adm-nav-section">
          <span class="adm-nav-label">Quiz Manager</span>
          <div class="adm-nav-item" id="adm-nav-quizzes" onclick="admNav('quizzes')">&#x1F4DD; Quiz Questions</div>
          <div class="adm-nav-item" id="adm-nav-aigen" onclick="admNav('aigen')">&#x2728; AI Generator</div>
        </div>
        <div class="adm-nav-divider"></div>
        <div class="adm-nav-section">
          <span class="adm-nav-label">System</span>
          <div class="adm-nav-item" id="adm-nav-export" onclick="admNav('export')">&#x1F4E4; Export / Sync</div>
        </div>
      </div>

      <!-- Admin content panels -->
      <div class="adm-main" id="adm-content-area">
        <!-- filled by JS -->
      </div>

    </div><!-- end adm-body -->
  </div><!-- end adm-main-screen -->

</div><!-- end admin-overlay -->

<!-- Toast notification -->
<div class="adm-toast" id="adm-toast"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="content-wrap" id="content-area"></div>
</div>

<script src="app.js"></script>
</body>
</html>
