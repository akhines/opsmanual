<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact Home Team — Operations Manual</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   BRAND TOKENS — Impact Home Team
   Primary: Amber #E3A728
   Accent: Crimson #A52325
   Fonts: DM Serif Display / DM Sans
══════════════════════════════════════ */
:root {
  --amber: #E3A728;
  --amber-dark: #C48E1F;
  --amber-light: #F0C35A;
  --amber-pale: #FEF7E0;
  --crimson: #A52325;
  --crimson-light: #C83E40;
  --ink: #1A1A1A;
  --charcoal: #2D2D2D;
  --graphite: #4A4A4A;
  --steel: #7A7A7A;
  --silver: #B0B0B0;
  --fog: #E5E5E5;
  --cloud: #F5F4F1;
  --white: #FFFFFF;
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--cloud);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.7;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 58px; background: var(--ink);
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px; z-index: 200;
  border-bottom: 2px solid var(--amber);
}
.topbar-logo {
  width: 34px; height: 34px; background: var(--amber);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 17px; color: #fff; flex-shrink: 0;
}
.topbar-name { font-family: var(--font-serif); font-size: 16px; color: #fff; }
.topbar-tag {
  font-size: 10px; color: var(--amber); font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: 1px solid var(--amber); border-radius: 20px;
  padding: 2px 9px;
}
.topbar-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.topbar-search {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px; padding: 6px 14px;
  font-family: var(--font-sans); font-size: 13px; color: #fff;
  outline: none; width: 200px; transition: all 0.2s;
}
.topbar-search:focus { background: rgba(255,255,255,0.15); width: 260px; }
.topbar-search::placeholder { color: rgba(255,255,255,0.4); }

/* ── SIDEBAR ── */
.sidebar {
  position: fixed; top: 58px; left: 0; bottom: 0;
  width: 255px; background: var(--white);
  border-right: 1px solid var(--fog);
  overflow-y: auto; z-index: 100;
  scrollbar-width: thin;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--fog); }

.sidebar-section { padding: 14px 0 6px; }
.sidebar-section-header {
  display: flex; align-items: center; gap: 8px;
  padding: 0 18px 6px; cursor: pointer;
  user-select: none;
}
.sidebar-section-header .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sidebar-section-header span {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--steel); flex: 1;
}
.sidebar-section-header .arrow {
  font-size: 11px; color: var(--silver); transition: transform 0.2s;
}
.sidebar-section-header.collapsed .arrow { transform: rotate(-90deg); }

.sidebar-pages { }
.sidebar-pages.hidden { display: none; }

.sidebar-page {
  display: block; padding: 7px 18px 7px 32px;
  font-size: 13px; color: var(--graphite);
  text-decoration: none; cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s; line-height: 1.3;
}
.sidebar-page:hover { background: var(--cloud); color: var(--ink); }
.sidebar-page.active {
  border-left-color: var(--amber);
  background: var(--amber-pale);
  color: var(--ink); font-weight: 600;
}

/* ── MAIN ── */
.main {
  margin-left: 255px;
  padding-top: 58px;
  min-height: 100vh;
}
.content-wrap {
  max-width: 820px;
  padding: 40px 48px 80px;
}

/* ── PAGE HEADER ── */
.page-header {
  border-bottom: 1px solid var(--fog);
  padding-bottom: 24px; margin-bottom: 32px;
}
.page-dept-tag {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 3px 12px;
  border-radius: 20px; margin-bottom: 12px;
}
.page-header h1 {
  font-family: var(--font-serif);
  font-size: 32px; font-weight: 400;
  line-height: 1.2; margin-bottom: 8px;
}
.page-meta {
  font-size: 13px; color: var(--steel);
  display: flex; gap: 20px; flex-wrap: wrap;
}
.page-meta strong { color: var(--graphite); }

/* ── CONTENT ELEMENTS ── */
.prose h2 {
  font-family: var(--font-serif); font-size: 22px; font-weight: 400;
  margin: 36px 0 12px; color: var(--ink);
  padding-bottom: 6px; border-bottom: 1px solid var(--fog);
}
.prose h3 {
  font-size: 15px; font-weight: 700; margin: 24px 0 8px;
  color: var(--charcoal);
}
.prose h4 {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--steel); margin: 20px 0 6px;
}
.prose p { margin-bottom: 14px; }
.prose ul, .prose ol {
  padding-left: 20px; margin-bottom: 14px;
}
.prose li { margin-bottom: 6px; }
.prose strong { font-weight: 600; color: var(--charcoal); }
.prose a { color: var(--amber-dark); text-decoration: none; }
.prose a:hover { text-decoration: underline; }
.prose code {
  background: var(--cloud); border: 1px solid var(--fog);
  border-radius: 4px; padding: 1px 6px;
  font-family: var(--font-mono); font-size: 13px;
}

/* ── CALLOUT BOXES ── */
.callout {
  border-radius: 8px; padding: 16px 20px; margin: 20px 0;
  display: flex; gap: 12px; align-items: flex-start;
}
.callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.callout-body { flex: 1; font-size: 14px; line-height: 1.6; }
.callout-body strong { display: block; margin-bottom: 4px; font-weight: 700; }
.callout.amber {
  background: var(--amber-pale); border-left: 4px solid var(--amber);
}
.callout.crimson {
  background: #FFF0F0; border-left: 4px solid var(--crimson);
}
.callout.green {
  background: #F0FFF4; border-left: 4px solid #16A34A;
}
.callout.blue {
  background: #EFF6FF; border-left: 4px solid #2563EB;
}
.callout.dark {
  background: var(--charcoal); color: #fff; border-left: 4px solid var(--amber);
}
.callout.dark .callout-body strong { color: var(--amber); }

/* ── STEP LIST ── */
.step-list { list-style: none; padding: 0; margin: 16px 0; }
.step-list li {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 12px 0; border-bottom: 1px solid var(--fog);
  font-size: 14px;
}
.step-list li:last-child { border-bottom: none; }
.step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--ink); color: var(--amber);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.step-content { flex: 1; }
.step-content strong { display: block; margin-bottom: 2px; }

/* ── TABLES ── */
.data-table {
  width: 100%; border-collapse: collapse;
  margin: 16px 0; font-size: 14px;
}
.data-table th {
  background: var(--ink); color: #fff;
  padding: 10px 14px; text-align: left;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.data-table th:first-child { border-radius: 8px 0 0 0; }
.data-table th:last-child { border-radius: 0 8px 0 0; }
.data-table td {
  padding: 10px 14px; border-bottom: 1px solid var(--fog);
  vertical-align: top;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:nth-child(even) td { background: var(--cloud); }

/* ── COLOR SWATCH ── */
.swatch-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
.swatch {
  border-radius: 10px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  width: 140px;
}
.swatch-color { height: 70px; }
.swatch-info {
  padding: 10px 12px; background: #fff;
  border: 1px solid var(--fog); border-top: none;
  border-radius: 0 0 10px 10px;
}
.swatch-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.swatch-hex { font-family: var(--font-mono); font-size: 12px; color: var(--steel); }
.swatch-role { font-size: 11px; color: var(--steel); margin-top: 2px; }

/* ── FONT SPECIMEN ── */
.font-spec {
  border: 1px solid var(--fog); border-radius: 10px;
  padding: 20px 22px; margin-bottom: 12px; background: #fff;
}
.font-spec .display { font-size: 28px; margin-bottom: 4px; }
.font-spec .meta { font-size: 12px; color: var(--steel); font-family: var(--font-mono); }
.font-spec .alphabet { font-size: 14px; color: var(--graphite); margin-top: 8px; letter-spacing: 0.03em; }

/* ── LOGO USAGE ── */
.logo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.logo-box {
  border: 1px solid var(--fog); border-radius: 10px;
  overflow: hidden;
}
.logo-preview {
  height: 100px; display: flex; align-items: center; justify-content: center;
}
.logo-label {
  padding: 10px 14px; font-size: 12px; font-weight: 600;
  color: var(--graphite); background: var(--cloud);
  border-top: 1px solid var(--fog);
}
.logo-mark-lg {
  width: 60px; height: 60px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 32px; color: #fff;
}

/* ── CREDIBILITY ELEMENTS ── */
.testimonial {
  background: var(--amber-pale);
  border-left: 4px solid var(--amber);
  border-radius: 0 8px 8px 0;
  padding: 16px 20px; margin: 12px 0;
  font-style: italic; font-size: 15px;
  line-height: 1.6;
}
.testimonial cite {
  display: block; margin-top: 8px;
  font-style: normal; font-size: 13px;
  font-weight: 600; color: var(--graphite);
}

.stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
.stat-box {
  flex: 1; min-width: 130px;
  background: var(--ink); border-radius: 10px;
  padding: 18px 20px; text-align: center;
}
.stat-box .num {
  font-family: var(--font-serif); font-size: 32px;
  color: var(--amber); line-height: 1;
}
.stat-box .label {
  font-size: 12px; color: rgba(255,255,255,0.6);
  margin-top: 4px; font-weight: 500;
}

/* ── WORKFLOW CARD ── */
.workflow-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; padding: 20px; margin: 16px 0;
}
.workflow-card h4 { margin-bottom: 12px; color: var(--amber-dark); font-size: 14px; }

/* ── COMPARISON TABLE ── */
.compare-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
.compare-table th {
  padding: 12px 16px; text-align: center; font-weight: 700; font-size: 13px;
}
.compare-table th:first-child { text-align: left; }
.compare-table th:nth-child(2) { background: var(--amber); color: var(--ink); border-radius: 8px 0 0 0; }
.compare-table th:nth-child(3) { background: var(--fog); color: var(--graphite); border-radius: 0 8px 0 0; }
.compare-table td {
  padding: 10px 16px; border-bottom: 1px solid var(--fog); vertical-align: middle;
}
.compare-table td:nth-child(2) { text-align: center; background: rgba(227,167,40,0.05); }
.compare-table td:nth-child(3) { text-align: center; }
.check { color: #16A34A; font-size: 16px; font-weight: 700; }
.cross { color: #DC2626; font-size: 16px; }

/* ── GHL FIELD ── */
.ghl-field {
  background: var(--cloud); border: 1px solid var(--fog);
  border-radius: 6px; padding: 4px 10px;
  font-family: var(--font-mono); font-size: 13px;
  color: var(--charcoal); display: inline-block;
}

/* ── HOME SCREEN ── */
.home-hero {
  background: var(--ink);
  padding: 48px;
  border-radius: 12px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(227,167,40,0.12) 0%, transparent 60%);
}
.home-hero h1 {
  font-family: var(--font-serif);
  font-size: 38px; font-weight: 400; color: #fff;
  line-height: 1.2; margin-bottom: 10px;
  position: relative;
}
.home-hero h1 span { color: var(--amber); }
.home-hero p {
  color: rgba(255,255,255,0.6); font-size: 16px;
  max-width: 480px; position: relative;
}
.home-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 14px;
  margin-bottom: 28px;
}
.home-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; padding: 20px; cursor: pointer;
  transition: all 0.2s; border-top: 3px solid var(--fog);
}
.home-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
.home-card .dept-dot {
  width: 10px; height: 10px; border-radius: 50%; margin-bottom: 10px;
}
.home-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.home-card p { font-size: 12px; color: var(--steel); }
.home-card .pages-count { font-size: 11px; color: var(--silver); margin-top: 8px; font-weight: 600; }

/* ══════════════════════════════════════
   TRAINING PORTAL & QUIZ ENGINE STYLES
══════════════════════════════════════ */

/* Training home grid */
.tq-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px; margin-top: 4px;
}
.tq-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; padding: 16px 18px;
  cursor: pointer; transition: all 0.15s;
}
.tq-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
.tq-card-dept { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.tq-card-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.3; }
.tq-card-meta { font-size: 11px; color: var(--steel); margin-bottom: 10px; }
.tq-card-cta { font-size: 12px; font-weight: 700; color: var(--amber); }

/* Progress bar */
.qz-progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.qz-progress-bar { flex: 1; height: 6px; background: var(--fog); border-radius: 3px; overflow: hidden; }
.qz-progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.qz-progress-label { font-size: 11px; color: var(--steel); font-weight: 600; white-space: nowrap; }

/* Quiz card */
.qz-card {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 10px; padding: 24px; margin-bottom: 20px;
}
.qz-q-num { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.qz-q-text { font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.5; margin-bottom: 20px; }

/* Choices */
.qz-choices { display: flex; flex-direction: column; gap: 10px; }
.qz-choice {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px; border: 2px solid var(--fog);
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  background: var(--white);
}
.qz-choice:hover { border-color: #d0d0d0; background: var(--cloud); }
.qz-choice.selected { border-color: #7C3AED; background: #F5F3FF; }
.qz-choice-letter {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--fog); display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: var(--steel); flex-shrink: 0;
  transition: all 0.15s;
}
.qz-choice.selected .qz-choice-letter { background: #7C3AED; color: #fff; }
.qz-choice-text { font-size: 14px; color: var(--graphite); line-height: 1.4; }

/* Nav buttons */
.qz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.qz-btn {
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  padding: 10px 24px; border-radius: 7px; cursor: pointer;
  border: none; transition: all 0.15s; letter-spacing: .02em;
}
.qz-btn:disabled { opacity: .4; cursor: not-allowed; }
.qz-btn-ghost { background: var(--cloud); color: var(--graphite); border: 1px solid var(--fog); }
.qz-btn-ghost:hover:not(:disabled) { background: var(--fog); }
.qz-btn-next { background: #7C3AED; color: #fff; }
.qz-btn-next:hover:not(:disabled) { background: #6D28D9; }
.qz-btn-submit { background: var(--amber); color: #fff; }
.qz-btn-submit:hover:not(:disabled) { background: var(--amber-dark); }

/* Results */
.qz-result-hero {
  background: var(--white); border: 2px solid; border-radius: 12px;
  padding: 28px; text-align: center; margin-bottom: 8px;
}
.qz-result-pct { font-family: var(--font-serif); font-size: 52px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
.qz-result-msg { font-size: 15px; color: var(--graphite); }

/* Review */
.qz-review { display: flex; flex-direction: column; gap: 10px; }
.qz-review-item {
  background: var(--white); border: 1px solid var(--fog);
  border-radius: 8px; padding: 14px 16px;
  border-left: 4px solid;
}
.qz-review-item.correct { border-left-color: #16a34a; }
.qz-review-item.wrong { border-left-color: #dc2626; }
.qz-review-q { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 8px; line-height: 1.4; }
.qz-review-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
.qz-review-badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
.badge-correct { background: #dcfce7; color: #16a34a; }
.badge-wrong { background: #fee2e2; color: #dc2626; }
.qz-review-yours { font-size: 12px; color: var(--steel); }
.qz-review-correct { font-size: 12px; color: #16a34a; font-weight: 600; }
.qz-review-exp { font-size: 12px; color: var(--graphite); font-style: italic; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--fog); }

/* ── TIMELINE ── */
.timeline { display: flex; flex-direction: column; gap: 0; margin: 16px 0; position: relative; }
.timeline::before { content: ''; position: absolute; left: 10px; top: 6px; bottom: 6px; width: 2px; background: var(--fog); }
.tl-item { display: flex; gap: 16px; align-items: flex-start; padding: 8px 0; position: relative; }
.tl-dot { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; border: 3px solid var(--white); box-shadow: 0 0 0 2px var(--fog); z-index: 1; margin-top: 2px; }
.tl-content { flex: 1; background: var(--white); border: 1px solid var(--fog); border-radius: 8px; padding: 10px 14px; }
.tl-time { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--steel); margin-bottom: 2px; }
.tl-label { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.tl-msg { font-size: 13px; color: var(--graphite); font-style: italic; line-height: 1.5; }

/* ── PRINT / RESPONSIVE ── */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content-wrap { padding: 28px 20px 60px; }
}

/* ══════════════════════════════════════
   ADMIN PANEL STYLES
══════════════════════════════════════ */
#admin-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  background: var(--cloud);
  overflow: hidden;
  flex-direction: column;
}
#admin-overlay.active { display: flex; }

/* Admin topbar */
.adm-topbar {
  height: 54px; background: var(--ink);
  border-bottom: 2px solid var(--amber);
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px; flex-shrink: 0;
}
.adm-logo {
  width: 30px; height: 30px; background: var(--amber);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 15px; color: #fff;
}
.adm-title { font-family: var(--font-serif); font-size: 15px; color: #fff; }
.adm-tag {
  font-size: 9px; color: var(--crimson); font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  border: 1px solid var(--crimson); border-radius: 20px; padding: 2px 8px;
}

<h2>Deal Lifecycle — Pipeline Stages & Definitions</h2>

<h2>Tasks in GHL — Why They Matter</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Ashley Hines</span></div>


<div class="callout crimson">
  <div class="callout-icon">⚠️</div>
  <div class="callout-body"><strong>Every open follow-up must have a task in GHL. If it's not a task, it doesn't exist.</strong></div>
</div>
<h2>When to Create a Task</h2>
<ul>
  <li>Any time you tell a seller "I'll call you back"</li>
  <li>Any time a lead needs action but isn't ready to move pipeline stages</li>
  <li>Any time a lead is assigned to another team member</li>
</ul>
<h2>How to Create a Task</h2>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content">Open the contact or opportunity in GHL.</div></li>
  <li><div class="step-num">2</div><div class="step-content">Click <strong>"Add Task"</strong> in the activity section.</div></li>
  <li><div class="step-num">3</div><div class="step-content">Fill in: <strong>Title</strong> (specific action — not just "call back"), <strong>Due Date</strong> (exact date), <strong>Assigned To</strong> (person responsible), <strong>Notes</strong> (context for next action).</div></li>
  <li><div class="step-num">4</div><div class="step-content">Save the task.</div></li>
</ol>
<div class="callout amber">
  <div class="callout-icon">📋</div>
  <div class="callout-body">Tasks get completed or rescheduled — never ignored. Mark a task done only after you have actually done the work.</div>
</div>
<p>A task in GHL is a scheduled action tied to a contact or deal. Tasks are how the system tells you that something needs to happen — a callback, a follow-up, a document request, a check-in with title. If a task is sitting open and overdue, work is not moving. Checking your task list is not optional — it is how you run your day.</p>

<div class="callout crimson">
  <div class="callout-icon">⚠️</div>
  <div class="callout-body"><strong>An overdue task = a dropped ball.</strong> GHL workflows create tasks automatically at key trigger points. If you are not clearing your task list daily, leads are going cold, deals are stalling, and deadlines are being missed — even if you don't realize it yet.</div>
</div>

<h2>Where to Find Your Tasks</h2>
<p>There are three ways to access your tasks in GHL:</p>
<ol class="step-list">
  <li>
    <div class="step-num">1</div>
    <div class="step-content">
      <strong>Task List (All Tasks)</strong> — <span class="ghl-field">Contacts → Tasks</span> in the left sidebar. This shows every open task across all contacts in the account. Filter by assignee to see only yours. This is your daily dashboard.
    </div>
  </li>
  <li>
    <div class="step-num">2</div>
    <div class="step-content">
      <strong>On a Contact Record</strong> — Open any contact and scroll to the <span class="ghl-field">Tasks</span> tab on the right panel. Tasks attached to that specific contact appear here. Use this when you're already working a lead and need to see what's scheduled next.
    </div>
  </li>
  <li>
    <div class="step-num">3</div>
    <div class="step-content">
      <strong>On an Opportunity Card</strong> — Open a deal in any pipeline and look for the Tasks section. Deals in the TC pipeline will have tasks tied directly to the closing checklist steps.
    </div>
  </li>
</ol>

<h2>How to Work Your Task List</h2>
<ol class="step-list">
  <li>
    <div class="step-num">1</div>
    <div class="step-content"><strong>Open Contacts → Tasks.</strong> Filter by your name using the Assignee dropdown. Sort by Due Date ascending — oldest tasks first.</div>
  </li>
  <li>
    <div class="step-num">2</div>
    <div class="step-content"><strong>Click a task title</strong> to open it. Read the task description — this tells you exactly what needs to happen. The linked contact or deal is clickable directly from the task.</div>
  </li>
  <li>
    <div class="step-num">3</div>
    <div class="step-content"><strong>Complete the action</strong> described in the task — make the call, send the text, check the document, update the field. Do not mark the task complete before doing the actual work.</div>
  </li>
  <li>
    <div class="step-num">4</div>
    <div class="step-content"><strong>Log a note</strong> on the contact record summarizing what happened. One sentence is fine: "Called seller, confirmed closing date still on track for [date]."</div>
  </li>
  <li>
    <div class="step-num">5</div>
    <div class="step-content"><strong>Mark the task complete</strong> using the checkbox. This triggers any downstream automation connected to task completion — do not skip this step.</div>
  </li>
  <li>
    <div class="step-num">6</div>
    <div class="step-content"><strong>Create the next task if needed.</strong> If the action requires a follow-up (no answer, waiting on title, needs a callback in 48 hours), create a new task immediately before moving on. Never leave a contact without a next scheduled action unless the deal is dead or closed.</div>
  </li>
</ol>

<h2>How Tasks Are Created</h2>
<table class="data-table">
  <tr><th>Source</th><th>How It Works</th></tr>
  <tr><td><strong>GHL Workflows</strong></td><td>Most tasks are created automatically when a trigger fires — appointment booked, stage changed, contract signed, etc. You don't create these; you just work them.</td></tr>
  <tr><td><strong>Manual Creation</strong></td><td>You create a task manually when something needs to happen that isn't already automated — a specific follow-up, a custom deadline, a reminder you set for yourself. Use the <span class="ghl-field">+ Add Task</span> button on the contact record or from the Tasks list page.</td></tr>
  <tr><td><strong>Recurring Tasks</strong></td><td>Some tasks repeat on a schedule (weekly check-ins, monthly nurture). These are set up in workflows and will auto-regenerate after each completion.</td></tr>
</table>

<h2>Task Fields — What to Fill In</h2>
<table class="data-table">
  <tr><th>Field</th><th>Required?</th><th>Notes</th></tr>
  <tr><td><span class="ghl-field">Title</span></td><td>Yes</td><td>Be specific. "Call seller" is weak. "Call seller — confirm inspection access for Tuesday" is useful.</td></tr>
  <tr><td><span class="ghl-field">Description</span></td><td>Recommended</td><td>Add context so anyone picking up the task knows what to do. Include scripts, links, or instructions if needed.</td></tr>
  <tr><td><span class="ghl-field">Due Date + Time</span></td><td>Yes</td><td>Always set a specific due date. Tasks without due dates don't show up in daily views and get forgotten.</td></tr>
  <tr><td><span class="ghl-field">Assignee</span></td><td>Yes</td><td>Assign to the correct team member. Unassigned tasks fall through the cracks. If it's yours, assign it to yourself.</td></tr>
  <tr><td><span class="ghl-field">Contact Link</span></td><td>When applicable</td><td>Attach the task to the contact it's about. This keeps the contact record complete and makes tasks searchable by contact.</td></tr>
</table>

<h2>Rules for Tasks at IHT</h2>
<div class="callout amber">
  <div class="callout-icon">📋</div>
  <div class="callout-body">
    <ul style="margin:0;padding-left:18px;font-size:13px;line-height:2;">
      <li><strong>Check your task list every morning before doing anything else.</strong> Start with overdue tasks first.</li>
      <li><strong>Never leave a live lead or active deal without a next task.</strong> If there's no task, no one knows who owns the next action.</li>
      <li><strong>Do not mark tasks complete without doing the work.</strong> This breaks downstream automations and misleads the team on deal status.</li>
      <li><strong>If a task was created by automation and doesn't apply</strong> (duplicate, timing wrong, deal changed) — delete it and add a note explaining why.</li>
      <li><strong>If you can't complete a task on time</strong>, reschedule it immediately with a note. Do not let tasks go overdue and sit untouched.</li>
    </ul>
  </div>
</div>

<h2>Troubleshooting</h2>
<table class="data-table">
  <tr><th>Problem</th><th>What to Check</th></tr>
  <tr><td>Task was not created when it should have been</td><td>Check that the contact's pipeline stage and tags are correct — workflow task triggers depend on these. If stage and tags are right, post in <strong>#[property-address]</strong> and tag Ashley.</td></tr>
  <tr><td>Task is assigned to the wrong person</td><td>Edit the assignee directly on the task. No need to delete and recreate.</td></tr>
  <tr><td>Task keeps reappearing after completion</td><td>It's a recurring task set up in a workflow. Complete it each time it appears — this is intentional.</td></tr>
  <tr><td>Can't find a task that should be there</td><td>Check your assignee filter — it may be assigned to someone else or sitting unassigned. Also check the contact record directly.</td></tr>
</table>
` },
      { id: 'pipeline-handoffs', title: 'Department Handoff Triggers', dept: 'All Departments', owner: 'Ashley / Joshua',

<h2>Department Handoff Triggers</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Ashley / Joshua</span></div>

<p>Every handoff between departments requires a specific trigger, a completed checklist, a pipeline move, and a Slack post. Handoffs that skip any of these steps create gaps — deals get missed, TC rejects files, and closers miss appointments.</p>


<h2>Lead Handoff Protocol — Follower Role</h2>
<p>When a lead transfers to a new owner, the previous owner stays on the contact as a <strong>Follower</strong> — visible and notified, but not responsible.</p>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content">Update <span class="ghl-field">Assigned To</span> → new owner's name.</div></li>
  <li><div class="step-num">2</div><div class="step-content">Add previous owner under <strong>Followers</strong> on the contact card.</div></li>
  <li><div class="step-num">3</div><div class="step-content">Add a note: <code>[MM/DD/YY] — Lead transferred to [Name]. [Brief reason.]</code></div></li>
</ol>
<div class="callout blue">
  <div class="callout-icon">ℹ</div>
  <div class="callout-body">The new owner is responsible from this point forward. The follower observes and can assist if the seller references a prior conversation, but does not take independent action.</div>
</div>

</div>
<p><strong>Pipeline movement:</strong> Move the opportunity to <span class="ghl-field">5) Transaction Coordination</span> → <span class="ghl-field" style="background:#d4edda;color:#155724;">New Deal!</span> stage. <strong>Set opportunity status to Won before moving.</strong></p>

      { id: 'calling-system', title: 'Lead Calling System — Overview', dept: 'Lead Management', owner: 'Ashley Hines',
        content: `
<h2>Lead Calling System — Overview</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Ashley Hines</span></div>

<p>Every active lead in the pipeline has one rule: it must always have a <strong>Next Contact Date</strong> set. That single field drives every call task automatically. No manual task creation. No wondering what to call next. The date fires the task. The task fires the call.</p>

<div class="callout amber">
  <div class="callout-icon">🎯</div>
  <div class="callout-body"><strong>Core rule: No interaction ends without setting Next Contact Date.</strong> Call, text, voicemail — doesn't matter. Before you close the record, set the next date. That's it.</div>
</div>

<h2>How It Works</h2>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content"><strong>Set Next Contact Date</strong> after every interaction. Pick the date the lead should be called next.</div></li>
  <li><div class="step-num">2</div><div class="step-content"><strong>At 8:00 AM daily,</strong> GHL finds all leads with Next Contact Date = today, applies the <span class="ghl-field">powerdialer</span> tag, and creates a call task automatically.</div></li>
  <li><div class="step-num">3</div><div class="step-content"><strong>At 8:05 AM,</strong> the Overdue Rescue workflow catches any lead whose Next Contact Date passed without a call — resurfaces it with an ⚠️ prefix and increments the missed call counter.</div></li>
  <li><div class="step-num">4</div><div class="step-content"><strong>Nicole opens GHL → Contacts → filter tag: <span class="ghl-field">powerdialer</span>.</strong> That is the full calling list. Nothing else.</div></li>
  <li><div class="step-num">5</div><div class="step-content"><strong>After each call, Nicole sets Last Contact Outcome.</strong> The outcome workflow routes the lead, resets the tag, and queues the next task automatically.</div></li>
</ol>

<h2>Active Stages</h2>
<p>This system covers these four stages only. All other stages are excluded from the workflows.</p>
<table class="data-table">
  <tr><th>Stage</th><th>Priority</th><th>Missed Call Threshold</th></tr>
  <tr><td><span class="ghl-field">Prospects</span></td><td>Tier 2 — same day, 3 attempts</td><td>3 missed → move to Follow Up</td></tr>
  <tr><td><span class="ghl-field">Redzones</span></td><td>Tier 1 — daily</td><td>3 missed → Slack alert to Ashley, no auto-move</td></tr>
  <tr><td><span class="ghl-field">Priority Top 20%</span></td><td>Tier 1 — daily</td><td>3 missed → move to Redzones</td></tr>
  <tr><td><span class="ghl-field">Follow Up</span></td><td>Tier 3 — per task date</td><td>5 missed → FU-LongTerm nurture</td></tr>
</table>

<h2>Custom Fields — Create First</h2>
<p>Go to <strong>Settings → Custom Fields → Contacts</strong> and create all four before building any workflow.</p>
<table class="data-table">
  <tr><th>Field Name</th><th>Type</th><th>Notes</th></tr>
  <tr><td><span class="ghl-field">Next Contact Date</span></td><td>Date</td><td>Set after every interaction. Drives all task creation.</td></tr>
  <tr><td><span class="ghl-field">Last Contact Outcome</span></td><td>Dropdown</td><td>Values: No Answer / Left Voicemail / Spoke — Not Qualified / Spoke — Follow Up Set / Spoke — Appointment Booked / Wrong Number / Bad Contact</td></tr>
  <tr><td><span class="ghl-field">Missed Call Count</span></td><td>Number</td><td>Auto-incremented by workflows. Starts at 0.</td></tr>
  <tr><td><span class="ghl-field">Last Contact Date</span></td><td>Date</td><td>Auto-stamped on task completion.</td></tr>
</table>

<h2>Tags — Create Before Building Workflows</h2>
<p>Go to <strong>Settings → Tags</strong> and create each of these exactly as written:</p>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 4px;">
  <span class="ghl-field" style="background:#FEF3C7;color:#92400E;padding:4px 12px;border-radius:5px;">powerdialer</span>
  <span class="ghl-field" style="background:#FEE2E2;color:#991B1B;padding:4px 12px;border-radius:5px;">vm-sent</span>
  <span class="ghl-field" style="background:#DBEAFE;color:#1D4ED8;padding:4px 12px;border-radius:5px;">same-day-callback</span>
  <span class="ghl-field" style="background:#D1FAE5;color:#065F46;padding:4px 12px;border-radius:5px;">re-engaged</span>
  <span class="ghl-field" style="background:#F3F4F6;color:#374151;padding:4px 12px;border-radius:5px;">FU-LongTerm</span>
</div>

<h2>Workflow Build Order</h2>
<table class="data-table">
  <tr><th>#</th><th>Workflow Name</th><th>Purpose</th></tr>
  <tr><td>1</td><td>IHT — New Lead First Contact</td><td>Fires immediately on new Prospects entry</td></tr>
  <tr><td>2</td><td>IHT — Morning Power Dialer Queue</td><td>Creates today's tasks at 8:00 AM</td></tr>
  <tr><td>3</td><td>IHT — Overdue Call Rescue</td><td>Resurfaces missed calls at 8:05 AM</td></tr>
  <tr><td>4</td><td>IHT — Call Outcome Router</td><td>Routes lead after each completed task</td></tr>

  <tr><td>7</td><td>IHT — Nurture Re-Engagement</td><td>Pulls nurture leads back when they reply</td></tr>
</table>
` },

      { id: 'calling-workflows', title: 'Lead Calling Workflows — GHL Build Guide', dept: 'Lead Management', owner: 'Ashley Hines',
        content: `
<h2>Lead Calling Workflows — GHL Build Guide</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Ashley Hines</span></div>

<div class="callout blue">
  <div class="callout-icon">ℹ</div>
  <div class="callout-body"><strong>Copy-paste ready.</strong> Every field name, tag, stage name, and message below is the exact text to enter in GHL. Build in numbered order.</div>
</div>

<h2>Step 1 — Create Custom Fields</h2>
<p>Go to <strong>Settings → Custom Fields → Contacts → Add Field</strong> for each row below. These must exist before any workflow is built.</p>
<table class="data-table">
  <tr><th>Field Label (copy exactly)</th><th>Field Type</th><th>Dropdown Values (if applicable)</th></tr>
  <tr>
    <td><span class="ghl-field">Next Contact Date</span></td>
    <td>Date</td>
    <td>—</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Last Contact Outcome</span></td>
    <td>Dropdown</td>
    <td>
      No Answer<br>
      Left Voicemail<br>
      Spoke — Not Qualified<br>
      Spoke — Follow Up Set<br>
      Spoke — Appointment Booked<br>
      Wrong Number / Bad Contact
    </td>
  </tr>
  <tr>
    <td><span class="ghl-field">Missed Call Count</span></td>
    <td>Number</td>
    <td>—</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Last Contact Date</span></td>
    <td>Date</td>
    <td>—</td>
  </tr>
</table>

<h2>Step 2 — Create Tags</h2>
<p>Go to <strong>Settings → Tags → Add Tag</strong>. Copy each tag name exactly — spelling and capitalization must match what is used in the workflows below.</p>
<table class="data-table">
  <tr><th>Tag Name (copy exactly)</th><th>Purpose</th></tr>
  <tr><td><span class="ghl-field">powerdialer</span></td><td>Applied to every lead with a call due today. Nicole filters by this tag to get her daily list.</td></tr>
  <tr><td><span class="ghl-field">vm-sent</span></td><td>Applied after a voicemail is left. Prevents duplicate VMs on the same attempt cycle.</td></tr>
  <tr><td><span class="ghl-field">same-day-callback</span></td><td>Applied manually by Nicole when a lead needs a same-day callback outside of the morning queue.</td></tr>
  <tr><td><span class="ghl-field">re-engaged</span></td><td>Applied when a long-term nurture lead replies to a message. Triggers re-entry into the active calling system.</td></tr>
  <tr><td><span class="ghl-field">FU-LongTerm</span></td><td>Applied when a lead has exhausted the active calling cycle and moves to the long-term drip sequence.</td></tr>
</table>

<div class="callout amber">
  <div class="callout-icon">⚠️</div>
  <div class="callout-body"><strong>Do not start building workflows until all fields and tags above are created.</strong> Workflows reference these by name — if the name doesn't match exactly, the condition will not fire.</div>
</div>

<h2>Step 3 — Build Workflows</h2>
<p>Build in the numbered order below. Each workflow may reference triggers or tags set by a previous one.</p>

<style>
.wf-block{background:var(--white);border:1px solid var(--fog);border-radius:10px;margin:24px 0;overflow:hidden;}
.wf-head{background:var(--ink);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;}
.wf-num{width:28px;height:28px;border-radius:50%;background:var(--amber);color:var(--ink);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wf-title{font-family:var(--font-serif);font-size:15px;font-weight:700;}
.wf-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.wf-body{padding:18px 20px;}
.wf-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--amber-dark);margin:16px 0 8px;display:flex;align-items:center;gap:6px;}
.wf-label::after{content:'';flex:1;height:1px;background:var(--fog);}
.cb{background:var(--cloud);border:1px solid var(--fog);border-radius:6px;padding:10px 14px;font-family:var(--font-mono);font-size:12px;line-height:1.9;margin:6px 0;}
.cb .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);display:block;margin-bottom:2px;font-family:var(--font-sans);}
.cv{color:var(--ink);font-weight:600;}
.branch{border-left:3px solid var(--amber);padding:10px 0 10px 14px;margin:10px 0;}
.branch-if{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--amber-dark);margin-bottom:6px;}
.branch ul{padding-left:16px;font-size:13px;line-height:2.1;margin:0;}
.wf-note{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;padding:10px 14px;font-size:12px;color:#1E40AF;margin:8px 0;}
.sp{display:inline-block;background:var(--cloud);border:1px solid var(--fog);border-radius:4px;padding:1px 8px;font-family:var(--font-mono);font-size:11px;color:var(--charcoal);}
</style>

<!-- WF 1 -->
<div class="wf-block">
<div class="wf-head"><div class="wf-num">1</div><div><div class="wf-title">IHT — New Lead First Contact</div><div class="wf-sub">Fires immediately when a new lead enters Prospects</div></div></div>
<div class="wf-body">
  <div class="wf-label">Trigger</div>
  <div class="cb"><span class="lbl">Trigger Type</span><span class="cv">Pipeline Stage Changed</span><br><span class="lbl">Pipeline</span><span class="cv">1) Leads</span><br><span class="lbl">Stage</span><span class="cv">Prospects</span></div>
  <div class="wf-label">Filters — ALL must be true</div>
  <div class="cb"><span class="lbl">Filter 1</span><span class="cv">Contact Created Date is within last 60 minutes</span></div>
  <div class="wf-note">Prevents this from firing when a lead is manually moved back to Prospects. Only new entries trigger it.</div>
  <div class="wf-label">Actions — in this exact order</div>
  <div class="cb"><span class="lbl">Action 1 — Update Field</span>Field: <span class="cv">Next Contact Date</span><br>Value: <span class="cv">{{now}} (today)</span></div>
  <div class="cb"><span class="lbl">Action 2 — Add Tag</span>Tag: <span class="cv">powerdialer</span></div>
  <div class="cb"><span class="lbl">Action 3 — Create Task</span>Title: <span class="cv">🆕 NEW LEAD — Call {{contact.first_name}} {{contact.last_name}} — {{contact.pipeline_stage}}</span><br>Due Date: <span class="cv">Today</span><br>Assigned To: <span class="cv">{{contact.assigned_user}}</span><br>Description: <span class="cv">New lead — first contact. Source: {{contact.lead_source}}</span></div>
</div>
</div>

<!-- WF 2 -->
<div class="wf-block">
<div class="wf-head"><div class="wf-num">2</div><div><div class="wf-title">IHT — Morning Power Dialer Queue</div><div class="wf-sub">Runs at 8:00 AM daily — tags and tasks every lead due today</div></div></div>
<div class="wf-body">
  <div class="wf-label">Trigger</div>
  <div class="cb"><span class="lbl">Trigger Type</span><span class="cv">Date/Time</span><br><span class="lbl">Field</span><span class="cv">Next Contact Date</span><br><span class="lbl">Condition</span><span class="cv">On date (same day)</span><br><span class="lbl">Time</span><span class="cv">8:00 AM</span></div>
  <div class="wf-label">Filters — ALL must be true</div>
  <div class="cb"><span class="lbl">Filter 1</span><span class="cv">Pipeline Stage is: Prospects</span> OR <span class="cv">Redzones</span> OR <span class="cv">Priority Top 20%</span> OR <span class="cv">Follow Up</span><br><span class="lbl">Filter 2</span><span class="cv">Tags does not contain: FU-LongTerm</span><br><span class="lbl">Filter 3</span><span class="cv">Next Contact Date is set</span></div>
  <div class="wf-note">Scope is limited to the four active stages only. All AI stages, Not MD Lead, and DNC are excluded by the stage filter.</div>
  <div class="wf-label">Actions — in this exact order</div>
  <div class="cb"><span class="lbl">Action 1 — Add Tag</span>Tag: <span class="cv">powerdialer</span></div>
  <div class="cb"><span class="lbl">Action 2 — Remove Tag</span>Tag: <span class="cv">same-day-callback</span></div>
  <div class="cb"><span class="lbl">Action 3 — Create Task</span>Title: <span class="cv">Call — {{contact.pipeline_stage}} — {{contact.first_name}} {{contact.last_name}}</span><br>Due Date: <span class="cv">Today</span><br>Assigned To: <span class="cv">{{contact.assigned_user}}</span><br>Description: <span class="cv">Last outcome: {{contact.last_contact_outcome}} | Missed calls: {{contact.missed_call_count}}</span></div>
  <div class="cb"><span class="lbl">Action 4 — Update Field</span>Field: <span class="cv">Last Contact Date</span><br>Value: <span class="cv">{{now}}</span></div>
</div>
</div>

<!-- WF 3 -->
<div class="wf-block">
<div class="wf-head"><div class="wf-num">3</div><div><div class="wf-title">IHT — Overdue Call Rescue</div><div class="wf-sub">Runs at 8:05 AM — resurfaces any call missed yesterday or earlier</div></div></div>
<div class="wf-body">
  <div class="wf-label">Trigger</div>
  <div class="cb"><span class="lbl">Trigger Type</span><span class="cv">Date/Time</span><br><span class="lbl">Field</span><span class="cv">Next Contact Date</span><br><span class="lbl">Condition</span><span class="cv">Date has passed (before today)</span><br><span class="lbl">Time</span><span class="cv">8:05 AM</span></div>
  <div class="wf-note">Runs 5 minutes after WF2. Fresh tasks fire first — overdue tasks don't compete at the same second.</div>
  <div class="wf-label">Filters — ALL must be true</div>
  <div class="cb"><span class="lbl">Filter 1</span><span class="cv">Next Contact Date is before: today</span><br><span class="lbl">Filter 2</span><span class="cv">Tags does not contain: powerdialer</span><br><span class="lbl">Filter 3</span><span class="cv">Tags does not contain: FU-LongTerm</span><br><span class="lbl">Filter 4</span><span class="cv">Pipeline Stage is: Prospects</span> OR <span class="cv">Redzones</span> OR <span class="cv">Priority Top 20%</span> OR <span class="cv">Follow Up</span></div>
  <div class="wf-label">Actions — in this exact order</div>
  <div class="cb"><span class="lbl">Action 1 — Remove Task</span>Remove all open Call tasks on this contact</div>
  <div class="cb"><span class="lbl">Action 2 — Add Tag</span>Tag: <span class="cv">powerdialer</span></div>
  <div class="cb"><span class="lbl">Action 3 — Math Operation</span>Field: <span class="cv">Missed Call Count</span><br>Operation: <span class="cv">Add</span><br>Value: <span class="cv">1</span></div>
  <div class="cb"><span class="lbl">Action 4 — Update Field</span>Field: <span class="cv">Next Contact Date</span><br>Value: <span class="cv">Today {{now}}</span></div>
  <div class="cb"><span class="lbl">Action 5 — Create Task</span>Title: <span class="cv">⚠️ OVERDUE — Call {{contact.pipeline_stage}} — {{contact.first_name}} {{contact.last_name}}</span><br>Due Date: <span class="cv">Today</span><br>Assigned To: <span class="cv">{{contact.assigned_user}}</span><br>Description: <span class="cv">Missed call count: {{contact.missed_call_count}} | Last outcome: {{contact.last_contact_outcome}}</span></div>
  <div class="wf-label">Action 6 — If/Else Branches</div>

  <div class="branch">
    <div class="branch-if">Branch A — IF Missed Call Count ≥ 3 AND Stage = Prospects</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition 1</span><span class="cv">Missed Call Count is greater than or equal to: 3</span><br><span class="lbl">Condition 2</span><span class="cv">Pipeline Stage is: Prospects</span></div>
    <ul>
      <li>Change Pipeline Stage → <span class="sp">Follow Up</span></li>
      <li>Update Field: Next Contact Date → <span class="cv">+3 days</span></li>
      <li>Update Field: Missed Call Count → <span class="cv">0</span></li>
      <li>Remove Tag: <span class="cv">powerdialer</span></li>
      <li>Send Internal Notification → Channel: <span class="cv">#impact-lead-management</span><br>Message: <span class="cv">{{contact.first_name}} {{contact.last_name}} moved to Follow Up after 3 missed calls. Phone: {{contact.phone}}</span></li>
    </ul>
  </div>

  <div class="branch">
    <div class="branch-if">Branch B — ELSE IF Missed Call Count ≥ 5 AND Stage = Follow Up</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition 1</span><span class="cv">Missed Call Count is greater than or equal to: 5</span><br><span class="lbl">Condition 2</span><span class="cv">Pipeline Stage is: Follow Up</span></div>
    <ul>
      <li>Add Tag: <span class="cv">FU-LongTerm</span></li>
      <li>Remove Tag: <span class="cv">powerdialer</span></li>
      <li>Update Field: Next Contact Date → <span class="cv">clear / blank</span></li>
      <li>Update Field: Missed Call Count → <span class="cv">0</span></li>
      <li>Enroll in Workflow: <span class="cv">IHT — Long-Term Nurture Enrollment</span></li>
      <li>Send Internal Notification → Channel: <span class="cv">#impact-lead-management</span><br>Message: <span class="cv">{{contact.first_name}} {{contact.last_name}} moved to long-term nurture after 5 missed follow-up calls.</span></li>
    </ul>
  </div>

  <div class="branch">
    <div class="branch-if">Branch C — ELSE IF Missed Call Count ≥ 3 AND Stage = Redzones</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition 1</span><span class="cv">Missed Call Count is greater than or equal to: 3</span><br><span class="lbl">Condition 2</span><span class="cv">Pipeline Stage is: Redzones</span></div>
    <ul>
      <li><strong>Do NOT change stage</strong> — human decision required</li>
      <li>Send Internal Notification → Channel: <span class="cv">#impact-lead-management</span> (tag Ashley AND Nicole)<br>Message: <span class="cv">⚠️ REDZONE ALERT: {{contact.first_name}} {{contact.last_name}} has {{contact.missed_call_count}} missed calls. Manual review needed. Phone: {{contact.phone}}</span></li>
    </ul>
  </div>

  <div class="branch">
    <div class="branch-if">Branch D — ELSE IF Missed Call Count ≥ 3 AND Stage = Priority Top 20%</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition 1</span><span class="cv">Missed Call Count is greater than or equal to: 3</span><br><span class="lbl">Condition 2</span><span class="cv">Pipeline Stage is: Priority Top 20%</span></div>
    <ul>
      <li>Change Pipeline Stage → <span class="sp">Redzones</span></li>
      <li>Update Field: Missed Call Count → <span class="cv">0</span></li>
      <li>Remove Tag: <span class="cv">powerdialer</span></li>
      <li>Send Internal Notification → Channel: <span class="cv">#impact-lead-management</span><br>Message: <span class="cv">{{contact.first_name}} {{contact.last_name}} moved from Priority to Redzones after 3 missed calls.</span></li>
    </ul>
  </div>

  <div class="branch" style="border-left-color:var(--fog);">
    <div class="branch-if" style="color:var(--steel);">Branch E — ELSE (threshold not hit yet)</div>
    <ul>
      <li>No stage change</li>
      <li>Task stays with ⚠️ OVERDUE prefix</li>
      <li>Contact remains tagged <span class="cv">powerdialer</span></li>
    </ul>
  </div>
</div>
</div>

<!-- WF 4 -->
<div class="wf-block">
<div class="wf-head"><div class="wf-num">4</div><div><div class="wf-title">IHT — Call Outcome Router</div><div class="wf-sub">Fires when a call task is marked complete — routes the lead based on outcome</div></div></div>
<div class="wf-body">
  <div class="wf-label">Trigger</div>
  <div class="cb"><span class="lbl">Trigger Type</span><span class="cv">Task Status Changed</span><br><span class="lbl">Condition</span><span class="cv">Task status changed to: Completed</span><br><span class="lbl">Filter</span><span class="cv">Task title contains: Call —</span><br><span class="lbl">Filter (OR)</span><span class="cv">Task title contains: OVERDUE</span><br><span class="lbl">Filter (OR)</span><span class="cv">Task title contains: Re-dial</span></div>
  <div class="wf-note">Nicole must select Last Contact Outcome from the dropdown before or immediately after marking the task complete. That field drives the branch below.</div>
  <div class="wf-label">Branches — on Last Contact Outcome</div>

  <div class="branch">
    <div class="branch-if">Branch A — No Answer</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition</span><span class="cv">Last Contact Outcome is: No Answer</span></div>
    <p style="font-size:12px;color:var(--steel);margin:0 0 6px;">Sub-branch by stage:</p>
    <div style="margin-left:10px;">
      <div class="branch" style="border-left-color:#E3A728;">
        <div class="branch-if" style="color:var(--amber-dark);">Stage = Redzones OR Priority Top 20%</div>
        <ul>
          <li>Keep tag: <span class="cv">powerdialer</span> (stay on today's list for re-dial)</li>
          <li>Create Task:<br>Title: <span class="cv">Re-dial — {{contact.first_name}} {{contact.last_name}}</span><br>Due: <span class="cv">Today</span><br>Assigned To: <span class="cv">{{contact.assigned_user}}</span></li>
          <li>Send SMS: <span class="cv">Hi {{contact.first_name}}, this is [Agent Name] with Impact Home Team. I tried reaching you about your property — I'll try again shortly or feel free to text me back here.</span></li>
          <li>Update Field: Last Contact Date → <span class="cv">today</span></li>
        </ul>
      </div>
      <div class="branch" style="border-left-color:#2563EB;">
        <div class="branch-if" style="color:#1D4ED8;">Stage = Prospects</div>
        <ul>
          <li>Remove Tag: <span class="cv">powerdialer</span></li>
          <li>Math: Missed Call Count <span class="cv">+ 1</span></li>
          <li>Update Field: Next Contact Date → <span class="cv">+1 day</span></li>
          <li>Update Field: Last Contact Date → <span class="cv">today</span></li>
        </ul>
      </div>
      <div class="branch" style="border-left-color:#7C3AED;">
        <div class="branch-if" style="color:#5B21B6;">Stage = Follow Up</div>
        <ul>
          <li>Remove Tag: <span class="cv">powerdialer</span></li>
          <li>Math: Missed Call Count <span class="cv">+ 1</span></li>
          <li>Update Field: Next Contact Date → <span class="cv">+2 days</span></li>
          <li>Update Field: Last Contact Date → <span class="cv">today</span></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="branch">
    <div class="branch-if">Branch B — Left Voicemail</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition</span><span class="cv">Last Contact Outcome is: Left Voicemail</span></div>
    <ul>
      <li>Remove Tag: <span class="cv">powerdialer</span></li>
      <li>Add Tag: <span class="cv">vm-sent</span></li>
      <li>Math: Missed Call Count <span class="cv">+ 1</span></li>
      <li>Update Field: Next Contact Date → <span class="cv">+1 day</span></li>
      <li>Update Field: Last Contact Date → <span class="cv">today</span></li>
      <li>Wait: <span class="cv">4 hours</span></li>
      <li>Send SMS (only if Missed Call Count ≥ 2): <span class="cv">Hi {{contact.first_name}}, left you a voicemail earlier about your property at {{contact.address}}. Feel free to text me back here whenever works.</span></li>
      <li>Remove Tag: <span class="cv">vm-sent</span> (after SMS sends)</li>
    </ul>
  </div>

  <div class="branch">
    <div class="branch-if">Branch C — Spoke, Not Qualified</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition</span><span class="cv">Last Contact Outcome is: Spoke — Not Qualified</span></div>
    <ul>
      <li>Remove Tags: <span class="cv">powerdialer</span>, <span class="cv">vm-sent</span></li>
      <li>Update Field: Missed Call Count → <span class="cv">0</span></li>
      <li>Change Pipeline Stage → <span class="sp">Follow Up</span></li>
      <li>Update Field: Next Contact Date → <span class="cv">+14 days</span></li>
      <li>Update Field: Last Contact Date → <span class="cv">today</span></li>
      <li>Send Internal Notification → Channel: <span class="cv">#impact-lead-management</span><br>Message: <span class="cv">{{contact.first_name}} {{contact.last_name}} — spoke, not qualified. Moved to Follow Up. Next contact in 14 days.</span></li>
    </ul>
    <div class="wf-note">Adjust Next Contact Date manually if the seller gave a specific timeframe.</div>
  </div>

  <div class="branch">
    <div class="branch-if">Branch D — Spoke, Follow Up Set</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition</span><span class="cv">Last Contact Outcome is: Spoke — Follow Up Set</span></div>
    <ul>
      <li>Remove Tags: <span class="cv">powerdialer</span>, <span class="cv">vm-sent</span></li>
      <li>Update Field: Missed Call Count → <span class="cv">0</span></li>
      <li>Update Field: Last Contact Date → <span class="cv">today</span></li>
      <li><strong>Next Contact Date: set manually by Nicole</strong> based on what the seller requested before closing the record</li>
    </ul>
    <div class="wf-note">No auto-date on this branch. The seller gave a specific time. Nicole sets it before closing. The morning workflow re-tags powerdialer on that date automatically.</div>
  </div>

  <div class="branch">
    <div class="branch-if">Branch E — Spoke, Appointment Booked</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition</span><span class="cv">Last Contact Outcome is: Spoke — Appointment Booked</span></div>
    <ul>
      <li>Remove Tags: <span class="cv">powerdialer</span>, <span class="cv">vm-sent</span>, <span class="cv">same-day-callback</span></li>
      <li>Update Field: Missed Call Count → <span class="cv">0</span></li>
      <li>Update Field: Next Contact Date → <span class="cv">clear / blank</span></li>
      <li>Update Field: Last Contact Date → <span class="cv">today</span></li>
      <li>Change Pipeline Stage → if Mike: <span class="sp">2) Mike the Closer — Appointment Scheduled</span> / if Joshua: <span class="sp">3) Josh The Closer — Appointment Scheduled</span></li>
      <li>Send Internal Notification → Channel: <span class="cv">#appointments</span><br>Message: <span class="cv">🗓️ APPOINTMENT BOOKED: {{contact.first_name}} {{contact.last_name}} — {{contact.address}} — booked by Nicole</span></li>
    </ul>
  </div>

  <div class="branch">
    <div class="branch-if">Branch F — Wrong Number / Bad Contact</div>
    <div class="cb" style="margin-bottom:8px;"><span class="lbl">Condition</span><span class="cv">Last Contact Outcome is: Wrong Number / Bad Contact</span></div>
    <ul>
      <li>Remove Tags: <span class="cv">powerdialer</span>, <span class="cv">vm-sent</span></li>
      <li>Update Field: Next Contact Date → <span class="cv">clear / blank</span></li>
      <li>Update Field: Missed Call Count → <span class="cv">0</span></li>
      <li>Change Pipeline Stage → <span class="sp">Dead Lead</span></li>
      <li>Add Tag: <span class="cv">Dead - Wrong Number</span></li>
      <li>Update Field: Last Contact Date → <span class="cv">today</span></li>
    </ul>
  </div>
</div>
</div>

<!-- WF 5 -->
<div class="wf-block">
<div class="wf-head"><div class="wf-num">5</div><div><div class="wf-title">IHT — Same Day Callback</div><div class="wf-sub">Fires immediately when Nicole applies the same-day-callback tag</div></div></div>
<div class="wf-body">
  <div class="wf-label">Trigger</div>
  <div class="cb"><span class="lbl">Trigger Type</span><span class="cv">Tag Added</span><br><span class="lbl">Tag</span><span class="cv">same-day-callback</span></div>
  <div class="wf-label">Filters</div>
  <div class="cb"><span class="lbl">Filter 1</span><span class="cv">Tags does not contain: powerdialer</span></div>
  <div class="wf-note">Prevents duplicate task if the morning workflow already fired for this contact today.</div>
  <div class="wf-label">Actions</div>
  <div class="cb"><span class="lbl">Action 1 — Add Tag</span>Tag: <span class="cv">powerdialer</span></div>
  <div class="cb"><span class="lbl">Action 2 — Create Task</span>Title: <span class="cv">⚡ CALLBACK TODAY — {{contact.first_name}} {{contact.last_name}}</span><br>Due Date: <span class="cv">Today</span><br>Assigned To: <span class="cv">{{contact.assigned_user}}</span><br>Description: <span class="cv">Same-day callback requested. Last outcome: {{contact.last_contact_outcome}}</span></div>
</div>
</div>

<!-- WF 6 -->
<div class="wf-block">
<div class="wf-head"><div class="wf-num">6</div><div><div class="wf-title">IHT — Long-Term Nurture Enrollment</div><div class="wf-sub">Fires on FU-LongTerm tag — removes from active calling, starts monthly drip</div></div></div>
<div class="wf-body">
  <div class="wf-label">Trigger</div>
  <div class="cb"><span class="lbl">Trigger Type</span><span class="cv">Tag Added</span><br><span class="lbl">Tag</span><span class="cv">FU-LongTerm</span></div>
  <div class="wf-label">Exit Condition (set at top of workflow)</div>
  <div class="cb"><span class="lbl">Exit If</span><span class="cv">Tag: re-engaged is added → stop workflow</span></div>
  <div class="wf-label">Actions</div>
  <div class="cb"><span class="lbl">Action 1 — Remove Tags</span>Tags: <span class="cv">powerdialer, vm-sent, same-day-callback</span></div>
  <div class="cb"><span class="lbl">Action 2 — Update Field</span>Field: <span class="cv">Next Contact Date</span><br>Value: <span class="cv">clear / blank</span></div>
  <div class="cb"><span class="lbl">Action 3 — Update Field</span>Field: <span class="cv">Missed Call Count</span><br>Value: <span class="cv">0</span></div>
  <div class="cb"><span class="lbl">Action 4 — Wait</span>Duration: <span class="cv">30 days</span></div>
  <div class="cb"><span class="lbl">Action 5 — Send Email</span>Subject: <span class="cv">Still thinking about selling {{contact.address}}?</span><br>Template: <span class="cv">Long-Term Nurture — Month 1</span></div>
  <div class="cb"><span class="lbl">Action 6 — Wait</span>Duration: <span class="cv">60 days</span></div>
  <div class="cb"><span class="lbl">Action 7 — Send SMS</span>Message: <span class="cv">Hey {{contact.first_name}}, [Your Name] here with Impact Home Team. Still buying in your area — if you ever decide to sell {{contact.address}}, I'd love to make you an offer. Just reply here anytime.</span></div>
  <div class="cb"><span class="lbl">Action 8 — Loop back to Action 4</span>Continue monthly email + quarterly SMS indefinitely until exit condition fires</div>
</div>
</div>

<!-- WF 7 -->
<div class="wf-block">
<div class="wf-head"><div class="wf-num">7</div><div><div class="wf-title">IHT — Nurture Re-Engagement</div><div class="wf-sub">Fires when a FU-LongTerm lead replies to any message</div></div></div>
<div class="wf-body">
  <div class="wf-label">Trigger</div>
  <div class="cb"><span class="lbl">Trigger Type</span><span class="cv">Inbound Message Received</span><br><span class="lbl">Channel</span><span class="cv">Any (SMS, Email)</span></div>
  <div class="wf-label">Filters — ALL must be true</div>
  <div class="cb"><span class="lbl">Filter 1</span><span class="cv">Tags contains: FU-LongTerm</span><br><span class="lbl">Filter 2</span><span class="cv">Message body does not contain: STOP</span><br><span class="lbl">Filter 3</span><span class="cv">Message body does not contain: unsubscribe</span></div>
  <div class="wf-label">Actions</div>
  <div class="cb"><span class="lbl">Action 1 — Add Tag</span>Tag: <span class="cv">re-engaged</span></div>
  <div class="cb"><span class="lbl">Action 2 — Remove Tag</span>Tag: <span class="cv">FU-LongTerm</span></div>
  <div class="cb"><span class="lbl">Action 3 — Add Tag</span>Tag: <span class="cv">powerdialer</span></div>
  <div class="cb"><span class="lbl">Action 4 — Change Pipeline Stage</span>Stage: <span class="cv">Redzones</span></div>
  <div class="cb"><span class="lbl">Action 5 — Update Field</span>Field: <span class="cv">Next Contact Date</span><br>Value: <span class="cv">Today {{now}}</span></div>
  <div class="cb"><span class="lbl">Action 6 — Create Task</span>Title: <span class="cv">🔥 RE-ENGAGED from nurture — Call {{contact.first_name}} {{contact.last_name}}</span><br>Due Date: <span class="cv">Today</span><br>Assigned To: <span class="cv">{{contact.assigned_user}}</span></div>
  <div class="cb"><span class="lbl">Action 7 — Send Internal Notification</span>Channel: <span class="cv">#impact-lead-management</span><br>Message: <span class="cv">🔥 NURTURE RE-ENGAGEMENT: {{contact.first_name}} {{contact.last_name}} just replied after being in long-term nurture. Phone: {{contact.phone}} | Address: {{contact.address}}</span></div>
</div>
</div>

<h2 style="margin-top:32px;">Testing Checklist</h2>
<p>Run every scenario with a test contact before going live:</p>
<table class="data-table">

        content: `
<h2>Conversations</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Ashley Hines</span></div>

<p>Conversations is the unified inbox inside GHL. Every text, email, call log, voicemail, Facebook message, and live chat across every lead and contact flows into one place. This is not a supplementary tool — it is your primary communication hub. If you are not checking Conversations regularly, you are missing replies, letting leads go cold, and losing deals to speed.</p>

<div class="callout crimson">
  <div class="callout-icon">⚡</div>
  <div class="callout-body"><strong>Speed to lead wins deals.</strong> A seller who texts in at 2 PM and gets a reply at 2:02 PM is a seller who feels taken care of. One who gets a reply at 6 PM has already called someone else. Conversations is how you stay fast.</div>
</div>

<h2>How to Access Conversations</h2>
<p>Click <span class="ghl-field">Conversations</span> in the left sidebar of GHL. This opens the unified inbox. All incoming messages from every channel — SMS, email, calls, voicemail drops, social — appear here in real time.</p>

<h2>Filters — Use These Every Day</h2>
<p>The filter bar at the top of Conversations lets you cut through the noise and find exactly what needs your attention. Learn these and use them on every login.</p>

<table class="data-table">
  <tr><th>Filter</th><th>What It Shows</th><th>When to Use It</th></tr>
  <tr>
    <td><span class="ghl-field">All</span></td>
    <td>Every conversation across the entire account regardless of assignment</td>
    <td>When you want a full picture of activity or are covering for a teammate</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Assigned to Me</span></td>
    <td>Only conversations where you are the assigned user</td>
    <td><strong>Your default view.</strong> Start every session here — these are your leads, your replies, your responsibility.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Recents</span></td>
    <td>Conversations with the most recent activity, sorted newest first</td>
    <td>For checking what just came in or catching up after time away. Fast scan for anything hot.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">⭐ Starred</span></td>
    <td>Conversations you have manually starred</td>
    <td>For leads or deals you need to revisit. Star anything you want to remember to follow up on — a hot seller, a deal in negotiation, a buyer waiting on a decision.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Unread</span></td>
    <td>Any conversation with messages you have not opened yet</td>
    <td>Quick triage — never leave unread messages sitting. Every unread is a potential deal waiting on you.</td>
  </tr>
</table>

<h2>Starring Conversations</h2>
<p>Star any conversation you need to come back to. This is your personal watchlist inside GHL. Use it for:</p>
<ul>
  <li>Hot sellers who are close but haven't committed yet</li>
  <li>Leads you are waiting to hear back from after a specific follow-up</li>
  <li>Deals mid-negotiation where a reply is expected</li>
  <li>Any contact where the next step is time-sensitive</li>
</ul>
<p>Starred conversations live in their own filter so you never have to hunt for them. Review your starred list at the start and end of every shift.</p>

<h2>Tasks and Reply Notifications</h2>
<p>GHL creates tasks when a lead or contact replies to a message and action is needed. <strong>Check your task list alongside Conversations — tasks and conversations work together.</strong> A task may tell you that a specific lead replied; Conversations is where you go to read the message and respond.</p>

<div class="callout amber">
  <div class="callout-icon">📋</div>
  <div class="callout-body">
    <strong>Your daily rhythm should be:</strong>
    <ol style="margin:8px 0 0;padding-left:18px;font-size:13px;line-height:2.2;">
      <li>Open <strong>Conversations → Assigned to Me</strong> — clear anything unread</li>
      <li>Check <strong>Starred</strong> — any replies or updates on leads you are watching?</li>
      <li>Check <strong>Recents</strong> — anything hot that just came in?</li>
      <li>Work your <strong>Task list</strong> — complete tasks that involve replying or following up</li>
    </ol>
  </div>
</div>

<h2>What Flows Through Conversations</h2>
<table class="data-table">
  <tr><th>Channel</th><th>What You'll See</th></tr>
  <tr><td><strong>SMS / Text</strong></td><td>All inbound and outbound texts with every contact. The most common channel for seller communication.</td></tr>
  <tr><td><strong>Email</strong></td><td>Emails sent and received through GHL. Includes automated sequences and manual replies.</td></tr>
  <tr><td><strong>Calls</strong></td><td>Call logs, recordings (if enabled), and voicemails. Every call to or from a GHL contact is logged here.</td></tr>
  <tr><td><strong>Voicemail Drops</strong></td><td>Automated voicemails sent through workflows. Logged per contact.</td></tr>
  <tr><td><strong>Facebook / Instagram DMs</strong></td><td>Social media messages from leads who respond to ads or message the page directly.</td></tr>
  <tr><td><strong>Live Chat</strong></td><td>Chats from the website widget if enabled. Seller inquiries from the website land here.</td></tr>
</table>


<h2>Inbox Ownership</h2>
<p>Every lead in the inbox needs a human owner. If you are handling that lead, assign yourself in GHL. Unowned leads fall through the cracks.</p>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content"><strong>Open the contact in GHL.</strong></div></li>
  <li><div class="step-num">2</div><div class="step-content"><strong>Find the "Assigned To" field</strong> on the contact card and select your name.</div></li>
  <li><div class="step-num">3</div><div class="step-content"><strong>If a lead is being transferred to you,</strong> the previous owner updates this field to your name and sets themselves as a <strong>Follower</strong>.</div></li>
</ol>
<div class="callout crimson">
  <div class="callout-icon">📌</div>
  <div class="callout-body"><strong>Rule: If you are actively working a lead, your name is on it. No exceptions.</strong></div>
</div>
<h2>Starring Conversations</h2>
<p>Stars are for quick visual flagging — not for tracking follow-ups. Stars mean "come back to this." Tasks mean "this must happen by a date."</p>
<ul>
  <li><strong>To star:</strong> Open the conversation → click the <strong>star icon</strong> in the top right.</li>
  <li>Starred conversations appear in the <span class="ghl-field">⭐ Starred</span> filter in the left sidebar.</li>
  <li>Once you've taken action, unstar it. A growing starred list means tasks aren't being created.</li>
  <li><strong>Stars are not a substitute for tasks.</strong></li>
</ul>
<h2>Rules for Conversations at IHT</h2>
<div class="callout amber">
  <div class="callout-icon">📌</div>
  <div class="callout-body">
    <ul style="margin:0;padding-left:18px;font-size:13px;line-height:2.2;">
      <li><strong>Never leave an inbound message unread for more than 15 minutes during business hours.</strong> Every unread is a waiting seller.</li>
      <li><strong>Reply from Conversations, not from your personal phone.</strong> All communication must stay inside GHL so the team has full visibility and the contact record stays complete.</li>
      <li><strong>Always call back or text back from the number the lead used to contact you.</strong> Do not switch channels without a reason.</li>
      <li><strong>Star anything you are actively watching.</strong> If you un-star it, it means you have resolved it or it is no longer active.</li>
      <li><strong>Log a note after every meaningful conversation.</strong> If it is not in GHL, it did not happen.</li>
    </ul>
  </div>
</div>
`}
    ]

        content: `
<h2>What Is the Credibility Packet?</h2>
<p>The credibility packet is a leave-behind document given to sellers after an in-person or virtual appointment. Its purpose is to answer remaining doubts, reinforce trust, and motivate the seller to sign — even if they didn't commit at the meeting.</p>

<div class="callout amber">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <strong>Primary Goal</strong>
    Move the seller from "I need to think about it" to "I'm ready to sign." Every section of this packet is designed to handle a specific objection.
  </div>
</div>

<h2>When to Use It</h2>
<ul>
  <li>Leave a printed or digital copy at every in-person appointment</li>
  <li>Send the PDF link via text/email within 1 hour after a virtual appointment</li>
  <li>Reference specific sections when following up — "You'll see on page 2 why our timeline is flexible..."</li>
</ul>

<h2>Packet Structure</h2>
<ol class="step-list">
  <li>
    <div class="step-num">1</div>
    <div class="step-content">
      <strong>Cover / Introduction</strong>
      Company name, tagline, and a human opening that acknowledges the seller's situation. Sets the tone before they read a single fact.
    </div>
  </li>
  <li>
    <div class="step-num">2</div>
    <div class="step-content">
      <strong>Who We Are</strong>
      8+ years of experience, family-owned, Maryland-focused. Photo of the team when possible. Humanizes the transaction.
    </div>
  </li>
  <li>
    <div class="step-num">3</div>
    <div class="step-content">
      <strong>How Our Process Works (3 Steps)</strong>
      Step 1: We make an offer. Step 2: You decide. Step 3: We close on your timeline. No repairs, no agents, no fees.
    </div>
  </li>
  <li>
    <div class="step-num">4</div>
    <div class="step-content">
      <strong>IHT vs. Traditional Sale Comparison</strong>
      Side-by-side table: repairs, commissions, timeline, certainty of close, closing costs. This is the highest-converting section.
    </div>
  </li>
  <li>
    <div class="step-num">5</div>
    <div class="step-content">
      <strong>What Sellers Say (Testimonials)</strong>
      2–3 real or representative testimonials. Focus on relief, speed, and professionalism — not just the offer amount.
    </div>
  </li>
  <li>
    <div class="step-num">6</div>
    <div class="step-content">

  <li>
    <div class="step-num">8</div>
    <div class="step-content">

    </div>
  </li>
  <li>
    <div class="step-num">9</div>
    <div class="step-content">
      <strong>Next Steps / CTA</strong>
      Clear call to action: "Sign today and we handle everything from here." Include direct phone number and the acquisitions agent's name.
    </div>
  </li>
</ol>

<h2>IHT vs. Traditional Sale — Key Comparison Points</h2>
<table class="compare-table">

    <th>Traditional Listing</th>
  </tr>

  </div>
</div>

<h2>File Location</h2>
<p>The credibility packet (both dark and white HTML versions) is stored in the <strong>Brand Assets → Credibility Packet</strong> folder in Google Drive. Update the Proof of Funds section whenever the funding letter is renewed. Use the dark version for digital sends; print the white version for in-person leave-behinds.</p>

<h2>GHL Documentation Requirements</h2>

`},
