oking. The closer preps from their own pipeline — if the lead is still in Leads, they may miss the appointment entirely.\u003c/p\u003e\u003ch2\u003eAcquisitions \u0026#8594; Transaction Coordination\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eTrigger:\u003c/strong\u003e A-B contract signed and uploaded to GHL.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRequired before handoff:\u003c/strong\u003e Fully executed A-B contract uploaded, ARV set with comp link saved, repair estimate completed, property photos uploaded (minimum 15), listing copy drafted for deal packaging.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePipeline movement:\u003c/strong\u003e Move the opportunity to \u0026quot;5) Transaction Coordination\u0026quot; \u0026#8594; \u0026quot;New Deal!\u0026quot; stage.\u003c/p\u003e\u003cp\u003ePost in \u003cstrong\u003e#transactions\u003c/strong\u003e on Slack: \u0026quot;New deal entering TC: [Address] — A-B at $[Price] — Target close [Date].\u0026quot; Tag Ashley.\u003c/p\u003e\u003cp\u003eIf any required item is missing, Ashley sends it back. The acquisitions agent must complete the handoff package before TC will accept the file.\u003c/p\u003e\u003ch2\u003eTC \u0026#8594; Dispositions (Marketing Phases)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eTrigger:\u003c/strong\u003e Title file opened and seller onboarded (Steps 1-4 of TC checklist complete).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePipeline movement:\u003c/strong\u003e Deal moves through marketing phases within the TC pipeline: Marketing Phase 1 (VIP) \u0026#8594; Phase 2 (All Buyers) \u0026#8594; Phase 3 (Retrade/Refresh) as needed.\u003c/p\u003e\u003ch2\u003eDispositions \u0026#8594; TC (B-C Signed)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eTrigger:\u003c/strong\u003e B-C contract signed and uploaded.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRequired:\u003c/strong\u003e B-C contract fully executed, buyer name and contact info, B-C price and assignment fee, buyer EMD status, title company notified of the buyer.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePipeline movement:\u003c/strong\u003e Move to \u0026quot;B-C Assigned\u0026quot; stage within the TC pipeline.\u003c/p\u003e\u003cp\u003ePost in \u003cstrong\u003e#transactions\u003c/strong\u003e on Slack: \u0026quot;B-C signed: [Address] — Buyer: [Name] — B-C Price: $[Price] — Fee: $[Fee] — EMD: [Status].\u0026quot; Tag Ashley.\u003c/p\u003e"},{"id":"list-uploads","title":"External List Upload Process","dept":"Deal Lifecycle","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eImporting Lists into GHL\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1.\u003c/strong\u003e Upload during off-hours (5 AM or weekends).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\u003c/strong\u003e Start with 500 records as test batch.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\u003c/strong\u003e Tag the source (e.g., \"DataFlex-Mar2026\").\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\u003c/strong\u003e Use \"Imported - Pending Review\" tag to keep out of active workflows.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\u003c/strong\u003e Run dedup after import — check phone numbers, not just names.\u003c/p\u003e"}]},{"id":"tools","label":"Tools \u0026 Systems","color":"#64748B","pages":[{"id":"ghl-guide","title":"GoHighLevel Quick Guide","dept":"Tools \u0026 Systems","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eGHL Is Our Operating System\u003c/h2\u003e\u003cp\u003eGoHighLevel is where everything lives — contacts, opportunities, pipelines, calls, texts, documents, and automations. If it\u0027s not in GHL, it doesn\u0027t exist. Every lead, every conversation, every deal, and every dollar flows through this system.\u003c/p\u003e\u003ch2\u003eKey Areas You\u0027ll Use Daily\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eContacts:\u003c/strong\u003e Every person in our database. Search by name, phone, email, or address. Each contact card shows their conversation history, pipeline stage, tags, notes, and associated opportunity.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOpportunities:\u003c/strong\u003e Every deal in the pipeline. This is the card view you\u0027ll live in. Each opportunity card represents one deal (one property address). Cards are organized by pipeline stage and show deal value, stage, owner, and last activity.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eConversations:\u003c/strong\u003e Your inbox for all calls, texts, and emails. All communication with sellers and buyers happens here through LeadConnector. Never use your personal phone — conversations in GHL are logged, recorded, and feed automations.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCalendars:\u003c/strong\u003e Where appointments live. Connected to the team calendar. When Nicole books an appointment, it shows here and triggers the confirmation sequence.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWorkflows:\u003c/strong\u003e Automations that run in the background. You don\u0027t build these (Ashley does), but you need to understand that moving a lead to a new stage or adding a tag may trigger a workflow. That\u0027s why accurate tagging and stage management matters.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDashboards:\u003c/strong\u003e Performance views that pull data from your pipeline. The weekly scorecard, revenue tracking, and source attribution reports all come from here.\u003c/p\u003e\u003ch2\u003eHow to Do Common Tasks\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eFind a contact:\u003c/strong\u003e Click Contacts in the left nav. Use the search bar — search by name, phone number, or property address. Pro tip: searching by the street number (e.g., \"4523\") is often faster than typing the full address.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUpdate a pipeline stage:\u003c/strong\u003e Open the opportunity. Click the current stage dropdown and select the new stage. Add a note explaining why you\u0027re moving it. This note is critical — it feeds the weekly review and shows the team what happened.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLog a note:\u003c/strong\u003e Open the contact or opportunity. Click \"Add Note\" in the activity section. Write your note and save. Keep notes factual and brief: what happened, what\u0027s next, and any key details.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMake a call:\u003c/strong\u003e Open the contact. Click the phone icon in Conversations. This dials through LeadConnector — the call is recorded and logged automatically. Never call from your personal phone.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSend a text:\u003c/strong\u003e Open the contact. Type in the Conversations text field and send. This sends via LeadConnector and logs automatically.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUpload a document:\u003c/strong\u003e Open the opportunity. Scroll to the documents/files section. Upload the file (contract, BPO, photos, HUD). Label it clearly: \"[Document Type] - [Date].\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCheck call recordings:\u003c/strong\u003e Open the contact. In the Conversations timeline, click on any phone call entry to play the recording. Call recordings are stored indefinitely.\u003c/p\u003e\u003ch2\u003eCard View Settings\u003c/h2\u003e\u003cp\u003eYour opportunity card view should display: Contact Name, Lead Source, Property Address, Opportunity Value, and Last Activity Date. If your card view looks different, go to the pipeline settings and configure these fields.\u003c/p\u003e\u003ch2\u003eWhen Something Breaks\u003c/h2\u003e\u003cp\u003eIf GHL is down, a workflow isn\u0027t firing, or something looks wrong: post in \u003cstrong\u003e#ghl-integration\u003c/strong\u003e on Slack with a screenshot and tag Ashley. Do not try to fix workflows or automations yourself — a bad edit can break the entire system.\u003c/p\u003e"},{"id":"sending-docs","title":"Sending Documents (DocuSign)","dept":"Tools \u0026 Systems","updated":"Mar 2026","owner":"Ted / Mike","body":"\u003ch2\u003eProcess\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1.\u003c/strong\u003e Open appropriate template in DocuSign.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\u003c/strong\u003e Fill in all deal-specific fields.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\u003c/strong\u003e Add signers with correct email.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\u003c/strong\u003e Send and confirm in Slack.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\u003c/strong\u003e Once signed, download and upload to GHL immediately.\u003c/p\u003e"},{"id":"ghl-training","title":"GHL Training Resources","dept":"Tools \u0026amp; Systems","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eLoom Tutorials — Our GHL Setup\u003c/h2\u003e\u003cp\u003eThese are recordings of our actual GHL instance. Watch these before anything else.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://www.loom.com/share/16e5ec73b8c4434cb2c082f465e1b141\" target=\"_blank\"\u003eFinding Marketing Campaigns \u0026amp; Lead Sources\u003c/a\u003e\u003c/strong\u003e — How to identify which marketing campaign generated a lead. Essential for accurate source tagging.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://www.loom.com/share/c474d121605e4c03839843b6874b4f86\" target=\"_blank\"\u003eTurning On Follow-Up Automation\u003c/a\u003e\u003c/strong\u003e — How to activate the follow-up workflow for a contact.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://www.loom.com/share/63482b5ad3b64388935d8a6587d88c05\" target=\"_blank\"\u003eHow to Use the Power Dialer\u003c/a\u003e\u003c/strong\u003e — Setting up and using GHL\u0026#39;s power dialer for efficient outbound calling blocks.\u003c/p\u003e\u003ch2\u003eAdditional Loom Recordings to Create\u003c/h2\u003e\u003cp\u003eAshley — these are the recommended recordings to fill remaining gaps:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. \u0026quot;Our GHL Dashboard Tour\u0026quot; (5 min)\u003c/strong\u003e — Main navigation, pipeline view, contact search, conversation inbox.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. \u0026quot;How to Work a New Lead\u0026quot; (5 min)\u003c/strong\u003e — From notification to first call to pipeline update.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. \u0026quot;Booking an Appointment \u0026amp; Moving to Closer Pipeline\u0026quot; (3 min)\u003c/strong\u003e — Calendar widget, assigning to the right closer, and the critical step of moving the lead to Mike\u0026#39;s or Josh\u0026#39;s pipeline.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. \u0026quot;Updating a Deal Card\u0026quot; (3 min)\u003c/strong\u003e — Pipeline stage changes, notes, documents, required fields.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. \u0026quot;Reading the Weekly Scorecard\u0026quot; (5 min)\u003c/strong\u003e — Dashboard metrics, where numbers come from, what each metric means.\u003c/p\u003e\u003ch2\u003eExternal GHL Resources\u003c/h2\u003e\u003cp\u003e\u003ca href=\"https://support.gohighlevel.com\" target=\"_blank\"\u003eGHL Support Center\u003c/a\u003e — Search for LeadConnector (calling/texting), Opportunities (pipelines), Workflows, and Calendar guides.\u003c/p\u003e\u003ch2\u003eGHL Updates\u003c/h2\u003e\u003cp\u003eGHL releases updates frequently. Ashley monitors the changelog and tests updates before they affect workflows. If you see something new in the interface, do not change settings — ask Ashley in \u003cstrong\u003e#ghl-integration\u003c/strong\u003e on Slack.\u003c/p\u003e"}]},{"id":"training","label":"Training","color":"#059669","pages":[{"id":"acquisition-training","title":"Acquisitions Training Plan","dept":"Training","updated":"Mar 2026","owner":"Joshua","body":"\u003ch2\u003eNew Acquisitions Team Member — Week 1-4 Plan\u003c/h2\u003e\u003ch3\u003eWeek 1: Foundation\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eDay 1-2:\u003c/strong\u003e Read the full Operations Manual. Focus on Company Overview, the Deal Lifecycle section (pipeline stages and handoff triggers), and the Acquisitions Playbook. You should be able to explain what every pipeline stage means and who owns it.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 3-4:\u003c/strong\u003e Shadow Joshua or Mike on 2-3 live appointments. Do not speak during these — just observe how they build rapport, walk the property, and present the offer. Take notes on what you see.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 5:\u003c/strong\u003e Review the Comping Properties SOP and do 3 practice comps on properties Joshua assigns. Compare your ARV to Joshua\u0027s and discuss the differences.\u003c/p\u003e\u003ch3\u003eWeek 2: Scripts \u0026 Practice\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eDay 1-2:\u003c/strong\u003e Memorize the Setting the Stage script and the Problem/Impact/Picture Perfect framework. Role-play with Joshua until the scripts feel natural, not rehearsed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 3-4:\u003c/strong\u003e Practice the If/Then Cheat Sheet scenarios. Joshua will throw objections at you — your job is to respond naturally using the framework.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 5:\u003c/strong\u003e Do your first ride-along where you lead the conversation (Joshua observes and steps in only if needed).\u003c/p\u003e\u003ch3\u003eWeek 3: Live with Training Wheels\u003c/h3\u003e\u003cp\u003eRun 3-5 appointments independently. Joshua reviews every call recording and debrief after each appointment. Focus areas: rapport quality, 4 Pillar discovery, and offer presentation confidence.\u003c/p\u003e\u003ch3\u003eWeek 4: Independent + Review\u003c/h3\u003e\u003cp\u003eFull independent appointment schedule. Weekly 1:1 with Joshua to review pipeline, call recordings, and conversion metrics. At end of Week 4, you should be able to run the full process — from appointment prep through signed contract — without assistance.\u003c/p\u003e"},{"id":"lead-mgr-onboarding","title":"Lead Manager Onboarding","dept":"Training","updated":"Mar 2026","owner":"Joshua / Nicole","body":"\u003ch2\u003eNew Lead Manager — Week 1-2 Plan\u003c/h2\u003e\u003ch3\u003eWeek 1: Systems \u0026 Scripts\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eDay 1:\u003c/strong\u003e GHL walkthrough — contacts, conversations, pipelines, calendar. Practice navigating the system until you can find any contact, check any pipeline, and open any conversation without help.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 2:\u003c/strong\u003e Learn the 12-Second Intro and 4 Pillars script. Practice them out loud 20 times until they sound natural. Review the Decision Tree so you know the qualification criteria cold.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 3:\u003c/strong\u003e Shadow Nicole on live calls for a full day. Listen to how she opens, how she transitions, and how she handles objections. Take notes on phrases that work.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 4:\u003c/strong\u003e Make your first 20 outbound calls with Nicole listening. She\u0027ll give feedback after each call.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 5:\u003c/strong\u003e Review the Own the Day schedule, Texting SOP, and Scheduling Appointments SOP. You should know the full daily routine and how to book appointments in GHL by end of day.\u003c/p\u003e\u003ch3\u003eWeek 2: Live Calling\u003c/h3\u003e\u003cp\u003eFull calling schedule with end-of-day review. Nicole or Joshua reviews 5 call recordings per day and gives specific feedback. By end of Week 2, you should be independently managing the daily routine with minimal supervision.\u003c/p\u003e\u003ch2\u003eOngoing Training\u003c/h2\u003e\u003cp\u003eWeekly call review sessions — Joshua pulls 3-5 calls from the week and the team listens together, discussing what went well and what could improve. Monthly script refresh to keep the team sharp and incorporate new objection handling techniques that are working.\u003c/p\u003e"},{"id":"objectionproof","title":"Objection Handling — 4-Step Framework","dept":"Training","updated":"Mar 2026","owner":"Joshua","body":"\u003ch2\u003eThe 4-Step Framework\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1. Clarify:\u003c/strong\u003e \"It sounds like the issue is the price. Is that right?\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quantify:\u003c/strong\u003e \"What number are you looking for?\" / \"If we could meet that, what happens?\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Confirm \u0026amp; Micro-Agreement:\u003c/strong\u003e \"If we could do , are we ready to move forward today?\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Loop:\u003c/strong\u003e Repeat for each objection. Only handle one at a time. Then summarize all together.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eConcept:\u003c/strong\u003e Sellers face a mental cloud of concerns (a \u0026quot;complexity ceiling\u0026quot;). Your job is to bring clarity by boxing in each objection one at a time.\u003c/p\u003e\u003ch2\u003eThe 5 Kinds of Objections\u003c/h2\u003e\u003cp\u003eEvery objection falls into one of these categories: \u003cstrong\u003ePrice\u003c/strong\u003e, \u003cstrong\u003eAnother Person\u003c/strong\u003e, \u003cstrong\u003eStall\u003c/strong\u003e, \u003cstrong\u003eChange of Plans\u003c/strong\u003e, or \u003cstrong\u003eHealth/Emergency\u003c/strong\u003e.\u003c/p\u003e\u003ch2\u003eMost Common Objections \u0026amp; Responses\u003c/h2\u003e\u003ch3\u003e\u0026quot;Your offer is too low.\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;Totally fair. Retail buyers pay more but ask for repairs, showings, inspection credits, and uncertainty. Our cash number trades those headaches for speed and certainty. If we cover all costs and move on your timeline, what is the \u003cem\u003ebest\u003c/em\u003e you could do today?\u0026quot;\u003c/p\u003e\u003ch3\u003e\u0026quot;I need to check with my spouse/family.\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;Makes sense. Can we loop them in now, or schedule a 15-minute time today when all decision-makers can join? That way we can give a clean yes/no together.\u0026quot;\u003c/p\u003e\u003ch3\u003e\u0026quot;I might list instead.\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;That is a good option if you want to maximize price and do not mind time and repairs. If convenience and certainty matter most, we are likely the better fit. Which matters more for you right now?\u0026quot;\u003c/p\u003e\u003ch3\u003e\u0026quot;We are not in a rush.\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;No problem. If price is the main factor and timing is flexible, what price would make a quick, easy cash sale worth it today?\u0026quot;\u003c/p\u003e\u003ch3\u003eSeller will not give a price or range\u003c/h3\u003e\u003cp\u003e\u0026quot;Totally understand! I do not even make offers \u0026#8212; we have a whole underwriting department for that! I want to be able to give you the best chance toward getting what you need. Make sense?\u0026quot;\u003c/p\u003e\u003ch2\u003eBusiness-Related Questions\u003c/h2\u003e\u003ch3\u003e\u0026quot;Can you explain how your process works?\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;Of course. It is super easy and goes like this...\u0026quot; Give the 60-second version that ends with their picture-perfect scenario.\u003c/p\u003e\u003ch3\u003e\u0026quot;How do you make an offer without seeing it?\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;Great question. We have an underwriting team with their own software and tools, along with local folks in the market. Make sense?\u0026quot;\u003c/p\u003e\u003ch3\u003e\u0026quot;Where are you guys based?\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;Headquarters is in Baltimore County, Maryland. We have remote employees across the U.S. We do business solely in Maryland.\u0026quot;\u003c/p\u003e\u003ch3\u003e\u0026quot;Are you a wholesaler?\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;We are an investment company that may wholesale depending on the situation. Is that a problem?\u0026quot;\u003c/p\u003e\u003ch3\u003e\u0026quot;What happens if you do not find a buyer?\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;Good question! Since we sell a lot of homes and know the agents and buyers well, we use our own strategy for repairs, listing and marketing. If by chance we cannot secure a buyer, we would come back to you and talk about what we have learned and recommend how to proceed. Fair enough?\u0026quot;\u003c/p\u003e\u003cp\u003e(If still objecting, push: \u0026quot;In a situation like yours it may make sense to invest the \u0005K and 12-18 months to fix and flip it yourself. Have you ever done it before?\u0026quot;)\u003c/p\u003e\u003ch3\u003e\u0026quot;Why not list it myself?\u0026quot;\u003c/h3\u003e\u003cp\u003eSame framework \u0026#8212; position our expertise in repairs, listing, and marketing as the advantage.\u003c/p\u003e\u003ch3\u003e\u0026quot;I do not want people coming through for showings.\u0026quot;\u003c/h3\u003e\u003cp\u003e\u0026quot;Totally understand! That is common. We simply put on the marketing that only certain periods are allowed for access. Make sense?\u0026quot; (Caveat: we need reasonable access \u0026#8212; cannot sell a house with access only 1 day a week.)\u003c/p\u003e\u003ch3\u003eSeller has another home set to close\u003c/h3\u003e\u003cp\u003eWhite Glove Program is not right if the seller depends on this sale for their next purchase, unless the property is under 70% ARV.\u003c/p\u003e\u003ch2\u003eBuilding a Moat (When Other Offers Exist)\u003c/h2\u003e\u003cp\u003eFirst probe the competing offer: confirm its true terms and amounts (listing vs. cash, closing timeline, EMD, terms, post-occupancy). Use the Clarify, Quantify, Confirm loop.\u003c/p\u003e\u003cp\u003eThen ask: based on what they have told you, where can you add even more value? Use the Value Stack to create a one-of-one offer. Ways to add value: advance cash, help find next home, cover probate/legal help, rent-back with escrow, handle squatters/renters.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOutcome:\u003c/strong\u003e Seller sees your offer as the only executable option, even if price is lower.\u003c/p\u003e"},{"id":"weekly-meetings","title":"Weekly Meeting Structure","dept":"Training","updated":"Mar 2026","owner":"Ashley / Joshua","body":"\u003ch2\u003eLevel-10 Meeting (Weekly Operations Huddle)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eWho:\u003c/strong\u003e Ashley + Joshua (executives). \u003cstrong\u003eWhen:\u003c/strong\u003e Weekly, typically Tuesday. \u003cstrong\u003eDuration:\u003c/strong\u003e 60-90 minutes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAgenda:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Scorecard Review (15 min):\u003c/strong\u003e Walk through every metric on the weekly scorecard. Flag anything red — any number that missed target by more than 20% needs a root cause and a fix-it plan.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Pipeline Review (15 min):\u003c/strong\u003e Review every active deal by stage. Identify stuck deals (no movement in 7+ days), at-risk deals (closing date approaching), and hot deals (ready to close this week).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. People Issues (10 min):\u003c/strong\u003e Any team performance concerns, accountability gaps, or training needs. Be direct — this isn\u0027t the place for sugarcoating.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Action Items from Last Week (10 min):\u003c/strong\u003e Review every action item from the previous meeting. It\u0027s either done, in progress with a clear deadline, or it needs to be escalated.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. This Week\u0027s Priorities (10 min):\u003c/strong\u003e Each person identifies their top 3 priorities for the week. Write them down. These become next week\u0027s accountability items.\u003c/p\u003e\u003ch2\u003eTeam Standup (Daily or Every Other Day)\u003c/h2\u003e\u003cp\u003eQuick 10-minute Slack or huddle check-in. Each person answers: What did I close/move yesterday? What am I focused on today? Am I blocked on anything?\u003c/p\u003e"},{"id":"training-video-library","title":"Training Video Library","dept":"Training","updated":"Mar 2026","owner":"Ashley / Joshua","body":"\u003ch2\u003eSOP Libraries by Department\u003c/h2\u003e\u003cp\u003eThese Google Drive folders contain recorded SOPs and training materials organized by department. Start with your department\u0026#39;s folder, then review the cross-department materials.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1Zpac9pwxMbfAPhaYK7LrXaK0MCIYnC71?usp=drive_link\" target=\"_blank\"\u003eLead Management SOPs\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1PIJsvbPRLaBgqDw7LVTbMCzV59W3rVtL?usp=sharing\" target=\"_blank\"\u003eAcquisitions SOPs\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1XiWbVFNnFnz0-kPr3Eu707Y3gn1FXIAd?usp=sharing\" target=\"_blank\"\u003eTC SOPs\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1zEoiL-9rNaZ-FlnNDxt8XjL4lMsS5GBo?usp=sharing\" target=\"_blank\"\u003eDispositions SOPs\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1AvOmuhm7VFVWmO7JAxH0KIPLorym3mKO?usp=sharing\" target=\"_blank\"\u003eData Management SOPs\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1UiB7f3hSPk9yISRxTficPEctwJPXkG29?usp=sharing\" target=\"_blank\"\u003eDirect Mail SOPs\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1OjRDSwFRxNf1v6hs83XJBIiHPna6l9W7?usp=sharing\" target=\"_blank\"\u003eOperations SOPs\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1x97E_RiahSyQdXvfIqDrpzeKif-rj4Ee?usp=sharing\" target=\"_blank\"\u003eEducational Courses\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eAll Training Recordings\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003ch2\u003eGHL Loom Tutorials\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://www.loom.com/share/16e5ec73b8c4434cb2c082f465e1b141\" target=\"_blank\"\u003eFinding Marketing Campaigns \u0026amp; Lead Sources\u003c/a\u003e\u003c/strong\u003e — How to identify which marketing campaign generated a lead in GHL.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://www.loom.com/share/c474d121605e4c03839843b6874b4f86\" target=\"_blank\"\u003eTurning On Follow-Up Automation\u003c/a\u003e\u003c/strong\u003e — How to activate follow-up workflows for a contact in GHL.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://www.loom.com/share/63482b5ad3b64388935d8a6587d88c05\" target=\"_blank\"\u003eHow to Use the Power Dialer\u003c/a\u003e\u003c/strong\u003e — Using GHL\u0026#39;s power dialer for efficient outbound calling.\u003c/p\u003e\u003ch2\u003eCore Training Videos\u003c/h2\u003e\u003ch3\u003eLead Management\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eAssembly Line Overview\u003c/a\u003e\u003c/strong\u003e — How leads flow through our system from first contact to closing. Watch this first.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003e12 Seconds\u003c/a\u003e\u003c/strong\u003e — The 12-Second Intro training. How to open every call.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003e4 Pillars\u003c/a\u003e\u003c/strong\u003e — Deep dive into the 4 Pillars qualification framework.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eLead Management Basics\u003c/a\u003e\u003c/strong\u003e — Updated team training (Jan 2025) covering the full lead management process.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eSetting Expectations\u003c/a\u003e\u003c/strong\u003e — How to set proper expectations with sellers on the first call.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eMissed Priority Calls\u003c/a\u003e\u003c/strong\u003e — Training on handling missed calls and Smrtphone call flows.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eRescheduling Cancelled Appointments\u003c/a\u003e\u003c/strong\u003e — Process for rebooking when sellers cancel.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eCancellations \u0026amp; Rebooking\u003c/a\u003e\u003c/strong\u003e — Team training (Jan 2025) on handling cancellations.\u003c/p\u003e\u003ch3\u003eLead Qualification \u0026amp; Prioritization\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eTiering Leads - A Leads\u003c/a\u003e\u003c/strong\u003e — How to identify and prioritize your highest-potential leads.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eTiering Leads, Part 2\u003c/a\u003e\u003c/strong\u003e — Does time affect A-lead status? How to re-evaluate lead priority.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eTiering Seller Leads \u0026amp; DNC List Management\u003c/a\u003e\u003c/strong\u003e — Combining lead tiering with DNC compliance.\u003c/p\u003e\u003ch3\u003eSales \u0026amp; Communication\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eText Messages, ChatGPT, \u0026amp; Targeting\u003c/a\u003e\u003c/strong\u003e — Using texting, AI tools, and targeting strategies together.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eStay Close to the \u0026quot;No\u0026quot;\u003c/a\u003e\u003c/strong\u003e — Team training (Mar 2025) on persistence and converting reluctant sellers.\u003c/p\u003e\u003ch3\u003eDeal Types \u0026amp; Special Situations\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eTC: A-B through Closing\u003c/a\u003e\u003c/strong\u003e — Full walkthrough of the TC process from contract to settlement.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eProbate and Inheritance\u003c/a\u003e\u003c/strong\u003e — Handling probate deals, PR verification, and court approval.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eForeclosure\u003c/a\u003e\u003c/strong\u003e — Team training on foreclosure deals and how to work them.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://docs.google.com/document/d/1honlWwwKV69wxTPgoLYGS66FgTO8Zt4VCtPnlQEGoXE/edit\" target=\"_blank\"\u003eShort Sale: How They Work\u003c/a\u003e\u003c/strong\u003e — Meeting notes on short sale process (no video).\u003c/p\u003e\u003ch3\u003eStrategy \u0026amp; Planning\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003e2025 Goal Planning\u003c/a\u003e\u003c/strong\u003e — Team planning session (Jan 2025).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://drive.google.com/drive/folders/1M1DB2rZaPh6Lbvq4e7YO7EnumfLaQT4d?usp=sharing\" target=\"_blank\"\u003eMarketing\u003c/a\u003e\u003c/strong\u003e — Team training on marketing channels and strategy (Jan 2025).\u003c/p\u003e\u003ch2\u003eExternal Training\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://docs.google.com/document/d/1xWzGJosG4ycXmxI3jASCfKFHRiyt6C0ZtKyA-iJ2lps/edit\" target=\"_blank\"\u003eAcquisitions Playbook\u003c/a\u003e\u003c/strong\u003e — Joshua\u0027s complete 7-Phase acquisitions system. Required reading for all closers. Covers scripts, objection handling, value stacking, and agreement walk-through.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJohn Martinez / Ruzuku\u003c/strong\u003e — Acquisitions training course. See Ashley for login credentials. Covers advanced sales techniques, objection handling, and closing psychology.\u003c/p\u003e"}]}]</script>
<script>
var S=JSON.parse(document.getElementById("d").textContent);
var cur=null;

function $(id){return document.getElementById(id)}
function find(arr,id){for(var i=0;i<arr.length;i++)if(arr[i].id===id)return arr[i];return null}

function buildNav(){
  var el=$("nav"),h="";
  h+="<div class='nav-link"+(cur?"":" active")+"' data-home>&#8962; Home</div>";
  for(var i=0;i<S.length;i++){
    var s=S[i],op=false;
    if(cur)for(var j=0;j<s.pages.length;j++)if(s.pages[j].id===cur.id){op=true;break}
    h+="<div class='nav-section"+(op?" open":"")+"' id='ns-"+s.id+"'>";
    h+="<div class='nav-section-header' data-toggle='"+s.id+"'>";
    h+="<div class='nav-dot' style='background:"+s.color+"'></div>";
    h+="<div class='nav-label'>"+s.label+"</div>";
    h+="<div class='nav-chev'>&#9656;</div></div>";
    h+="<div class='nav-pages'>";
    for(var j=0;j<s.pages.length;j++){
      var p=s.pages[j];
      h+="<div class='nav-link"+(cur&&cur.id===p.id?" active":"")+"' data-sec='"+s.id+"' data-page='"+p.id+"'>"+p.title+"</div>";
    }
    h+="</div></div>";
  }
  el.innerHTML=h;
}

function home(){
  cur=null;buildNav();
  $("bc").innerHTML="Home";
  var t=0;for(var i=0;i<S.length;i++)t+=S[i].pages.length;
  var h="<div class='a-header' style='border-bottom:none;margin-bottom:20px;padding-bottom:0'>";
  h+="<div class='a-title' style='font-size:34px'>Operations Manual</div>";
  h+="<div class='a-meta'>Impact Home Team &#8212; "+t+" procedures across "+S.length+" departments</div></div>";
  h+="<p style='font-size:15px;color:var(--steel);margin-bottom:28px'>Find any SOP by browsing departments in the sidebar or using the search bar.</p>";
  h+="<div class='wg'>";
  for(var i=0;i<S.length;i++){
    var s=S[i],d=[];
    for(var j=0;j<Math.min(3,s.pages.length);j++)d.push(s.pages[j].title);
    h+="<div class='wc' data-wsec='"+s.id+"' data-wpage='"+s.pages[0].id+"'>";
    h+="<div class='wc-dot' style='background:"+s.color+"'></div>";
    h+="<div class='wc-title'>"+s.label+"</div>";
    h+="<div class='wc-desc'>"+d.join(", ")+(s.pages.length>3?", ...":"")+"</div>";
    h+="<div class='wc-count'>"+s.pages.length+" procedure"+(s.pages.length>1?"s":"")+"</div></div>";
  }
  h+="</div>";
  $("ct").innerHTML=h;
  window.scrollTo(0,0);mob();
}

function page(secId,pageId){
  var sec=find(S,secId);if(!sec)return;
  var pg=find(sec.pages,pageId);if(!pg)return;
  cur=pg;buildNav();
  $("bc").innerHTML=sec.label+" &nbsp;&#8250;&nbsp; <b>"+pg.title+"</b>";
  var all=[];
  for(var i=0;i<S.length;i++)for(var j=0;j<S[i].pages.length;j++)all.push({p:S[i].pages[j],si:S[i].id});
  var idx=-1;for(var i=0;i<all.length;i++)if(all[i].p.id===pageId){idx=i;break}
  var prev=idx>0?all[idx-1]:null,next=idx<all.length-1?all[idx+1]:null;
  var h="<article><div class='a-header'>";
  h+="<div class='a-dept'>"+pg.dept+"</div>";
  h+="<div class='a-title'>"+pg.title+"</div>";
  h+="<div class='a-meta'>Last updated <b>"+pg.updated+"</b> &#183; Owner: <b>"+pg.owner+"</b></div>";
  h+="</div><div class='a-body'>"+pg.body+"</div><div class='a-nav'>";
  if(prev){
    h+="<div class='a-nav-btn' data-sec='"+prev.si+"' data-page='"+prev.p.id+"'>";
    h+="<div class='a-nav-lbl'>&#8592; Previous</div><div class='a-nav-ttl'>"+prev.p.title+"</div></div>";
  }else h+="<div></div>";
  if(next){
    h+="<div class='a-nav-btn' data-sec='"+next.si+"' data-page='"+next.p.id+"' style='text-align:right'>";
    h+="<div class='a-nav-lbl'>Next &#8594;</div><div class='a-nav-ttl'>"+next.p.title+"</div></div>";
  }
  h+="</div></article>";
  $("ct").innerHTML=h;
  window.scrollTo(0,0);mob();
}

function search(q){
  var el=$("sr");
  if(!q.trim()){el.classList.remove("vis");el.innerHTML="";return}
  var ql=q.toLowerCase(),m=[];
  for(var i=0;i<S.length;i++){var s=S[i];
    for(var j=0;j<s.pages.length;j++){var p=s.pages[j];
      var tm=p.title.toLowerCase().indexOf(ql)>=0;
      var bt=p.body.replace(/<[^>]*>/g," ").toLowerCase();
      var bm=bt.indexOf(ql)>=0;
      if(tm||bm){
        var sn="";
        if(bm){var pos=bt.indexOf(ql),st=Math.max(0,pos-40),en=Math.min(bt.length,pos+ql.length+60);
          sn=(st>0?"...":"")+bt.substring(st,en).trim()+(en<bt.length?"...":"");}
        m.push({p:p,si:s.id,sl:s.label,sn:sn,tm:tm});
      }
    }
  }
  m.sort(function(a,b){return(b.tm?1:0)-(a.tm?1:0)});
  if(!m.length){el.innerHTML="<div class='sr-none'>No results found</div>";}
  else{var h="";for(var i=0;i<Math.min(8,m.length);i++){var x=m[i];
    h+="<div class='sr-item' data-sec='"+x.si+"' data-page='"+x.p.id+"'>";
    h+="<div class='sr-title'>"+x.p.title+"</div>";
    h+="<div class='sr-dept'>"+x.sl+"</div>";
    if(x.sn)h+="<div class='sr-snip'>"+x.sn+"</div>";
    h+="</div>";}el.innerHTML=h;}
  el.classList.add("vis");
}

function tog(){$("sidebar").classList.toggle("open");$("ov").classList.toggle("vis")}
function mob(){if(window.innerWidth<=768){$("sidebar").classList.remove("open");$("ov").classList.remove("vis")}}

// Event delegation - no inline handlers needed
document.addEventListener("click",function(e){
  var t=e.target,el;
  // Nav toggle section
  if((el=t.closest("[data-toggle]"))){var id=el.getAttribute("data-toggle");$("ns-"+id).classList.toggle("open");return}
  // Nav page link
  if((el=t.closest(".nav-link[data-page]"))){page(el.getAttribute("data-sec"),el.getAttribute("data-page"));return}
  // Home link
  if((el=t.closest("[data-home]"))){home();return}
  // Welcome card
  if((el=t.closest("[data-wsec]"))){var si=el.getAttribute("data-wsec");$("ns-"+si)&&$("ns-"+si).classList.add("open");page(si,el.getAttribute("data-wpage"));return}
  // Prev/next nav
  if((el=t.closest(".a-nav-btn[data-page]"))){page(el.getAttribute("data-sec"),el.getAttribute("data-page"));return}
  // Search result
  if((el=t.closest(".sr-item[data-page]"))){page(el.getAttribute("data-sec"),el.getAttribute("data-page"));$("si").value="";$("sr").classList.remove("vis");return}
  // Menu toggle
  if(t.closest(".menu-btn")){tog();return}
  // Overlay close
  if(t.id==="ov"){tog();return}
});

$("si").addEventListener("input",function(){search(this.value)});
home();
</script>
</body>
</html>
