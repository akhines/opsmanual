// AI QUESTION GENERATOR PANEL
// ══════════════════════════════════════════════════════════
function admRenderAiPanel() {
  var qzOpts = '';
  Object.keys(QUIZZES).forEach(function(k) {
    var sel = k === admCurrentQuiz ? ' selected' : '';
    qzOpts += '<option value="' + k + '"' + sel + '>' + QUIZZES[k].title + '</option>';
  });

  return '<div class="adm-card">' +
    '<div class="adm-card-head"><h3>✨ AI Question Generator</h3>' +
      '<span class="adm-card-sub">Paste SOP text → Claude generates quiz questions</span></div>' +
    '<div class="adm-card-body">' +
      '<div class="adm-ai-box">' +
        '<h4>✨ Generate with Claude</h4>' +
        '<div class="adm-ai-note">Paste any SOP, policy, or procedure text below. Claude will generate multiple-choice questions in the exact format used by the training portal.</div>' +
        '<div class="adm-field-row" style="margin-bottom:10px;">' +
          '<div class="adm-field"><label>Target Quiz</label>' +
            '<select class="adm-ai-select" id="ai-quiz-target" style="width:100%;">' + qzOpts + '</select></div>' +
          '<div class="adm-field"><label>Number of Questions</label>' +
            '<select class="adm-ai-select" id="ai-count" style="width:100%;">' +
              '<option value="3">3 questions</option>' +
              '<option value="5" selected>5 questions</option>' +
              '<option value="8">8 questions</option>' +
              '<option value="10">10 questions</option>' +
            '</select></div>' +
        '</div>' +
        '<label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);display:block;margin-bottom:6px;">SOP / Source Text</label>' +
        '<textarea class="adm-ai-textarea" id="ai-sop-text" placeholder="Paste your SOP, process description, or any training content here. The more specific the text, the better the questions."></textarea>' +
        '<div class="adm-ai-controls">' +
          '<button class="adm-btn adm-btn-amber" id="ai-gen-btn" onclick="admGenerateQuestions()">Generate Questions</button>' +
          '<span class="adm-ai-status" id="ai-status"></span>' +
        '</div>' +
      '</div>' +

      '<div id="ai-results" style="margin-top:16px;display:none;">' +
        '<div class="adm-card-head" style="background:var(--amber-pale);border:1px solid #f0d070;border-radius:8px 8px 0 0;margin-bottom:0;">' +
          '<h3 style="color:var(--ink);">Generated Questions</h3>' +
          '<button class="adm-btn adm-btn-green adm-btn-sm" onclick="admAddAllGenerated()">Add All to Quiz</button>' +
        '</div>' +
        '<div id="ai-questions-list" style="border:1px solid #f0d070;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;"></div>' +
      '</div>' +
    '</div></div>';
}

var admGeneratedQuestions = [];

function admGenerateQuestions() {
  var sop = document.getElementById('ai-sop-text').value.trim();
  var count = document.getElementById('ai-count').value;
  var target = document.getElementById('ai-quiz-target').value;
  admCurrentQuiz = target;

  if (!sop) { admToast('Paste SOP text first', 'error'); return; }

  var btn = document.getElementById('ai-gen-btn');
  var status = document.getElementById('ai-status');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  status.textContent = 'Asking Claude to generate ' + count + ' questions…';
  status.className = 'adm-ai-status';

  var prompt = 'You are a quiz question writer for a real estate wholesaling company called Impact Home Team.\n\n' +
    'Based on the following SOP/training content, generate exactly ' + count + ' multiple-choice quiz questions.\n\n' +
    'RULES:\n' +
    '- Each question must have exactly 4 answer choices\n' +
    '- Exactly one choice is correct\n' +
    '- Choices should be plausible — wrong answers should not be obviously wrong\n' +
    '- Include a brief explanation (1-2 sentences) for why the correct answer is right\n' +
    '- Questions should test practical knowledge, not trivia\n\n' +
    'RESPOND WITH ONLY a valid JSON array, no markdown, no backticks, no preamble:\n' +
    '[{"q":"question text","c":["Choice A","Choice B","Choice C","Choice D"],"a":0,"e":"explanation"}]\n\n' +
    'Where "a" is the zero-based index of the correct answer (0=A, 1=B, 2=C, 3=D).\n\n' +
    'SOP CONTENT:\n' + sop;

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    btn.disabled = false;
    btn.textContent = 'Generate Questions';
    var text = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : '';
    var clean = text.replace(/```json|```/g,'').trim();
    try {
      var questions = JSON.parse(clean);
      admGeneratedQuestions = questions;
      status.textContent = '✓ Generated ' + questions.length + ' questions';
      status.className = 'adm-ai-status success';
      admShowGeneratedQuestions(questions);
    } catch(e) {
      status.textContent = 'Parse error — try again or check SOP text';
      status.className = 'adm-ai-status error';
    }
  })
  .catch(function(e) {
    btn.disabled = false;
    btn.textContent = 'Generate Questions';
    status.textContent = 'API error: ' + e.message;
    status.className = 'adm-ai-status error';
  });
}

function admShowGeneratedQuestions(questions) {
  var resultsEl = document.getElementById('ai-results');
  var listEl = document.getElementById('ai-questions-list');
  if (!resultsEl || !listEl) return;
  resultsEl.style.display = 'block';
  var choices = ['A','B','C','D'];
  var html = '';
  questions.forEach(function(q, i) {
    html += '<div style="padding:14px 16px;border-bottom:1px solid #f0d070;background:var(--white);">' +
      '<div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;">' + (i+1) + '. ' + q.q + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px;">' +
        q.c.map(function(ch, ci) {
          var isCorrct = ci === q.a;
          return '<div style="font-size:12px;padding:4px 8px;border-radius:4px;background:' + (isCorrct?'#DCFCE7':'var(--cloud)') + ';color:' + (isCorrct?'#166534':'var(--graphite)') + ';">' +
            '<strong>' + choices[ci] + '</strong> ' + ch + (isCorrct?' ✓':'') + '</div>';
        }).join('') +
      '</div>' +
      '<div style="font-size:11px;color:var(--steel);font-style:italic;">' + (q.e||'') + '</div>' +
      '<button class="adm-btn adm-btn-green adm-btn-sm" style="margin-top:8px;" onclick="admAddSingleGenerated(' + i + ')">Add to Quiz</button>' +
    '</div>';
  });
  listEl.innerHTML = html;
}

function admAddSingleGenerated(i) {
  var q = admGeneratedQuestions[i];
  if (!q) return;
  var target = document.getElementById('ai-quiz-target') ? document.getElementById('ai-quiz-target').value : admCurrentQuiz;
  QUIZZES[target].questions.push(q);
  admDirtyQuizzes = true;
  admToast('Question added to ' + QUIZZES[target].title, 'success');
}

function admAddAllGenerated() {
  var target = document.getElementById('ai-quiz-target') ? document.getElementById('ai-quiz-target').value : admCurrentQuiz;
  admGeneratedQuestions.forEach(function(q) { QUIZZES[target].questions.push(q); });
  admDirtyQuizzes = true;
  admToast('Added ' + admGeneratedQuestions.length + ' questions to ' + QUIZZES[target].title, 'success');
  admGeneratedQuestions = [];
  document.getElementById('ai-results').style.display = 'none';
}

// ══════════════════════════════════════════════════════════
// EXPORT / SYNC PANEL
// ══════════════════════════════════════════════════════════
function admRenderExportPanel() {
  var totalPages = 0; SECTIONS.forEach(function(s){totalPages+=s.pages.length;});
  var totalQ = 0; Object.keys(QUIZZES).forEach(function(k){totalQ+=QUIZZES[k].questions.length;});

  return '<div class="adm-card">' +
    '<div class="adm-card-head"><h3>📤 Export &amp; Sync</h3>' +
      '<span class="adm-card-sub">Copy updated content into the source files</span></div>' +
    '<div class="adm-card-body">' +

      '<div class="adm-stat-row">' +
        '<div class="adm-stat"><strong>' + totalPages + '</strong> pages in manual</div>' +
        '<div class="adm-stat"><strong>' + totalQ + '</strong> total quiz questions</div>' +
        '<div class="adm-stat" style="' + (dirtyCount ? 'border-color:var(--amber);color:var(--amber-dark);' : '') + '">' +
          '<strong>' + dirtyCount + '</strong> unsaved page edits</div>' +
        '<div class="adm-stat"><strong>' + Object.keys(QUIZZES).length + '</strong> quizzes</div>' +
      '</div>' +

      '<div class="adm-export-box">' +
        '<div class="adm-export-head">' +
          '<span>Quiz JSON → replace var QUIZZES in index.html</span>' +
          '<button class="adm-btn adm-btn-amber adm-btn-sm" onclick="admCopyQuizJSON()">Copy to Clipboard</button>' +
        '</div>' +
        '<textarea class="adm-export-textarea" id="adm-quiz-export" readonly></textarea>' +
      '</div>' +

      '<div class="adm-export-box">' +
        '<div class="adm-export-head">' +
          '<span>SECTIONS JSON → replace const SECTIONS in index.html</span>' +
          '<button class="adm-btn adm-btn-amber adm-btn-sm" onclick="admCopySectionsJSON()">Copy to Clipboard</button>' +
        '</div>' +
        '<textarea class="adm-export-textarea" id="adm-sections-export" readonly></textarea>' +
      '</div>' +

      '<div style="background:var(--amber-pale);border:1px solid #f0d070;border-radius:8px;padding:14px 16px;margin-top:4px;">' +
        '<div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;">How to sync these changes permanently:</div>' +
        '<div style="font-size:12px;color:var(--graphite);line-height:1.7;">' +
          'Everything lives in <strong>one file: index.html</strong>.<br>' +
          '<strong>Quiz changes:</strong> Copy the Quiz JSON → find <code>var QUIZZES = {</code> in this file → replace the object.<br>' +
          '<strong>Content changes:</strong> Copy the SECTIONS JSON → find <code>const SECTIONS = [</code> in this file → replace the array.<br>' +
          '<strong>Then:</strong> Push <code>index.html</code> to GitHub. Vercel auto-deploys in ~60 seconds.' +
        '</div>' +
      '</div>' +

    '</div></div>';
}

function admCopyQuizJSON() {
  var json = 'const QUIZZES = ' + JSON.stringify(QUIZZES, null, 2) + ';';
  var ta = document.getElementById('adm-quiz-export');
  if (ta) ta.value = json;
  navigator.clipboard.writeText(json).then(function() {
    admToast('Quiz JSON copied to clipboard', 'success');
  }).catch(function() {
    admToast('Select all text in the box and copy manually', '');
  });
}

function admCopySectionsJSON() {
  // Serialize SECTIONS — strip functions, keep data
  var out = JSON.stringify(SECTIONS, null, 2);
  var ta = document.getElementById('adm-sections-export');
  if (ta) ta.value = 'const SECTIONS = ' + out + ';';
  navigator.clipboard.writeText('const SECTIONS = ' + out + ';').then(function() {
    admToast('SECTIONS JSON copied to clipboard', 'success');
  }).catch(function() {
    admToast('Select all text in the box and copy manually', '');
  });
}

// ══════════════════════════════════════════════════════════
// TOAST UTILITY
// ══════════════════════════════════════════════════════════
function admToast(msg, type) {
  var t = document.getElementById('adm-toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'adm-toast show ' + (type || '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { t.className = 'adm-toast'; }, 3000);
}

init();
</script>
