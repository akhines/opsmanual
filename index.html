<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Impact Home Team — Operations Manual</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23E3A728'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-weight='700' font-size='20' fill='%23fff'%3EI%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--amber:#E3A728;--amber-light:#F5D06B;--crimson:#A52325;--charcoal:#1A1A1A;--graphite:#3A3A3A;--steel:#6B6B6B;--silver:#999;--fog:#E8E8E8;--cloud:#F5F4F1;--white:#FFF;--sidebar-w:290px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cloud);color:var(--graphite);line-height:1.65;overflow-x:hidden}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--charcoal);overflow-y:auto;z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sidebar-header{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:34px;height:34px;background:var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:17px;color:#fff;flex-shrink:0}
.sidebar-title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sidebar-subtitle{font-size:10px;color:var(--silver);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.search-wrap{padding:14px 16px 10px;position:relative}
.search-input{width:100%;padding:9px 14px 9px 36px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:all .2s}
.search-input::placeholder{color:rgba(255,255,255,.35)}
.search-input:focus{background:rgba(255,255,255,.11);border-color:var(--amber);box-shadow:0 0 0 3px rgba(227,167,40,.15)}
.search-icon{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.35);font-size:14px;pointer-events:none}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0 24px}
.nav-section{margin-bottom:2px}
.nav-section-header{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;user-select:none;transition:background .15s}
.nav-section-header:hover{background:rgba(255,255,255,.04)}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:1.2px;text-transform:uppercase;flex:1}
.nav-chev{color:rgba(255,255,255,.25);font-size:11px;transition:transform .2s}
.nav-section.open .nav-chev{transform:rotate(90deg)}
.nav-pages{display:none;padding:0 0 6px}
.nav-section.open .nav-pages{display:block}
.nav-link{display:block;padding:6px 16px 6px 40px;font-size:13px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;border-left:2px solid transparent;line-height:1.4}
.nav-link:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.nav-link.active{color:var(--amber-light);border-left-color:var(--amber);background:rgba(227,167,40,.08);font-weight:500}
.main{margin-left:var(--sidebar-w);min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:rgba(245,244,241,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--fog);padding:12px 36px;display:flex;align-items:center;justify-content:space-between}
.breadcrumb{font-size:13px;color:var(--steel)}
.breadcrumb b{color:var(--graphite);font-weight:500}
.menu-btn{display:none;background:none;border:none;font-size:22px;color:var(--graphite);cursor:pointer;padding:4px 8px}
.content{max-width:800px;margin:0 auto;padding:44px 36px 100px}
.a-header{margin-bottom:36px;padding-bottom:28px;border-bottom:2px solid var(--fog)}
.a-dept{display:inline-block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--crimson);margin-bottom:8px}
.a-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--charcoal);line-height:1.2;margin-bottom:10px}
.a-meta{font-size:13px;color:var(--silver)}
.a-meta b{color:var(--steel);font-weight:500}
.a-body h2{font-size:19px;font-weight:700;color:var(--charcoal);margin:36px 0 14px;padding-top:20px;border-top:1px solid var(--fog)}
.a-body h2:first-child{margin-top:0;padding-top:0;border-top:none}
.a-body h3{font-size:15px;font-weight:600;color:var(--graphite);margin:24px 0 8px}
.a-body p{margin-bottom:12px;font-size:15px}
.a-body ul,.a-body ol{margin:0 0 14px 20px;font-size:15px}
.a-body li{margin-bottom:5px;padding-left:4px}
.a-body strong{color:var(--charcoal);font-weight:600}
.a-body em{color:var(--steel)}
.a-nav{display:flex;gap:14px;margin-top:44px;padding-top:28px;border-top:2px solid var(--fog)}
.a-nav-btn{flex:1;padding:14px 18px;background:var(--white);border:1px solid var(--fog);border-radius:10px;cursor:pointer;transition:all .2s}
.a-nav-btn:hover{border-color:var(--amber);box-shadow:0 2px 12px rgba(227,167,40,.12)}
.a-nav-lbl{font-size:11px;color:var(--silver);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.a-nav-ttl{font-size:14px;font-weight:600;color:var(--charcoal)}
.sr{display:none;padding:6px 10px;max-height:380px;overflow-y:auto}
.sr.vis{display:block}
.sr-item{padding:9px 10px;border-radius:6px;cursor:pointer;transition:background .15s}
.sr-item:hover{background:rgba(255,255,255,.06)}
.sr-title{font-size:13px;color:#fff;font-weight:500}
.sr-dept{font-size:11px;color:var(--silver);margin-top:2px}
.sr-snip{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px;line-height:1.4}
.sr-none{padding:14px 10px;font-size:13px;color:rgba(255,255,255,.4);text-align:center}
.wg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:28px 0}
.wc{padding:22px;background:var(--white);border:1px solid var(--fog);border-radius:12px;cursor:pointer;transition:all .2s}
.wc:hover{border-color:var(--amber);box-shadow:0 4px 20px rgba(227,167,40,.1);transform:translateY(-2px)}
.wc-dot{width:10px;height:10px;border-radius:50%;margin-bottom:12px}
.wc-title{font-size:15px;font-weight:700;color:var(--charcoal);margin-bottom:5px}
.wc-desc{font-size:12px;color:var(--steel);line-height:1.5}
.wc-count{font-size:11px;color:var(--silver);margin-top:10px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-btn{display:block}.content{padding:28px 18px 80px}.a-title{font-size:24px}.wg{grid-template-columns:1fr}.topbar{padding:10px 18px}.overlay.vis{display:block}}
</style>
</head>

<script type="application/json" id="d">[{"id":"company","label":"Company","color":"#E3A728","pages":[{"id":"who-we-are","title":"Who We Are","dept":"Company","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eOur Mission\u003c/h2\u003e\u003cp\u003eImpact Home Team is a Maryland-based real estate investment company focused on wholesale deals and motivated seller acquisition. We help homeowners solve property problems while creating profitable opportunities for our investor network.\u003c/p\u003e\u003ch2\u003eCore Values\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eHit the Mark.\u003c/strong\u003e We do what we say we\u0027re going to do, when we say we\u0027re going to do it. Every interaction is an opportunity to build trust.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClose the Deal.\u003c/strong\u003e Speed and follow-through win. A lead without follow-up is a wasted dollar. We move with urgency and accountability.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eServe the Seller.\u003c/strong\u003e Every homeowner we talk to is a person with a problem. We lead with empathy and deliver honest solutions.\u003c/p\u003e\u003ch2\u003eHow the Business Works\u003c/h2\u003e\u003cp\u003eWe acquire properties from motivated sellers (the A-to-B contract), then sell or assign those contracts to cash buyers in our investor network (the B-to-C contract). Our profit is the spread between the two.\u003c/p\u003e"},{"id":"team-roles","title":"Team Roles \u0026 Responsibilities","dept":"Company","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eRole Ownership\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eAshley\u003c/strong\u003e — Owner / Back End: Transaction Coordination, Dispositions, PPC/Lead Gen oversight, systems \u0026 automation, reporting.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJoshua\u003c/strong\u003e — Front End / Acquisitions: Lead Management oversight, Acquisitions, comping, deal packaging, team training.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNicole\u003c/strong\u003e — Lead Management: Inbound/outbound calls, lead intake, appointment setting, CRM updates.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMike\u003c/strong\u003e — Acquisitions: Seller appointments, offers, contract signing, field work.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTed\u003c/strong\u003e — Dispositions / TC Support: Buyer marketing (Mailchimp, InvestorLift), document coordination, BPOs.\u003c/p\u003e"},{"id":"company-policies","title":"Company Policies","dept":"Company","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eDNC Policy\u003c/h2\u003e\u003cp\u003eWe comply fully with the National Do Not Call Registry. Any seller who requests to not be contacted must be immediately tagged as DNC in the CRM and removed from all active workflows.\u003c/p\u003e\u003ch2\u003eCommunication Standards\u003c/h2\u003e\u003cp\u003eSlack is for internal team communication. GoHighLevel is for all seller and buyer communication. Do not use personal email or personal phone numbers for any business communication. Response time expectation: internal Slack messages within 2 hours during business hours.\u003c/p\u003e\u003ch3\u003eSlack Channels\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e#general\u003c/strong\u003e — Company-wide announcements and non-urgent updates.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#ghl-integration\u003c/strong\u003e — CRM updates, lead alerts, system notifications, and GHL workflow issues.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#impact-lead-management\u003c/strong\u003e — Lead status updates, hot lead alerts, appointment bookings, and lead-related questions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#mike-maryland-deals-updates\u003c/strong\u003e — Mike\u0027s deal-specific updates, appointment outcomes, contract status, and field notes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#transactions\u003c/strong\u003e — TC updates including contract status, closing dates, title issues, DocuSign confirmations, and settlement progress. Ashley and Ted post all deal movement here.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDMs / Group DMs\u003c/strong\u003e — Use for time-sensitive items that need a specific person\u0027s immediate attention. Not for general updates.\u003c/p\u003e\u003ch3\u003eRules\u003c/h3\u003e\u003cp\u003eWhen you send a DocuSign, post confirmation in the relevant Slack channel and tag the team members involved. When a deal changes status, post the update in the appropriate channel. Do not rely on GHL notifications alone — Slack is the backup communication layer that keeps everyone in sync.\u003c/p\u003e"},{"id":"ppc-lead-gen","title":"PPC \u0026 Lead Generation Overview","dept":"Company","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eHow Our Lead Machine Works\u003c/h2\u003e\u003cp\u003eAshley owns all paid lead generation. This page documents the system so that if Ashley is unavailable, the team understands how leads are being generated and what the key levers are.\u003c/p\u003e\u003ch2\u003eGoogle Ads\u003c/h2\u003e\u003cp\u003eGoogle Ads is our primary paid lead source. We run search campaigns targeting motivated sellers in Maryland markets. Key facts:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCampaign structure:\u003c/strong\u003e Campaigns are organized by market area (Baltimore City, Baltimore County, PG County, Anne Arundel, etc.) and by intent level (high intent: \"sell my house fast,\" medium intent: \"cash offer for home\").\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBudget:\u003c/strong\u003e Monthly budget is managed by Ashley and adjusted based on deal flow and cost-per-acquisition targets. If leads slow down significantly, Nicole should flag it in \u003cstrong\u003e#impact-lead-management\u003c/strong\u003e on Slack — it may be a budget or campaign issue.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCost targets:\u003c/strong\u003e Target cost-per-lead varies by market and campaign but the general benchmark is under $150/lead for high-intent campaigns. Cost-per-acquisition (cost per closed deal) target is under $3,000. These are reviewed monthly.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLanding pages:\u003c/strong\u003e Ads drive to dedicated landing pages with cash offer forms. These forms feed directly into GHL as new contacts with the appropriate source tag.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhen to pause/scale:\u003c/strong\u003e Ashley makes all budget decisions. Campaigns are scaled up when cost-per-lead is below target and pipeline needs more leads. Campaigns are paused when cost-per-lead exceeds 2x target for more than 7 days, or when the pipeline is full and appointments are backed up beyond 5 days out.\u003c/p\u003e\u003ch2\u003eFacebook Ads\u003c/h2\u003e\u003cp\u003eFacebook ads are used for retargeting (people who visited our landing page but didn\u0027t fill out the form) and for broader awareness campaigns in target markets. These run at a lower budget than Google Ads and are primarily managed through Facebook Business Manager.\u003c/p\u003e\u003ch2\u003eDirect Mail\u003c/h2\u003e\u003cp\u003eDirect mail campaigns target specific lists: probate filings, tax delinquent properties, and absentee owners. Lists are pulled from DataFlex and other sources, cleaned, and mailed on a schedule coordinated by Ashley. Response from direct mail is tracked using unique phone numbers or UTM-tagged URLs.\u003c/p\u003e\u003ch2\u003eWhat the Team Needs to Know\u003c/h2\u003e\u003cp\u003eYou don\u0027t manage the ads, but you need to know: every lead has a source, and that source is tagged in GHL. When you work a lead, check the source tag so you know what the seller responded to. A seller who filled out a \"sell my house fast\" form has different expectations than one who got a cold direct mail piece. Adjust your approach accordingly.\u003c/p\u003e\u003cp\u003eIf lead volume drops noticeably (fewer than 5 new leads per day for 3+ days), flag it immediately. Don\u0027t assume it\u0027s normal.\u003c/p\u003e"}]},{"id":"lead-mgmt","label":"Lead Management","color":"#2D8A4E","pages":[{"id":"new-lead-process","title":"New Lead Process","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole","body":"\u003ch2\u003eWhen a New Lead Comes In\u003c/h2\u003e\u003cp\u003eEvery new lead enters GoHighLevel automatically. Nicole\u0026#39;s job is to make contact within 5 minutes.\u003c/p\u003e\u003ch2\u003eRequired Fields — Before First Call\u003c/h2\u003e\u003cp\u003eThese fields must be populated on every new lead the moment it enters the system. If any are missing, fill them in before doing anything else:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDate Created\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSeller Type\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNext Contact Date\u003c/strong\u003e — Every lead must have a next contact date at all times. No exceptions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarketing Campaign\u003c/strong\u003e — Which campaign generated this lead (e.g., \u0026quot;Google Ads - Baltimore Motivated Sellers\u0026quot;). This is NOT the same as source — this is the specific campaign.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSource\u003c/strong\u003e — The channel (Google Ads, Facebook, Direct Mail, etc.).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eName\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEmail\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAddress\u003c/strong\u003e\u003c/p\u003e\u003ch2\u003eStep 1: Check the Marketing Campaign\u003c/h2\u003e\u003cp\u003eCheck the marketing campaign tag so you know what the seller responded to. This tells you their mindset — a seller who searched \u0026quot;sell my house fast\u0026quot; has different urgency than one who clicked a Facebook ad. Adjust your approach accordingly. (\u003ca href=\"https://www.loom.com/share/16e5ec73b8c4434cb2c082f465e1b141\" target=\"_blank\"\u003eLoom: Finding Marketing Campaigns\u003c/a\u003e)\u003c/p\u003e\u003ch2\u003eStep 2: Call Immediately from GHL\u003c/h2\u003e\u003cp\u003eCall immediately from GHL using the number the seller called in on, or the appropriate number for that marketing campaign. Never use your personal phone. The call must be placed through GHL/LeadConnector so it is recorded and logged.\u003c/p\u003e\u003ch2\u003eStep 3: Run the 4 Pillars\u003c/h2\u003e\u003cp\u003eCondition, Timeline, Motivation, Price. See the Call Scripts page for the full script.\u003c/p\u003e\u003ch2\u003eStep 4: Qualify or Disqualify Using the Decision Tree\u003c/h2\u003e\u003cp\u003eSee the Decision Tree page. Hits 3-4 pillars = book. Hits 2 = follow up. Hits 0-1 = nurture or dead.\u003c/p\u003e\u003ch2\u003eStep 5: If Qualified, Book the Appointment\u003c/h2\u003e\u003cp\u003eSee Scheduling Appointments in GHL. Move the lead to the correct closer\u0026#39;s pipeline.\u003c/p\u003e\u003ch2\u003eRequired Fields — To Book an Appointment\u003c/h2\u003e\u003cp\u003eAll of these fields MUST be filled in before an appointment can be booked. If any are missing, get them from the seller before scheduling:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStreet Address\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCity\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eState\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePostal Code\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCountry\u003c/strong\u003e (United States)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBedrooms\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBathrooms\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProperty Notes\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMotivation Bucket\u003c/strong\u003e — Determined by answers to the 4 Pillars\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProspect\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNext Action\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAdd To Follow Up\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQ1: Timeline\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQ2: Why Details\u003c/strong\u003e (motivation/reason for selling)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQ3: Condition Notes\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQ4a: Amount Owed\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQ4: Fair Price\u003c/strong\u003e (what the seller thinks the property is worth)\u003c/p\u003e\u003ch2\u003eIf They Don\u0026#39;t Answer\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1. Turn on follow-up automation.\u003c/strong\u003e This activates the missed-call drip sequence. See \u003ca href=\"https://www.loom.com/share/c474d121605e4c03839843b6874b4f86\" target=\"_blank\"\u003eLoom: Turning On Follow-Up Automation\u003c/a\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Set the Next Contact Date.\u003c/strong\u003e Every lead must have a next contact date. If they didn\u0026#39;t answer, set it for the next business day. The system and your daily routine depend on this field being populated.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Leave a voicemail\u003c/strong\u003e (see Voicemail Scripts page) and let the automation handle the rest until they respond.\u003c/p\u003e"},{"id":"decision-tree","title":"Decision Tree","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole","body":"\u003ch2\u003eShould This Lead Get an Appointment?\u003c/h2\u003e\u003cp\u003eAfter running the 4 Pillars, use this decision tree:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHits 3-4 pillars:\u003c/strong\u003e Book appointment immediately → Move to Booked\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHits 2 pillars:\u003c/strong\u003e Schedule callback in 48 hours → Move to Follow Up\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHits 0-1 pillars:\u003c/strong\u003e Tag as low priority → Move to Nurture\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNot a lead:\u003c/strong\u003e Tag as Dead with reason → Move to Dead stage\u003c/p\u003e"},{"id":"scripts","title":"Call Scripts","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole / Joshua","body":"\u003ch2\u003e12-Second Intro\u003c/h2\u003e\u003cp\u003e\"Hi [Name], this is [Your Name] with Impact Home Team. You reached out about your property at [Address] — I just wanted to follow up and see if you\u0027re still thinking about selling?\"\u003c/p\u003e\u003ch2\u003e4 Pillars Script\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eCondition:\u003c/strong\u003e \"Tell me a little about the property — what kind of shape is it in right now?\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTimeline:\u003c/strong\u003e \"If everything worked out, when would you ideally like to have this handled by?\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMotivation:\u003c/strong\u003e \"What\u0027s making you think about selling right now?\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePrice:\u003c/strong\u003e \"Have you thought about what you\u0027d like to get for it?\"\u003c/p\u003e"},{"id":"own-the-day","title":"Own the Day — Daily Routine","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole","body":"\u003ch2\u003eThe Non-Negotiables\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1. Answer every live inbound call.\u003c/strong\u003e This is your highest priority at all times. A ringing phone beats everything else on this schedule. If a seller is calling us, they are ready to talk RIGHT NOW \u0026#8212; if we miss it, they are calling the next investor.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. If a seller or buyer asks to speak with another team member, you must immediately notify that person to call back.\u003c/strong\u003e Do not say \u0026quot;I\u0026#39;ll pass the message along\u0026quot; and forget. The moment someone asks for Joshua, Mike, Ashley, Ted, or anyone else \u0026#8212; you send that person a Slack message or text RIGHT THEN while you are still on the call or within seconds of hanging up. Include the caller\u0026#39;s name, phone number, property address, and what they need. This is not optional. Delayed callbacks cost deals and damage trust.\u003c/p\u003e\u003ch2\u003eDaily Schedule\u003c/h2\u003e\u003ctable style=\"width:100%;border-collapse:collapse;margin:24px 0;font-size:14px\"\u003e\u003cthead\u003e\u003ctr style=\"background:#1A1A1A;color:#fff\"\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728;width:130px\"\u003eTime\u003c/th\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eActivity\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr style=\"background:#FEF7E0\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e8:30 AM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eLogin \u0026amp; Task Review\u003c/strong\u003e\u003cbr\u003eLog into GHL. Check your task list \u0026#8212; callbacks, follow-ups, and action items from yesterday. Review overnight communications: missed calls, new texts, email replies, voicemails. Respond to any hot replies immediately.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e8:45 AM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eProcess New Leads\u003c/strong\u003e\u003cbr\u003eCheck for new leads that came in overnight. For each: verify required fields (Date Created, Seller Type, Next Contact Date, Marketing Campaign, Source, Name, Email, Address), then call immediately from GHL using the appropriate number. If no answer, turn on follow-up automation and set next contact date.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e9:00 AM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eCallbacks \u0026amp; Warm Follow-Ups\u003c/strong\u003e\u003cbr\u003eWork through your scheduled callbacks and any sellers who responded to overnight automation. These are warm touches \u0026#8212; people expecting your call. Priority: Redzones first, then Priority Top 20%, then Follow Ups with today\u0026#39;s next contact date.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#FEF7E0\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e10:00 AM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eSales Huddle (Slack)\u003c/strong\u003e\u003cbr\u003eDaily team check-in on Slack. Share: how many new leads you are working, any hot leads or Redzones, appointments booked, and blockers. Quick \u0026#8212; 5-10 minutes max.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e10:30 AM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eOutbound Calling Block #1\u003c/strong\u003e\u003cbr\u003eHeavy outbound calling. Use the power dialer (\u003ca href=\"https://www.loom.com/share/63482b5ad3b64388935d8a6587d88c05\" target=\"_blank\"\u003eLoom: Power Dialer\u003c/a\u003e). Priority order: \u003cstrong\u003e1) Redzones\u003c/strong\u003e, \u003cstrong\u003e2) Priority Top 20%\u003c/strong\u003e, \u003cstrong\u003e3) Prospects\u003c/strong\u003e (new leads needing first quality conversation), \u003cstrong\u003e4) Follow Ups\u003c/strong\u003e. Between calls, monitor all inbound communication \u0026#8212; texts, missed calls, voicemails. Every inbound response gets handled within 5 minutes.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e12:00 PM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eMidday Pipeline Review\u003c/strong\u003e\u003cbr\u003eQuick pipeline review. Check: are Prospects sitting too long without a conversation? Are there Follow Ups due today that you have not called? A lead should only remain as a Prospect until there is a quality conversation \u0026#8212; then it moves along (Booked, Follow Up, Nurture, or Dead). Every lead must have a next contact date. Fix any that are missing.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e12:30 PM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eLunch\u003c/strong\u003e\u003cbr\u003eTake a break. Keep your phone on \u0026#8212; if an inbound call comes in, answer it.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e1:30 PM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eOutbound Calling Block #2\u003c/strong\u003e\u003cbr\u003eAfternoon calling. Same priority order. This is when sellers who missed your morning call start calling back \u0026#8212; be ready for heavy inbound. Continue processing Prospects and moving leads through the pipeline.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e4:00 PM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eConfirm Tomorrow\u0026#39;s Appointments\u003c/strong\u003e\u003cbr\u003eCall or text every seller with an appointment tomorrow to confirm. If they cancel, immediately work to rebook. Any appointment booked is automatically posted to the \u003cstrong\u003e#appointments\u003c/strong\u003e Slack channel \u0026#8212; verify your bookings are showing up there.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e4:30 PM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eCommunication Sweep\u003c/strong\u003e\u003cbr\u003eFinal sweep of all inbound communication: texts, missed calls, voicemails, emails. Respond to anything unanswered. Check that every non-connection from today has follow-up automation turned on and a next contact date set.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#FEF7E0\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e5:00 \u0026#8211; 6:30 PM\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003ePrime Time Outbound Calling Block #3\u003c/strong\u003e\u003cbr\u003eThis is your highest-conversion calling window. Sellers are home from work, available to talk, and more likely to pick up and set appointments. Focus on: Redzones, hot follow-ups, and Prospects you have not reached earlier in the day. Push hard for appointments during this block \u0026#8212; this is where deals get booked.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8;font-weight:700;color:#1A1A1A\"\u003e6:30 PM+\u003c/td\u003e\u003ctd style=\"padding:12px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u003cstrong\u003eCRM Cleanup \u0026amp; EOD Reporting\u003c/strong\u003e\u003cbr\u003eStop calling. Clean up your pipeline and submit your end-of-day report. See the full EOD checklist below. Do not sign off until this is complete.\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003ch2\u003eEOD Cleanup Checklist (Complete After 6:30 PM)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e\u0026#9744; Prospects reviewed:\u003c/strong\u003e No lead should sit as a Prospect for more than 48 hours without a quality conversation. If you have spoken to them, move them to the appropriate stage. If you have not reached them after 3 attempts, ensure follow-up automation is on and next contact date is set.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u0026#9744; All leads have a Next Contact Date:\u003c/strong\u003e Filter your pipeline for any leads missing a next contact date. Fix every single one. A lead without a next contact date is a lead that will fall through the cracks.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u0026#9744; All non-connections on follow-up automation:\u003c/strong\u003e Any lead you called today but did not reach must have follow-up automation turned on. No exceptions. (\u003ca href=\"https://www.loom.com/share/c474d121605e4c03839843b6874b4f86\" target=\"_blank\"\u003eLoom: Turning On Follow-Up Automation\u003c/a\u003e)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u0026#9744; Notes updated:\u003c/strong\u003e Every lead you spoke to today should have a note logged with what was discussed and what the next step is.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u0026#9744; Tags accurate:\u003c/strong\u003e Dead leads tagged with the correct Dead reason. DNC contacts tagged and removed from outreach. Source tags verified on new leads.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u0026#9744; Pipeline stages current:\u003c/strong\u003e No leads sitting in the wrong stage. If you booked an appointment, that lead should already be in the closer\u0026#39;s pipeline \u0026#8212; not still in Prospects or Follow Up.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u0026#9744; Tasks cleared:\u003c/strong\u003e All tasks due today should be completed or rescheduled with a note explaining why.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u0026#9744; EOD Report submitted:\u003c/strong\u003e Submit your end-of-day report before signing off. The report includes: dials, connections, appointments booked, offers made, and any hot leads or Redzones to watch. Do not sign off without submitting this.\u003c/p\u003e\u003ch2\u003eSlack Channel Awareness\u003c/h2\u003e\u003cp\u003eThroughout the day, keep an eye on these channels:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#appointments:\u003c/strong\u003e Every appointment booked auto-posts here. Verify your bookings appear. Closers monitor this channel to prep.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#transactions:\u003c/strong\u003e Each property under contract gets its own thread by address. TC updates, closing status, and issues are posted here.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#dispositions:\u003c/strong\u003e Offers received on active deals are posted here. Dispo communicates updates in the property-specific thread for each address.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#impact-lead-management:\u003c/strong\u003e Your home channel. Post appointment bookings, hot lead alerts, and questions. Tag the closer when you book for them.\u003c/p\u003e\u003ch2\u003eKey Rules\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eLive inbound calls beat everything.\u003c/strong\u003e If a seller is calling, drop what you are doing and answer.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTransfer requests are immediate.\u003c/strong\u003e If someone asks to speak with another team member, notify that person RIGHT NOW via Slack or text with: caller name, phone number, property address, and what they need. Do not delay. Do not forget.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProspects do not sit.\u003c/strong\u003e A lead only stays as a Prospect until you have a quality conversation. Then it moves.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvery lead has a next contact date.\u003c/strong\u003e No exceptions. No orphan leads.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNon-connections get automation.\u003c/strong\u003e If you did not reach them, follow-up automation must be on before you move to the next lead.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5-6:30 PM is prime time.\u003c/strong\u003e This is your best window for reaching sellers and booking appointments. Treat it like your most important calling block of the day.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCRM cleanup is not optional.\u003c/strong\u003e A dirty CRM costs deals. Do it every day after 6:30 PM. Do not sign off until the EOD report is submitted.\u003c/p\u003e"},{"id":"kpi-reporting","title":"Reporting KPIs","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole / Joshua","body":"\u003ch2\u003eWeekly Scorecard Definitions\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eLeads:\u003c/strong\u003e New unique property addresses entering the pipeline. Count by address, not contact.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProspects:\u003c/strong\u003e Contacts who engaged but aren\u0027t yet qualified.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBooked:\u003c/strong\u003e Appointments scheduled this week (separate in-person vs. virtual).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCompleted:\u003c/strong\u003e Appointments that actually happened.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eShow Rate:\u003c/strong\u003e Completed ÷ Booked (calculate separately for in-person and virtual).\u003c/p\u003e"},{"id":"scheduling-appointments","title":"Scheduling Appointments in GHL","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole","body":"\u003ch2\u003eHow to Book an Appointment in GoHighLevel\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eStep 1: Open the contact card.\u003c/strong\u003e Find the qualified lead in your pipeline and click into their contact record.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 2: Click \"Appointments\" on the contact card.\u003c/strong\u003e This opens the scheduling widget linked to the team calendar. Select the calendar for the appointment type — \"In-Person Seller Appointment\" or \"Virtual Cash Offer Appointment.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 3: Choose the date and time.\u003c/strong\u003e GHL will only show available slots based on Joshua\u0027s and Mike\u0027s calendar availability. Pick the earliest available slot. If the seller has a specific preference, check that slot is open before confirming.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 4: Fill in the appointment details.\u003c/strong\u003e Add the property address in the appointment title (format: \"Seller Appt — 123 Main St, Baltimore\"). In the notes field, paste a brief summary: seller name, motivation, 4 Pillar highlights, and any access instructions (gate code, parking, etc.).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 5: Assign to the right person.\u003c/strong\u003e In-person appointments go to Mike or Joshua based on territory. Virtual appointments go to Joshua unless otherwise directed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 6: Confirm and notify.\u003c/strong\u003e Once booked, GHL automatically sends the seller a confirmation text and email. Post in \u003cstrong\u003e#impact-lead-management\u003c/strong\u003e on Slack: \"Booked: [Address] — [Date/Time] — [In-Person/Virtual] — assigned to [Name].\" Tag the acquisitions person.\u003c/p\u003e\u003ch3\u003eRescheduling\u003c/h3\u003e\u003cp\u003eIf a seller needs to reschedule, open the appointment in GHL, click \"Reschedule,\" pick the new time, and GHL will send updated confirmations. Update Slack with the change. Log the reschedule — this counts separately on the scorecard.\u003c/p\u003e\u003ch3\u003eCancellations\u003c/h3\u003e\u003cp\u003eIf a seller cancels, update the appointment status to \"Cancelled\" in GHL. Do NOT delete it — cancelled appointments are tracked on the scorecard. Add a note with the reason. If the seller wants to rebook later, create a new appointment rather than editing the cancelled one.\u003c/p\u003e"},{"id":"sample-calls","title":"Sample Calls","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole / Joshua","body":"\u003ch2\u003eWhat Makes a Good Call\u003c/h2\u003e\u003cp\u003eListen to these calls as training references. Good calls share these traits: the lead manager sounds confident and relaxed (not scripted), they let the seller talk more than they do, they dig deeper on motivation (the first answer is never the real reason), and they transition to booking naturally without pressure.\u003c/p\u003e\u003ch2\u003eCall Review Criteria\u003c/h2\u003e\u003cp\u003eWhen reviewing calls (your own or for training), evaluate on these five points:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Opening (0-15 seconds):\u003c/strong\u003e Did they use the 12-Second Intro? Was it natural, not robotic? Did they get the seller talking within the first 15 seconds?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Discovery (4 Pillars):\u003c/strong\u003e Did they cover all four pillars? Did they dig deeper than surface-level answers? Did they uncover the real motivation?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Rapport:\u003c/strong\u003e Did the conversation feel like a real conversation or an interrogation? Did the lead manager mirror the seller\u0027s energy and pace?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Transition to Booking:\u003c/strong\u003e Was the appointment ask smooth and confident? Did they offer specific times rather than leaving it open-ended?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. CRM Discipline:\u003c/strong\u003e Were notes entered during or immediately after the call? Were all 4 Pillar fields filled in? Was the pipeline stage updated?\u003c/p\u003e\u003ch2\u003eWhere to Find Recordings\u003c/h2\u003e\u003cp\u003eAll call recordings are stored in the contact\u0027s conversation timeline in GHL under the phone icon. You can also access recordings in LeadConnector\u0027s call log. Joshua reviews calls weekly as part of the scorecard review — if a call is flagged as a training example (good or bad), it gets tagged in GHL with \"Training Call.\"\u003c/p\u003e"},{"id":"texting-sop","title":"Texting SOP","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole","body":"\u003ch2\u003eWhen to Text\u003c/h2\u003e\u003cp\u003eText is a supplement to calling, not a replacement. Use texting for: initial outreach when a call goes unanswered, appointment confirmations and reminders, quick follow-ups after a conversation, and re-engaging cold leads in the nurture pipeline.\u003c/p\u003e\u003ch2\u003eRules\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eAlways text from GHL/LeadConnector.\u003c/strong\u003e Never use your personal phone. Texts from GHL are tracked, logged, and feed into automation — personal texts are invisible to the system.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKeep it short and personal.\u003c/strong\u003e Texts should read like a real person wrote them, not like a template. Use their name. Reference something specific from the conversation if you\u0027ve spoken before.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNo spam.\u003c/strong\u003e Maximum 2 manual texts per day to the same contact. If they haven\u0027t responded after 3 texts across 3 days, let the automated drip take over.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRespect opt-outs.\u003c/strong\u003e If a seller replies STOP, they are immediately removed from all text sequences. GHL handles this automatically, but if you see a STOP reply, do not attempt to text them again manually.\u003c/p\u003e\u003ch2\u003eText Templates\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eFirst outreach (missed call):\u003c/strong\u003e \"Hi [Name], this is [Your Name] with Impact Home Team. I just tried calling about your property at [Address]. When\u0027s a good time to chat?\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePost-conversation follow-up:\u003c/strong\u003e \"Hey [Name], great talking with you today. I\u0027ll follow up [day] like we discussed. In the meantime, feel free to text me here if anything comes up.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAppointment reminder (manual, if automation didn\u0027t fire):\u003c/strong\u003e \"Hi [Name], just confirming your appointment tomorrow at [Time] at [Address] with [Person]. See you there!\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRe-engagement (cold lead):\u003c/strong\u003e \"Hey [Name], checking in — still thinking about selling [Address]? We\u0027re still interested if the timing is right.\"\u003c/p\u003e\u003ch2\u003eCompliance\u003c/h2\u003e\u003cp\u003eAll outbound texts must comply with TCPA regulations. We only text leads who have initiated contact with us or have given express consent. The GHL system handles consent tracking, but if you\u0027re ever unsure, ask Ashley before sending.\u003c/p\u003e"},{"id":"follow-up-automation","title":"Follow-Up Automation","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole / Ashley","body":"\u003ch2\u003eHow the Automation System Works\u003c/h2\u003e\u003cp\u003eGHL workflows handle most follow-up automatically based on lead stage and trigger events. Your job is to make sure leads are in the correct stage with the correct tags — the system does the rest. If a workflow is not firing, do NOT try to replicate it manually. Post in \u003cstrong\u003e#ghl-integration\u003c/strong\u003e on Slack and tag Ashley.\u003c/p\u003e\u003ch2\u003eMissed Call Sequence\u003c/h2\u003e\u003cp\u003eWhen an inbound call is missed or an outbound call goes unanswered, GHL triggers the missed call workflow:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e+2 minutes:\u003c/strong\u003e Text — \"Hey [Name], sorry I missed your call. This is [Agent Name] with Impact Home Team. I\u0027ll try you again shortly, or feel free to text me back here.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e+4 hours:\u003c/strong\u003e Text — \"Hi [Name], just wanted to follow up. I\u0027m available if you have a few minutes to chat about your property.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e+Next morning 9 AM:\u003c/strong\u003e Text — \"Good morning [Name]. Trying to reach you one more time about [Street]. Call or text me when it\u0027s convenient.\"\u003c/p\u003e\u003cp\u003eIf no response after the 3-text sequence, the lead stays in its current stage and is added to the long-term drip.\u003c/p\u003e\u003ch2\u003ePost-Conversation Follow-Up (Not Qualified)\u003c/h2\u003e\u003cp\u003eWhen Nicole talks to a lead but they don\u0027t qualify for an appointment yet:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eManual action:\u003c/strong\u003e Tag as \"Follow Up,\" set a callback task for 48 hours, and add a note with the reason.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAutomated:\u003c/strong\u003e GHL sends a soft-touch text 48 hours after the tag is applied: \"Hey [Name], just checking in. If anything changes with [Street], we\u0027re here to help.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 7:\u003c/strong\u003e Email with general info about how the cash offer process works.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 14:\u003c/strong\u003e Text — \"Hi [Name], still thinking about your options for [Street]? Happy to answer any questions.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 30+:\u003c/strong\u003e Lead enters the long-term nurture sequence (monthly touch via email and quarterly text).\u003c/p\u003e\u003ch2\u003ePost-Appointment Confirmation Sequence\u003c/h2\u003e\u003cp\u003eWhen an appointment is booked in GHL, the confirmation workflow fires automatically:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImmediately:\u003c/strong\u003e Text + email with appointment date, time, and address confirmation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e-24 hours:\u003c/strong\u003e Reminder text — \"Just a reminder about your appointment tomorrow at [Time] at [Address] with [Agent].\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e-2 hours:\u003c/strong\u003e Final reminder text — \"See you at [Time] today! [Agent] is looking forward to meeting you.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNo-show trigger:\u003c/strong\u003e If the appointment is marked as no-show, GHL sends: \"Hey [Name], looks like we missed each other today. Want to reschedule? Just text me a time that works.\"\u003c/p\u003e\u003ch2\u003eLong-Term Nurture Sequence\u003c/h2\u003e\u003cp\u003eLeads that go cold (no response after 30 days) enter the long-term nurture. This runs indefinitely until the lead responds, is tagged Dead, or opts out:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMonthly:\u003c/strong\u003e Email with market update, recent case study, or \"We\u0027re still buying in [Area]\" message.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuarterly:\u003c/strong\u003e Text — short, personal check-in. \"Hey [Name], [Your Name] here. Still interested in selling [Street]? We\u0027re still buying in the area.\"\u003c/p\u003e\u003ch2\u003eTroubleshooting\u003c/h2\u003e\u003cp\u003eIf a workflow isn\u0027t firing: check that the contact has the correct pipeline stage, check that the correct tag is applied, check the workflow\u0027s enrollment conditions in GHL, and check the contact\u0027s \"Do Not Disturb\" settings. If none of that resolves it, escalate to Ashley via \u003cstrong\u003e#ghl-integration\u003c/strong\u003e.\u003c/p\u003e"},{"id":"dead-lead-management","title":"Dead Lead Management","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole / Joshua","body":"\u003ch2\u003eCore Rule: Never Delete a Dead Lead\u003c/h2\u003e\u003cp\u003eDead leads stay in the system forever. Deleting contacts destroys reporting data, breaks source attribution, and makes it impossible to calculate true cost-per-deal. When a lead is dead, you tag it — you do not delete it.\u003c/p\u003e\u003ch2\u003eValid Dead Reasons\u003c/h2\u003e\u003cp\u003eEvery dead lead must be tagged with one of these standardized reasons. Do not make up your own tags — consistency is critical for reporting.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - Wrong Number:\u003c/strong\u003e Phone number is disconnected, wrong person, or invalid.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - Not Interested:\u003c/strong\u003e Seller explicitly said they do not want to sell. Not the same as \"didn\u0027t answer\" — that\u0027s Follow Up, not Dead.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - Listed with Agent:\u003c/strong\u003e Property is currently listed on the MLS with a real estate agent.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - Price Too High:\u003c/strong\u003e Seller wants retail or above-market price and won\u0027t negotiate. Use this only after at least 2 conversations where price was discussed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - No Equity:\u003c/strong\u003e Seller owes more than the property is worth. No deal structure works.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - DNC:\u003c/strong\u003e Seller requested to be placed on our Do Not Call list. This is a legal compliance tag — once applied, all outreach stops permanently.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - Duplicate:\u003c/strong\u003e This contact is a duplicate of another record for the same property. Note the primary contact ID in the notes field before tagging.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - Not a Seller:\u003c/strong\u003e Person is a tenant, a neighbor, a realtor fishing, or otherwise not the property owner.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDead - Property Sold:\u003c/strong\u003e Property has already been sold to someone else.\u003c/p\u003e\u003ch2\u003eHow to Tag a Dead Lead in GHL\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eStep 1:\u003c/strong\u003e Open the contact record. Add a note explaining why this lead is dead — one sentence is fine. Example: \"Called 3x, seller firm at $350K, ARV only $280K. No deal here.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 2:\u003c/strong\u003e Add the tag \"Dead - [Reason]\" using the exact tags listed above.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 3:\u003c/strong\u003e Move the opportunity to the Dead stage in the pipeline.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 4:\u003c/strong\u003e Do NOT remove the lead source tag. The source tag must stay so we can report on cost-per-lead by source even for dead leads.\u003c/p\u003e\u003ch2\u003eRecycling Dead Leads\u003c/h2\u003e\u003cp\u003eEvery 90 days, Ashley runs a dead lead review. Leads tagged \"Dead - Not Interested\" and \"Dead - Price Too High\" that are older than 90 days get moved to a \"Recycle\" list for one more outreach attempt. Circumstances change — sellers who said no 3 months ago may be ready now. Leads tagged DNC, Wrong Number, Duplicate, or Not a Seller are never recycled.\u003c/p\u003e"},{"id":"lead-source-attribution","title":"Lead Source Attribution \u0026 Tracking","dept":"Lead Management","updated":"Mar 2026","owner":"Ashley / Nicole","body":"\u003ch2\u003eWhy Source Tracking Matters\u003c/h2\u003e\u003cp\u003eEvery dollar we spend on marketing needs to be traceable to the leads it produces, the appointments it generates, and the deals it closes. Without accurate source tagging, we cannot calculate cost-per-lead, cost-per-acquisition, or ROI by channel — which means we are guessing where to spend money.\u003c/p\u003e\u003ch2\u003eLead Source Tags\u003c/h2\u003e\u003cp\u003eEvery contact in GHL must have exactly one lead source tag from this list. If a lead comes in through multiple channels, tag the FIRST point of contact.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGoogle Ads - [Campaign Name]:\u003c/strong\u003e Leads from PPC campaigns. The campaign name should match the Google Ads campaign (e.g., \"Google Ads - Baltimore Motivated Sellers,\" \"Google Ads - MD Cash Offer\").\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFacebook Ads - [Campaign Name]:\u003c/strong\u003e Leads from paid Facebook/Instagram campaigns.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDirect Mail - [List Name]:\u003c/strong\u003e Responses from direct mail drops. Include the list identifier (e.g., \"Direct Mail - Probate Mar2026,\" \"Direct Mail - Tax Delinquent Q1\").\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDataFlex Import:\u003c/strong\u003e Leads imported from DataFlex estate/probate data pulls.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDriving for Dollars:\u003c/strong\u003e Properties identified through field driving and manual outreach.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReferral - [Source]:\u003c/strong\u003e Leads referred by past sellers, buyers, agents, attorneys, etc. Note who referred (e.g., \"Referral - John Smith buyer\").\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOrganic - Website:\u003c/strong\u003e Leads who filled out a form on the website without clicking a paid ad.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOrganic - SEO:\u003c/strong\u003e Leads from organic search traffic.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCold Call - [List]:\u003c/strong\u003e Outbound cold call campaigns with list identifier.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInvestorLift Inbound:\u003c/strong\u003e Buyers or sellers who found us through InvestorLift.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eText Blast Response:\u003c/strong\u003e Leads responding to outbound text campaigns.\u003c/p\u003e\u003ch2\u003eTagging Rules\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eTag at first contact.\u003c/strong\u003e Source gets tagged when the lead enters the system or when Nicole makes first contact — whichever happens first. Do not change the source tag later.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOne source per lead.\u003c/strong\u003e If a seller saw our Google ad AND got a direct mail piece, the source is whichever they responded to first.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePreserve through the pipeline.\u003c/strong\u003e Source tags must stay on the contact from New Lead all the way through Settled. They are never removed, even on dead leads. This is how we calculate full-funnel ROI.\u003c/p\u003e\u003ch2\u003eMonthly Reporting\u003c/h2\u003e\u003cp\u003eAshley pulls source attribution reports on the 1st of each month. The report shows: leads by source, cost per lead by source, appointments by source, contracts by source, closings by source, revenue by source, and ROI by source. Any source with a cost-per-acquisition above $5,000 gets reviewed for budget reallocation.\u003c/p\u003e"},{"id":"voicemail-scripts","title":"Voicemail \u0026 RVM Scripts","dept":"Lead Management","updated":"Mar 2026","owner":"Nicole","body":"\u003ch2\u003eLive Voicemail Script\u003c/h2\u003e\u003cp\u003eWhen you call and get voicemail, leave a message every time on the first 3 attempts. Keep it under 20 seconds. Sound like a real person, not a telemarketer.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFirst attempt:\u003c/strong\u003e \"Hey [Name], this is [Your Name] with Impact Home Team. I\u0027m calling about your property on [Street Name]. Give me a call back when you get a chance — my number is [LeadConnector number]. Talk soon.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSecond attempt (next day):\u003c/strong\u003e \"Hi [Name], [Your Name] again from Impact Home Team. Just following up on [Street Name] — wanted to see if you had a few minutes to chat about the property. Call or text me back at [number]. Thanks!\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThird attempt (2 days later):\u003c/strong\u003e \"Hey [Name], this is [Your Name] one more time. I\u0027ve been trying to reach you about [Street Name]. If you\u0027re still thinking about selling, I\u0027d love to chat. If not, no worries at all. My number is [number] — feel free to call or text anytime.\"\u003c/p\u003e\u003cp\u003eAfter 3 voicemails with no callback, stop leaving messages and let the automated text/email drip take over. If they respond to an automated message later, resume live calling.\u003c/p\u003e\u003ch2\u003eVoicemail Dos and Don\u0027ts\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eDo:\u003c/strong\u003e Use the street name (not full address) — it sounds more personal. Speak at a relaxed pace. Smile when you talk (it changes your tone). Keep it under 20 seconds.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDon\u0027t:\u003c/strong\u003e Leave your full company pitch. Say \"I\u0027m an investor\" or \"I buy houses.\" Sound rushed or read from a script word-for-word. Leave more than 3 voicemails without a response.\u003c/p\u003e\u003ch2\u003eRingless Voicemail (RVM) Drops\u003c/h2\u003e\u003cp\u003eRVM campaigns are coordinated by Ashley through GHL workflows. These are pre-recorded messages that go directly to voicemail without the phone ringing. Nicole does not manually send RVMs — they are triggered by workflows based on lead stage and timing.\u003c/p\u003e\u003cp\u003eIf you notice an RVM campaign is not firing (leads in the right stage are not getting drops), post in \u003cstrong\u003e#ghl-integration\u003c/strong\u003e on Slack and tag Ashley.\u003c/p\u003e"},{"id":"bpo-procedures","title":"BPO Procedures","dept":"Lead Management","updated":"Mar 2026","owner":"Ted","body":"\u003ch2\u003eWhen to Order a BPO\u003c/h2\u003e\u003cp\u003eA Broker Price Opinion (BPO) is ordered when we need a third-party valuation to support our offer or provide to a buyer. Order a BPO when: the deal is over $200K ARV, comps are thin or conflicting, the property is unique (large lot, mixed-use, non-standard), or a buyer specifically requests one.\u003c/p\u003e\u003ch2\u003eProcess\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eStep 1: Check the BPO card balance.\u003c/strong\u003e Log into the BPO vendor account and verify there\u0027s sufficient balance. If the balance is low, post in \u003cstrong\u003e#impact-lead-management\u003c/strong\u003e on Slack tagging Ashley: \"BPO card needs refill — balance is $[amount]. Need to order for [Address].\" Do not proceed until the card is funded.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 2: Submit the order.\u003c/strong\u003e Enter the property address, contact name and phone for access, any gate codes or lockbox info, and preferred appointment windows. Double-check the address matches exactly what\u0027s on the A-B contract.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 3: Track the order.\u003c/strong\u003e BPOs typically take 3-5 business days. If the deal has a tight inspection deadline, note the urgency in the order and follow up with the vendor at the 3-day mark.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 4: Review and distribute.\u003c/strong\u003e When the BPO comes back, review it for accuracy — does the valuation align with your comp research? If there\u0027s a significant discrepancy (more than 10% off your ARV), flag it to Joshua for discussion before sharing with the buyer.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 5: Upload and notify.\u003c/strong\u003e Upload the BPO report to the opportunity card in GHL. Post in Slack: \"BPO received for [Address] — $[Value]. Uploaded to GHL.\" Tag Joshua and whoever requested it.\u003c/p\u003e\u003ch2\u003eCost Tracking\u003c/h2\u003e\u003cp\u003eEach BPO costs approximately $45-75. These costs should be tracked and deducted from Net Profit on the deal when it settles. Note the BPO cost in the opportunity card notes field.\u003c/p\u003e"}]},{"id":"acquisitions","label":"Acquisitions","color":"#A52325","pages":[{"id":"the-playbook","title":"The Playbook — 7 Phases","dept":"Acquisitions","updated":"Mar 2026","owner":"Joshua / Mike","body":"\u003ch2\u003eYour Job in One Sentence\u003c/h2\u003e\u003cp\u003eGo to appointments, build rapport with the seller, assess the property, and get a signed A-to-B contract at a price that leaves room for our buyer spread.\u003c/p\u003e\u003ch2\u003ePrinciples: The North Star\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1.\u003c/strong\u003e Time kills all deals.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\u003c/strong\u003e Pull the future forward. Collapse time frames. Why not now?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\u003c/strong\u003e Closing is a series of micro-agreements.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\u003c/strong\u003e If it is not a \u0026quot;Yes,\u0026quot; it is a no.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\u003c/strong\u003e Never miss a big opportunity. Small opportunities block big ones.\u003c/p\u003e\u003ch2\u003eOrder of Operations for Programs\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1) Cash\u003c/strong\u003e (Cash Offer Program) \u0026rarr; \u003cstrong\u003e2) Creative\u003c/strong\u003e (Seller finance, Novation, Sub 2, LIC / No Bank, White Glove, Creative Buyer Programs) \u0026rarr; \u003cstrong\u003e3) Retail\u003c/strong\u003e (Retail Agent).\u003c/p\u003e\u003cp\u003eYou must only offer on one program at a time. Before moving to the next, you and the seller must both agree the first will not work.\u003c/p\u003e\u003ch2\u003eQuick Start Overview\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003ePhase 1:\u003c/strong\u003e Warmup with 12 Seconds \u0026rarr; advanced agreement\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 2:\u003c/strong\u003e Qualification (4 Pillars) while you look up comps\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 3:\u003c/strong\u003e Deep Dive \u0026rarr; Problem, Impact and Picture Perfect questions\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 4:\u003c/strong\u003e Fast Comp Scan \u0026rarr; cash offer program framing\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 5:\u003c/strong\u003e Deal Killers (logistics/relationships) \u0026rarr; handle before discussing price\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 6:\u003c/strong\u003e One-Call Close Flow \u0026rarr; trial close \u0026rarr; send agreement \u0026rarr; walk through live\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 7:\u003c/strong\u003e Second Call Scheduled / Next Steps Clear\u003c/p\u003e\u003ch2\u003ePhase 1: Warmup with 12 Seconds\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eGoal:\u003c/strong\u003e 12 seconds buys you 2 minutes. Use it word for word.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLine 1:\u003c/strong\u003e \u0026quot;Hey [first name]...?\u0026quot; \u0026mdash; Say only their first name with a slightly higher pitch. This is a curiosity hook and differentiates you from a cold caller.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLine 2:\u003c/strong\u003e \u0026quot;Hey, it\u0026#39;s [your first name], how are you?\u0026quot; \u0026mdash; Their mind races: \u0026quot;Josh from church? Josh the neighbor\u0026#39;s son?\u0026quot; Asking \u0026quot;how are you\u0026quot; is a pattern interrupt because no cold caller asks that.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLine 3:\u003c/strong\u003e \u0026quot;Oh good, I\u0026#39;m great thank you. I had a note to give you a call back about [Street Name]. Got a minute or two?\u0026quot; \u0026mdash; \u0026quot;I had a note\u0026quot; infers you spoke previously. This lets you enter the conversation at a much deeper level than a cold call.\u003c/p\u003e\u003cp\u003e12 Seconds prevents 95% of initial hangups and buys you the first 2 minutes.\u003c/p\u003e\u003ch2\u003ePhase 2: Qualification (4 Pillars of Motivation)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eGoal:\u003c/strong\u003e Identify motivation and sale readiness. Ask clean, neutral questions. Do not sell yet. Type notes verbatim.\u003c/p\u003e\u003ch3\u003ePillar 1 \u0026mdash; Timeline\u003c/h3\u003e\u003cp\u003e\u0026quot;If we agreed on a fair price and the other important details, when would you \u003cem\u003eideally\u003c/em\u003e like to finalize a sale?\u0026quot;\u003c/p\u003e\u003cp\u003eFollow-up: \u0026quot;Are you thinking days, weeks, or months?\u0026quot;\u003c/p\u003e\u003ch3\u003ePillar 2 \u0026mdash; Why (Motivation)\u003c/h3\u003e\u003cp\u003e\u0026quot;If you did sell to us or anyone else right now, \u003cem\u003ewhy\u003c/em\u003e would you sell?\u0026quot;\u003c/p\u003e\u003cp\u003eExpanders: \u0026quot;Tell me more about that.\u0026quot; \u0026quot;What made you reach out today versus last month?\u0026quot;\u003c/p\u003e\u003ch3\u003ePillar 3 \u0026mdash; Property Condition\u003c/h3\u003e\u003cp\u003e\u0026quot;On a scale of 0-10, where 0 is terrible and 10 is magazine cover \u0026mdash; how would you rate it?\u0026quot;\u003c/p\u003e\u003cp\u003e\u0026quot;What would you do to make it a 10?\u0026quot;\u003c/p\u003e\u003cp\u003eAdditional: Roof/windows updated in last 3 years? Kitchen/bathrooms? Move-in ready? Central HVAC? Basement finished? Vacant or occupied?\u003c/p\u003e\u003ch3\u003ePillar 4 \u0026mdash; Money (Debt \u0026amp; Price)\u003c/h3\u003e\u003cp\u003e\u0026quot;I guess you don\u0026#39;t happen to know how much you owe on it, do you...?\u0026quot;\u003c/p\u003e\u003cp\u003e\u0026quot;If we take care of all of the closing costs and make it super easy, what do you think a \u003cem\u003efair price\u003c/em\u003e might be?\u0026quot;\u003c/p\u003e\u003cp\u003e\u0026quot;Any idea what your neighbors have been selling for?\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCoach note:\u003c/strong\u003e Stay neutral. Avoid reacting to price. You are collecting data.\u003c/p\u003e\u003ch2\u003ePhase 3: Deep Dive\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eGoal:\u003c/strong\u003e Go back to the pain points detected in Phase 2 and dig deeper using the seller\u0026#39;s own words.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProblem questions\u003c/strong\u003e (What do they hope to accomplish?): \u0026quot;What made you decide to call me?\u0026quot; / \u0026quot;What were you hoping I might be able to do for you?\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImpact questions\u003c/strong\u003e (Bleeding neck or paper cut?): \u0026quot;When you say ___, what do you mean?\u0026quot; / \u0026quot;Really...\u0026quot; / \u0026quot;You must be telling me this for a reason. What is it?\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePicture Perfect questions:\u003c/strong\u003e Get the seller to describe their ideal outcome. \u0026quot;In a perfect world, how would this go?\u0026quot;\u003c/p\u003e\u003ch2\u003ePhase 4: Fast Comp Scan\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eGoal:\u003c/strong\u003e Establish reality with local reference points and frame the cash-offer value.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Live comp scan\u003c/strong\u003e (Zillow/Redfin/MLS): Find one anchor, one move-in ready, and one recent full renovation.\u003c/p\u003e\u003cp\u003e\u0026quot;Are you familiar with [ABC Street]? This one sold for 66$...\u0026quot; BE QUIET. Let them react.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Cash-Offer Framing:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u0026quot;Have you ever sold a house in Maryland before?\u0026quot;\u003c/p\u003e\u003cp\u003e\u0026quot;If you sold with a realtor, you would be responsible for 10-11% in fees for commissions, transfer \u0026amp; recordation taxes, title charges, and commissions. We take care of all of those fees. They don\u0026#39;t go away and we don\u0026#39;t get any discount, but we absorb them because we feel it brings certainty and honesty to our clients.\u0026quot;\u003c/p\u003e\u003cp\u003e\u0026quot;Our cash program is simple: we buy as-is, cover closing costs, and schedule closing for when you need it. Costs we do NOT cover: liens, judgments, back taxes, utility bills, and solar panels. In exchange for speed and certainty, we are normally below retail. My job is to find the best number that makes this easy for you.\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Price Ask \u0026rarr; Counter Stack:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u0026quot;Given that we handle all of the hard parts and unwanted fees, what feels like a fair price to you?\u0026quot; (Be silent.)\u003c/p\u003e\u003cp\u003e\u0026quot;Is that the best you could do?\u0026quot; (Soft, one more beat of silence.)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCoach note:\u003c/strong\u003e Do not debate comps. Your leverage is ease, speed, and certainty.\u003c/p\u003e\u003ch2\u003ePhase 5: Deal Killers\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eGoal:\u003c/strong\u003e Surface and resolve blockers BEFORE discussing price specifics.\u003c/p\u003e\u003cp\u003e\u0026quot;Let\u0026#39;s put price aside for a few minutes because usually that\u0026#39;s the easiest part. Selling a house can be a big deal and most of the time it\u0026#39;s things other than price that stop someone. I want to talk about a few of these. Fair enough?\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLogistics:\u003c/strong\u003e \u0026quot;Some logistics include needing to find a new place, moving items, or leaving items behind. Which logistical items should we discuss in your situation?\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRelationships:\u003c/strong\u003e \u0026quot;Besides yourself, is there anyone else on the deed?\u0026quot; / \u0026quot;Would there be anyone you need to run the agreement past \u0026mdash; spouse, family member, loved one?\u0026quot; / \u0026quot;No professionals involved like a CPA, Attorney or Realtor \u0026mdash; it\u0026#39;s just yourself, correct?\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOther:\u003c/strong\u003e \u0026quot;Anything \u0026mdash; big or small \u0026mdash; that could prevent a sale going smoothly?\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAddressing known deal killers:\u003c/strong\u003e \u0026quot;If we could help address [deal killer] for you \u0026mdash; would that even help?\u0026quot; Let the prospect know WE can solve every deal killer.\u003c/p\u003e\u003cp\u003eIf no significant deal killers \u0026rarr; proceed to Phase 6. If 1+ deal killers \u0026rarr; proceed to Phase 7.\u003c/p\u003e\u003ch2\u003ePhase 6: One-Call Close Flow\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eGoal:\u003c/strong\u003e Present, confirm, and send the offer live if decision-makers are present and no significant deal killers exist.\u003c/p\u003e\u003ch3\u003e1. Trial Close\u003c/h3\u003e\u003cp\u003e\u0026quot;If the underwriting department qualifies this at a number that fits, are you comfortable getting the paperwork started today so we can open our title work?\u0026quot;\u003c/p\u003e\u003cp\u003eIf hesitation: \u0026quot;What would be your deciding factor \u0026mdash; price, timing, or something else?\u0026quot;\u003c/p\u003e\u003cp\u003eSet the stage: \u0026quot;The next step should take 2 minutes. I have to connect with the underwriting office and see what we were able to get your property qualified for. When I get back I\u0026#39;ll have the exact number. If it works \u0026mdash; we can talk next steps. If it doesn\u0026#39;t \u0026mdash; at least we know where we stand. Fair enough?\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cem\u003e(Put on hold for 2 minutes)\u003c/em\u003e\u003c/p\u003e\u003ch3\u003e2. Present the Number\u003c/h3\u003e\u003cp\u003e\u0026quot;I spoke with the underwriters. Before we talk about the number, I\u0026#39;d like to walk you through what it looks like if you decide to work with us. At the end, all I ask for is a confident yes or no. If you decide not to work with us, that is perfectly fine too.\u0026quot;\u003c/p\u003e\u003cp\u003eWalk through the process: written offer to email, go through it together (5 min), e-sign, schedule walk-through for photos, TC introduces you to title company, title clears, closing scheduled.\u003c/p\u003e\u003cp\u003eThen restate their motivation, address any roadblocks, and remind them: \u0026quot;This is what you walk away with IN YOUR POCKET minus your mortgage and prorated taxes. You do not pay closing costs, no realtor commissions, sold AS-IS \u0026mdash; no repairs, no cleaning. You move on YOUR timeline.\u0026quot;\u003c/p\u003e\u003cp\u003e\u0026quot;With that being said, your property qualifies for 66666666.\u0026quot;\u003c/p\u003e\u003ch3\u003e3. If Yes \u0026rarr; Send \u0026amp; Walk Through Agreement\u003c/h3\u003e\u003cp\u003e\u0026quot;What\u0026#39;s the best email? Pull it up on your phone. I\u0026#39;ll highlight closing costs, timing, and access so there are no surprises.\u0026quot; Confirm: full legal names on title, occupancy/possession date, and access plan.\u003c/p\u003e\u003ch3\u003e4. Stress Test \u0026amp; Lock-In\u003c/h3\u003e\u003cp\u003e\u0026quot;Sometimes after we open title, other buyers call with \u0026#39;more.\u0026#39; If that happens, what do you think you\u0026#39;ll say? I want you 100% comfortable with what we just agreed to.\u0026quot;\u003c/p\u003e\u003ch3\u003e5. Post-Close (Same Call)\u003c/h3\u003e\u003cp\u003eGet two alternate phone numbers for emergencies. Schedule the first walk-through (lockbox/keys or meet time). Request iPhone-quality photos via text. Give TC contact info: \u0026quot;She will be your contact person for everything from here on out.\u0026quot; Next touch: \u0026quot;Title will be in touch within 48 hours via email.\u0026quot;\u003c/p\u003e\u003ch2\u003ePhase 7: Second Call / Next Steps\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eGoal:\u003c/strong\u003e If you cannot close on call #1, secure a commitment to a confident yes/no on the next touch. The second call is NOT a check-in \u0026mdash; it is a planned closing conversation with a clear decision outcome.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClarify, Quantify, Confirm Loop:\u003c/strong\u003e After they tell you why they will not sign today, loop through each reason: clarify it, quantify it, confirm your understanding, then move to the next one until all are summarized.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSetting the Stage (TARP):\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u0026quot;So when we speak again on [date], it will be super easy and only take about 5-7 minutes to go over what our underwriters have qualified the property for with both you and your [spouse/partner]. If you like it, we can get started promptly. But if you don\u0026#39;t like what you hear then you have my total permission to say no, and I won\u0026#39;t have any hard feelings. Fair enough?\u0026quot;\u003c/p\u003e\u003cp\u003eBefore hanging up: \u0026quot;I\u0026#39;ll confirm with underwriting what the property qualifies for. When I call back, will you have enough info to give a confident yes or no?\u0026quot; Request photos via text before you get off the phone.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCall 2:\u003c/strong\u003e TARP, then repeat Phase 6.\u003c/p\u003e\u003ch2\u003eNovation / White Glove Program\u003c/h2\u003e\u003cp\u003eNovation criteria: Vacant or anytime access, clean/move-in ready or better, no rush on timeline, \u0026quot;just want my number\u0026quot; and not much else matters.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTimeframe objection:\u003c/strong\u003e \u0026quot;Our cash offer program is our fastest, most seamless process where we could guarantee a closing date. Our White Glove program can probably give you more walkaway money but the timeline is more uncertain and definitely longer. It is a tradeoff of timeline and money.\u0026quot;\u003c/p\u003e\u003ch2\u003eValue Stack\u003c/h2\u003e\u003cp\u003eThe offer is never just about the number. It is a package of certainty, speed, convenience, and problem-solving value tailored to the seller\u0026#39;s exact situation. Stack benefits \u003cem\u003ein front of\u003c/em\u003e the number so by the time they hear it, the number feels like the cherry on top. When you cannot add more 66$, add more value.\u003c/p\u003e\u003cp\u003eWays to add value: advance cash, help find next home, cover probate or legal help, rent-back with escrow agreement, take care of squatters/renters.\u003c/p\u003e\u003ch2\u003e3 Ways to Sell, 3 Outcomes\u003c/h2\u003e\u003cp\u003eThere are 3 ways to sell (Realtor, FSBO, Investor) and 3 outcomes (Top Dollar, Speed, Convenience). You can only get 2 out of 3:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRealtor:\u003c/strong\u003e Top dollar + convenience, at the cost of speed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFSBO:\u003c/strong\u003e Hopes for top dollar + convenience, but usually gets neither.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInvestor (us):\u003c/strong\u003e Speed + convenience, at the cost of top dollar.\u003c/p\u003e\u003ch2\u003eApples to Apples Comparison\u003c/h2\u003e\u003cp\u003eMost sellers compare a cash offer to the top-of-market MLS price on Zillow. That is not apples to apples. When you add commissions (5-6%), transfer/recordation taxes, repairs, carrying costs, inspection renegotiations, and months of mortgage payments, the net number looks very different. Fill out the comparison worksheet on every call for sellers who have never sold before or do not understand how proceeds work.\u003c/p\u003e\u003ch2\u003eAgreement Walk-Through (Cash Only)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eKey clauses to highlight:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#4:\u003c/strong\u003e End buyer pays all closing costs unless otherwise stated.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e#5:\u003c/strong\u003e All liens, judgments, mortgages, taxes and utility bills outstanding shall be paid at closing by seller from the purchase price. We cover everything else \u0026mdash; closing costs, commissions, concessions.\u003c/p\u003e\u003cp\u003eAfter walking through: \u0026quot;Please go ahead and read through the rest. Let me know if you have any questions. I\u0026#39;ll check in every 10-20 seconds. While you are doing
