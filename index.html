      { id: 'lm-overview', title: 'Department Overview', dept: 'Lead Management', owner: 'Nicole',
        content: `
<h2>Department Purpose</h2>
<p>Lead Management is the top of the funnel — the team responsible for receiving, qualifying, and routing every inbound seller inquiry to the right next step. The speed and quality of lead management directly determines how many appointments Acquisitions receives each week.</p>

<div class="stat-row">
  <div class="stat-box"><div class="num">15m</div><div class="label">Max first response time</div></div>
  <div class="stat-box"><div class="num">3×</div><div class="label">Call attempts before drip</div></div>
</div>

<h2>Key Responsibilities</h2>
<ul>
  <li>Respond to all inbound leads within 15 minutes during business hours</li>
  <li><strong>Always call back from the number the lead called in to, or reply from the number they texted to</strong> — never use a different number to respond</li>
  <li>Qualify leads using the 4 motivation screens (MIST: Motivation, Issue, Situation, Timeline)</li>
  <li>Book appointments directly in GHL calendar</li>
  <li>Maintain all lead records and stage updates in GHL</li>
  <li>Manage follow-up sequences for non-converting leads</li>
</ul>

<h2>GHL Pipeline Stages — Lead Management</h2>
<p style="font-size:13px;color:var(--steel);margin-bottom:16px;">Lead Management owns the <strong>1) Leads Pipeline</strong>. All inbound leads enter here and are worked by Nicole until they either convert to an appointment (handoff to Closer Pipeline) or are dispositioned out.</p>

<table class="data-table">
  <tr><th colspan="3" style="background:#1a1a2e;letter-spacing:.05em;">1) Leads Pipeline &nbsp;·&nbsp; Owner: Nicole</th></tr>
  <tr><th>Stage</th><th>Definition</th><th>Next Action</th></tr>
  <tr><td><span class="ghl-field">Prospects</span></td><td>New inbound lead — initial qualification not yet done. Nicole owns this lead until it moves forward.</td><td>Call within 15 min. Run MIST screening. Move to Priority Top 20% or Redzones if qualified.</td></tr>
  <tr><td><span class="ghl-field">Redzones</span></td><td>Qualified lead with motivation but not yet top priority — needs nurturing or has a minor obstacle.</td><td>Add to follow-up sequence. Re-evaluate at 30-day check-in.</td></tr>
  <tr><td><span class="ghl-field">Priority Top 20%</span></td><td>High-motivation seller — ready to move, strong fit. Top of Nicole's daily work list.</td><td>Book appointment. Assign to closer calendar. Prepare handoff notes.</td></tr>
  <tr><td><span class="ghl-field">Follow Up</span></td><td>Not ready now but worth keeping warm — 30/60/90-day drip territory.</td><td>Enroll in GHL drip sequence. Set a task reminder. Return to Priority if seller re-engages.</td></tr>
  <tr><td><span class="ghl-field" style="background:#d4edda;color:#155724;">→ Closer Pipeline</span></td><td><strong>Handoff stage.</strong> Appointment is booked and confirmed. Lead Management's job is done — Closer now owns this contact.</td><td>Stage change signals Acquisitions to prepare. Nicole stops all outreach immediately.</td></tr>
  <tr><td><span class="ghl-field">Not MD Lead</span></td><td>Property is outside Maryland or otherwise outside our buy criteria.</td><td>Tag reason and archive. Refer to a partner if applicable. Frees pipeline of unworkable leads.</td></tr>
  <tr><td><span class="ghl-field">Out of Market</span></td><td>Lead is geographically outside our current operating area.</td><td>Tag and archive. Do not leave in active pipeline — pollutes conversion metrics.</td></tr>
  <tr><td><span class="ghl-field">AI Follow Up Queue</span></td><td>Lead has been handed to the AI assistant for automated follow-up sequences.</td><td>Monitor AI responses. Escalate to Nicole immediately if seller re-engages with real intent.</td></tr>
  <tr><td><span class="ghl-field">AI Review</span></td><td>AI flagged this lead for human review — response or behavior triggered a review alert.</td><td>Nicole reviews within same business day. Either re-engage manually or re-route.</td></tr>
</table>

<div class="callout amber" style="margin-top:18px;">
  <div class="callout-icon">⚠️</div>
  <div class="callout-body"><strong>Never leave a lead stale in Prospects.</strong> An uncalled Prospect sitting overnight is a missed opportunity. Two team members may dial simultaneously, or the lead goes cold within hours. Every lead in Prospects needs a same-day first contact attempt.</div>
</div>
`},
      { id: 'lm-new-lead', title: 'New Lead Process', dept: 'Lead Management', owner: 'Nicole',
        content: `
<h2>New Lead Response Protocol</h2>
<div class="callout crimson">
  <div class="callout-icon">📞</div>
  <div class="callout-body">
    <strong>Always call back from the number they called in to, or text back from the number they texted to.</strong> If a lead called your Google Ads number, call them back from that same number. If they texted a campaign line, reply from that line. Calling from a different number causes confusion, distrust, and missed connections. The lead does not know who you are yet — the number is their only reference point.
  </div>
</div>
<div class="callout crimson">
  <div class="callout-icon">⏱</div>
  <div class="callout-body">
    <strong>15-Minute Rule</strong>
    All new leads must receive a first contact attempt within 15 minutes of coming in during business hours (9 AM – 6 PM). Studies show response within 5 minutes increases contact rate by 100×. Speed wins deals.
  </div>
</div>

<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content"><strong>Check the campaign tag</strong> — What marketing source did this lead respond to? Tailor your opening based on their motivation (direct mail vs. Google Ad vs. referral).</div></li>
  <li><div class="step-num">2</div><div class="step-content"><strong>Call immediately</strong> — First call attempt. Use the opening script. If they answer, screen using MIST (Motivation, Issue, Situation, Timeline).</div></li>
  <li><div class="step-num">3</div><div class="step-content"><strong>If no answer:</strong> Send the intro text, call again in 30 minutes, call a third time 1 hour after that. Move to <span class="ghl-field">Redzones</span> or <span class="ghl-field">Follow Up</span> and add to the automated follow-up sequence.</div></li>
  <li><div class="step-num">4</div><div class="step-content"><strong>Log every call</strong> — Date, outcome, seller's stated situation, and next scheduled action. This is required — not optional.</div></li>
  <li><div class="step-num">5</div><div class="step-content"><strong>If qualified:</strong> Book the appointment in GHL. Confirm the address, date/time, and send a confirmation text to the seller.</div></li>
</ol>

<h2>Booking an Appointment in GHL</h2>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content">In the contact record, click <strong>Appointments → New Appointment</strong></div></li>
  <li><div class="step-num">2</div><div class="step-content">Select the correct calendar (In-Person or Virtual)</div></li>
  <li><div class="step-num">3</div><div class="step-content">Set date, time, and assign to the acquisitions agent</div></li>

  <li><div class="step-num">5</div><div class="step-content">Move contact to <span class="ghl-field" style="background:#d4edda;color:#155724;">→ Closer Pipeline</span> stage</div></li>
  <li><div class="step-num">6</div><div class="step-content">Send confirmation text to seller: "Hi [Name], you're confirmed for [Day] at [Time] with [Agent Name] at [Address]. Reply STOP to cancel."</div></li>
</ol>
`},
      { id: 'lm-automation', title: 'Follow-Up Automation', dept: 'Lead Management', owner: 'Nicole',
        content: `
<h2>How the Automation System Works</h2>
<p>GHL workflows handle most follow-up automatically based on lead stage and trigger events. Your job is to make sure leads are in the correct stage with the correct tags — the system does the rest.</p>
<div class="callout crimson">
  <div class="callout-icon">🚫</div>
  <div class="callout-body"><strong>Do NOT replicate workflows manually.</strong> If a workflow is not firing, post in <strong>#ghl-integration</strong> on Slack and tag Ashley. Manual duplication creates double-contact, opt-outs, and bad data.</div>
</div>

<h2>Missed Call Sequence</h2>
<p>When an inbound call is missed or an outbound call goes unanswered, GHL triggers the missed call workflow automatically.</p>
<div class="timeline">
  <div class="tl-item">
    <div class="tl-dot" style="background:#E3A728;"></div>
    <div class="tl-content">
      <div class="tl-time">+2 minutes</div>
      <div class="tl-label">Text</div>
      <div class="tl-msg">"Hey [Name], sorry I missed your call. This is [Agent Name] with Impact Home Team. I'll try you again shortly, or feel free to text me back here."</div>
    </div>
  </div>
  <div class="tl-item">
    <div class="tl-dot" style="background:#E3A728;"></div>
    <div class="tl-content">
      <div class="tl-time">+4 hours</div>
      <div class="tl-label">Text</div>
      <div class="tl-msg">"Hi [Name], just wanted to follow up. I'm available if you have a few minutes to chat about your property."</div>
    </div>
  </div>
  <div class="tl-item">
    <div class="tl-dot" style="background:#E3A728;"></div>
    <div class="tl-content">
      <div class="tl-time">+Next morning 9 AM</div>
      <div class="tl-label">Text</div>
      <div class="tl-msg">"Good morning [Name]. Trying to reach you one more time about [Street]. Call or text me when it's convenient."</div>
    </div>
  </div>
</div>
<p style="font-size:13px;color:var(--steel);margin-top:8px;">If no response after the 3-text sequence, the lead stays in its current stage and is added to the long-term drip.</p>

<h2>Post-Conversation Follow-Up (Not Qualified)</h2>
<p>When Nicole talks to a lead but they don't qualify for an appointment yet:</p>
<div class="callout amber">
  <div class="callout-icon">✋</div>
  <div class="callout-body"><strong>Manual action required:</strong> Tag as <span class="ghl-field">Follow Up</span>, set a callback task for 48 hours, and add a note with the reason. The automation kicks in after this.</div>
</div>
<div class="timeline">
  <div class="tl-item">
    <div class="tl-dot" style="background:#2563EB;"></div>
    <div class="tl-content">
      <div class="tl-time">+48 hours</div>
      <div class="tl-label">Text (automated after tag applied)</div>
      <div class="tl-msg">"Hey [Name], just checking in. If anything changes with [Street], we're here to help."</div>
    </div>
  </div>
  <div class="tl-item">
    <div class="tl-dot" style="background:#2563EB;"></div>
    <div class="tl-content">
      <div class="tl-time">Day 7</div>
      <div class="tl-label">Email</div>
      <div class="tl-msg">General info about how the cash offer process works.</div>
    </div>
  </div>
  <div class="tl-item">
    <div class="tl-dot" style="background:#2563EB;"></div>
    <div class="tl-content">
      <div class="tl-time">Day 14</div>
      <div class="tl-label">Text</div>
      <div class="tl-msg">"Hi [Name], still thinking about your options for [Street]? Happy to answer any questions."</div>
    </div>
  </div>
  <div class="tl-item">
    <div class="tl-dot" style="background:#2563EB;"></div>
    <div class="tl-content">
      <div class="tl-time">Day 30+</div>
      <div class="tl-label">Long-term nurture</div>
      <div class="tl-msg">Monthly email + quarterly text. Runs indefinitely until lead responds, is tagged Dead, or opts out.</div>
    </div>
  </div>
</div>

<h2>Post-Appointment Confirmation Sequence</h2>
<p>When an appointment is booked in GHL, the confirmation workflow fires automatically — no manual action needed.</p>
<div class="timeline">
  <div class="tl-item">
    <div class="tl-dot" style="background:#16a34a;"></div>
    <div class="tl-content">
      <div class="tl-time">Immediately</div>
      <div class="tl-label">Text + Email</div>
      <div class="tl-msg">Appointment date, time, and address confirmation sent to seller.</div>
    </div>
  </div>
  <div class="tl-item">
    <div class="tl-dot" style="background:#16a34a;"></div>
    <div class="tl-content">
      <div class="tl-time">-24 hours</div>
      <div class="tl-label">Reminder Text</div>
      <div class="tl-msg">"Just a reminder about your appointment tomorrow at [Time] at [Address] with [Agent]."</div>
    </div>
  </div>
  <div class="tl-item">
    <div class="tl-dot" style="background:#16a34a;"></div>
    <div class="tl-content">
      <div class="tl-time">-2 hours</div>
      <div class="tl-label">Final Reminder Text</div>
      <div class="tl-msg">"See you at [Time] today! [Agent] is looking forward to meeting you."</div>
    </div>
  </div>
  <div class="tl-item">
    <div class="tl-dot" style="background:#dc2626;"></div>
    <div class="tl-content">
      <div class="tl-time">No-show trigger</div>
      <div class="tl-label">Text (if marked no-show)</div>
      <div class="tl-msg">"Hey [Name], looks like we missed each other today. Want to reschedule? Just text me a time that works."</div>
    </div>
  </div>
</div>

<h2>Seller Check-Back Automation — "Date for Follow Up Automation to Start"</h2>
<p>When a seller says "check back with me in 30 days" (or any future date), do not create a manual task or set Next Contact Date. Instead, use the <span class="ghl-field">Date for Follow Up Automation to Start</span> field. This field triggers a full automated sequence on the exact date you set — texts, emails, and a voicemail drop — so the seller is already warmed up before Nicole makes contact.</p>

<div class="callout amber">
  <div class="callout-icon">📌</div>
  <div class="callout-body"><strong>This applies to all active stages.</strong> Any time a seller gives you a future callback date — regardless of what stage they're in — set this field instead of manually scheduling a task.</div>
</div>

<h2>How to Use It</h2>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content">Open the contact record in GHL.</div></li>
  <li><div class="step-num">2</div><div class="step-content">Find the <span class="ghl-field">Date for Follow Up Automation to Start</span> field and set it to the exact date the seller requested.</div></li>
  <li><div class="step-num">3</div><div class="step-content">Add a dated note: <code>[MM/DD/YY] — Seller requested follow up on [date]. Follow up automation set.</code></div></li>
  <li><div class="step-num">4</div><div class="step-content">Do not set Next Contact Date or create a manual task — the automation handles everything from here.</div></li>
</ol>

<div class="callout crimson">
  <div class="callout-icon">🚫</div>
  <div class="callout-body"><strong>Do not set both fields at the same time.</strong> Setting Next Contact Date AND Date for Follow Up Automation to Start on the same contact will cause both sequences to fire simultaneously — double contact, bad experience for the seller.</div>
</div>

<h2>What the Automation Does on the Start Date</h2>
<table class="data-table">
  <tr><th>Timing</th><th>Channel</th><th>Action</th></tr>
  <tr><td>Start date — morning</td><td>SMS</td><td>Automated text to seller re-introducing IHT and the property</td></tr>
  <tr><td>Start date — morning</td><td>RVM</td><td>Voicemail drop — no call needed from Nicole</td></tr>
  <tr><td>Start date — morning</td><td>Email</td><td>Automated email follow-up to seller</td></tr>
  <tr><td>Start date — same day</td><td>Task</td><td>Task created for Nicole: <span class="ghl-field">Follow up call — automation fired — {{contact.first_name}}</span> due same day</td></tr>
</table>

<p>The automated messages warm the seller before Nicole calls. By the time Nicole dials, the seller has already heard from IHT that morning — the call feels like a natural follow-up, not a cold reach.</p>

<div class="callout blue">
  <div class="callout-icon">ℹ</div>
  <div class="callout-body"><strong>After the automation fires,</strong> Nicole works the task as normal — calls the seller, sets Last Contact Outcome, and sets Next Contact Date for whatever comes next. The Follow Up Automation field does not repeat automatically. If the seller pushes out again, set a new date in the same field.</div>
</div>

<h2>Next Contact Date — Automated Pre-Call Sequence</h2>
<p>The <span class="ghl-field">Next Contact Date</span> field does more than create Nicole's task. When that date arrives, GHL simultaneously fires an automated outreach sequence to the seller — texts, RVM, and email — independent of any action Nicole takes. The automation runs regardless of whether Nicole calls that day.</p>

<table class="data-table">
  <tr><th>Timing</th><th>Channel</th><th>Action</th></tr>
  <tr><td>8:00 AM — same day</td><td>SMS</td><td>Automated text sent to seller</td></tr>
  <tr><td>8:00 AM — same day</td><td>RVM</td><td>Voicemail drop fired automatically</td></tr>
  <tr><td>8:00 AM — same day</td><td>Email</td><td>Automated email sent to seller</td></tr>
  <tr><td>8:00 AM — same day</td><td>Task</td><td>Nicole's call task created — <span class="ghl-field">powerdialer</span> tag applied — appears on her daily list</td></tr>
</table>

<div class="callout amber">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>The automation and Nicole's task fire in parallel — neither depends on the other.</strong> The seller receives outreach that morning no matter what. Nicole's job is to follow up on that outreach with a live call. Even if Nicole can't get to the call that day, the seller has already heard from IHT.</div>
</div>

<h2>Which Field to Use — Quick Reference</h2>
<table class="data-table">
  <tr><th>Situation</th><th>Use This Field</th></tr>
  <tr><td>Seller said "call me back in X days/weeks"</td><td><span class="ghl-field">Date for Follow Up Automation to Start</span></td></tr>
  <tr><td>Standard next call in the normal rotation</td><td><span class="ghl-field">Next Contact Date</span></td></tr>
  <tr><td>Same-day urgent callback needed</td><td>Apply tag <span class="ghl-field">same-day-callback</span> — do not use either date field</td></tr>
  <tr><td>Long-term nurture (no specific date, just passive)</td><td>Apply tag <span class="ghl-field">FU-LongTerm</span> — clear both date fields</td></tr>
</table>

<h2>Long-Term Nurture Sequence</h2>
<p>Leads that go cold (no response after 30 days) enter the long-term nurture. This runs indefinitely until the lead responds, is tagged <span class="ghl-field">Dead</span>, or opts out.</p>
<table class="data-table">
  <tr><th>Cadence</th><th>Channel</th><th>Content</th></tr>
  <tr><td>Monthly</td><td>Email</td><td>Market update, recent case study, or "We're still buying in [Area]" message</td></tr>
  <tr><td>Quarterly</td><td>Text</td><td>Short personal check-in: "Hey [Name], [Your Name] here. Still interested in selling [Street]? We're still buying in the area."</td></tr>
</table>

<h2>Troubleshooting</h2>
<p>If a workflow isn't firing, work through this checklist before escalating:</p>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content">Confirm the contact is in the correct <strong>pipeline stage</strong></div></li>
  <li><div class="step-num">2</div><div class="step-content">Confirm the correct <strong>tag is applied</strong> to the contact</div></li>
  <li><div class="step-num">3</div><div class="step-content">Check the workflow's <strong>enrollment conditions</strong> in GHL — is this contact type included?</div></li>
  <li><div class="step-num">4</div><div class="step-content">Check the contact's <strong>Do Not Disturb</strong> settings — DND blocks all automated messages</div></li>
  <li><div class="step-num">5</div><div class="step-content">If none of the above resolve it: post in <strong>#ghl-integration</strong> on Slack and tag Ashley</div></li>
</ol>
`},
      { id: 'lm-dead-leads', title: 'Dead Lead Management', dept: 'Lead Management', owner: 'Nicole / Joshua',
        content: `
<h2>Dead Lead Management</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Nicole / Joshua</span></div>

<div class="callout crimson">
  <div class="callout-icon">🚫</div>
  <div class="callout-body">
    <strong>Core Rule: Never Delete a Dead Lead.</strong> Dead leads stay in the system forever. Deleting contacts destroys reporting data, breaks source attribution, and makes it impossible to calculate true cost-per-deal. When a lead is dead, you tag it — you do not delete it.
  </div>
</div>

<h2>Valid Dead Reasons</h2>
<p>Every dead lead must be tagged with one of these standardized reasons. <strong>Do not make up your own tags</strong> — consistency is critical for reporting.</p>

<table class="data-table">
  <tr><th>Tag</th><th>When to Use</th></tr>
  <tr>
    <td><span class="ghl-field">Dead - Wrong Number</span></td>
    <td>Phone number is disconnected, wrong person, or invalid.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Dead - Not Interested</span></td>
    <td>Seller explicitly said they do not want to sell. <em>Not the same as "didn't answer"</em> — that's Follow Up, not Dead.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Dead - Listed with Agent</span></td>
    <td>Property is currently listed on the MLS with a real estate agent.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Dead - Price Too High</span></td>
    <td>Seller wants retail or above-market price and won't negotiate. Use only after at least 2 conversations where price was discussed.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Dead - No Equity</span></td>
    <td>Seller owes more than the property is worth. No deal structure works.</td>
  </tr>
  <tr>
    <td><span class="ghl-field" style="background:#fee2e2;color:#991b1b;">Dead - DNC</span></td>
    <td><strong>Legal compliance tag.</strong> Seller requested to be placed on our Do Not Call list. Once applied, all outreach stops permanently — no exceptions.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Dead - Duplicate</span></td>
    <td>This contact is a duplicate of another record for the same property. Note the primary contact ID in the notes field before tagging.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Dead - Not a Seller</span></td>
    <td>Person is a tenant, neighbor, realtor fishing, or otherwise not the property owner.</td>
  </tr>
  <tr>
    <td><span class="ghl-field">Dead - Property Sold</span></td>
    <td>Property has already been sold to someone else.</td>
  </tr>
</table>

<h2>How to Tag a Dead Lead in GHL</h2>
<ol class="step-list">
  <li>
    <div class="step-num">1</div>
    <div class="step-content"><strong>Add a note</strong> on the contact record explaining why this lead is dead — one sentence is fine.<br>
    <span style="font-size:12px;color:var(--steel);font-style:italic;">Example: "Called 3x, seller firm at $350K, ARV only $280K. No deal here."</span></div>
  </li>
  <li>
    <div class="step-num">2</div>
    <div class="step-content"><strong>Apply the tag</strong> using the exact format <span class="ghl-field">Dead - [Reason]</span> from the list above. No custom tags.</div>
  </li>
  <li>
    <div class="step-num">3</div>
    <div class="step-content"><strong>Move the opportunity</strong> to the Dead stage in the pipeline.</div>
  </li>
  <li>
    <div class="step-num">4</div>
    <div class="step-content"><strong>Do NOT remove the lead source tag.</strong> The source tag must stay so we can report on cost-per-lead by source — even for dead leads.</div>
  </li>
</ol>

<h2>Recycling Dead Leads</h2>
<p>Every 90 days, Ashley runs a dead lead review. Circumstances change — sellers who said no 3 months ago may be ready now.</p>
<table class="data-table">
  <tr><th>Tag</th><th>Recycle?</th><th>Notes</th></tr>
  <tr><td><span class="ghl-field">Dead - Not Interested</span></td><td style="color:#16a34a;font-weight:700;">✓ Yes</td><td>90+ days old → moved to Recycle list for one more outreach attempt</td></tr>
  <tr><td><span class="ghl-field">Dead - Price Too High</span></td><td style="color:#16a34a;font-weight:700;">✓ Yes</td><td>90+ days old → moved to Recycle list for one more outreach attempt</td></tr>
  <tr><td><span class="ghl-field" style="background:#fee2e2;color:#991b1b;">Dead - DNC</span></td><td style="color:#dc2626;font-weight:700;">✗ Never</td><td>Legal compliance — permanent, no exceptions</td></tr>
  <tr><td><span class="ghl-field">Dead - Wrong Number</span></td><td style="color:#dc2626;font-weight:700;">✗ Never</td><td>No valid contact method exists</td></tr>
  <tr><td><span class="ghl-field">Dead - Duplicate</span></td><td style="color:#dc2626;font-weight:700;">✗ Never</td><td>Primary record handles this contact</td></tr>
  <tr><td><span class="ghl-field">Dead - Not a Seller</span></td><td style="color:#dc2626;font-weight:700;">✗ Never</td><td>Not a decision-maker on the property</td></tr>
</table>
`},
      { id: 'lm-appointments', title: 'Appointment Procedures', dept: 'Lead Management', owner: 'Nicole',
        content: `
<h2>Appointment Procedures</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Nicole</span></div>

<div class="callout blue">
  <div class="callout-icon">💬</div>
  <div class="callout-body"><strong>GHL automatically posts to #appointments in Slack when an appointment is booked, rescheduled, or cancelled.</strong> You never need to post manually — just follow the steps below and the automation handles Slack notification.</div>
</div>

<ol class="step-list">
  <li>
    <div class="step-num">1</div>
    <div class="step-content">
      <strong>Open the contact card.</strong> Find the qualified lead in your pipeline and click into their contact record.
    </div>
  </li>
  <li>
    <div class="step-num">2</div>
    <div class="step-content">
      <strong>Click "Appointments" on the contact card.</strong> This opens the scheduling widget linked to the team calendar. Select the calendar for the appointment type:
      <ul style="margin-top:8px;font-size:13px;">
        <li><strong>In-Person Seller Appointment</strong></li>
        <li><strong>Virtual Cash Offer Appointment</strong></li>
      </ul>
    </div>
  </li>
  <li>
    <div class="step-num">3</div>
    <div class="step-content">
      <strong>Choose the date and time.</strong> GHL only shows available slots based on Joshua's and Mike's calendar availability. Pick the earliest available slot. If the seller has a specific preference, verify that slot is open before confirming.
    </div>
  </li>
  <li>
    <div class="step-num">4</div>
    <div class="step-content">
      <strong>Fill in the appointment details.</strong>
      <ul style="margin-top:8px;font-size:13px;">
        <li><strong>Title format:</strong> <span style="font-family:var(--font-mono);background:var(--fog);padding:2px 6px;border-radius:4px;">Seller Appt — 123 Main St, Baltimore</span></li>
        <li><strong>Notes field:</strong> Seller name, motivation, 4 Pillar highlights, and any access instructions (gate code, parking, lockbox info)</li>
      </ul>
    </div>
  </li>
  <li>
    <div class="step-num">5</div>
    <div class="step-content">
      <strong>Assign to the right person.</strong>
      <ul style="margin-top:8px;font-size:13px;">
        <li>In-person appointments → Mike or Joshua based on territory</li>
        <li>Virtual appointments → Joshua unless otherwise directed</li>
      </ul>
    </div>
  </li>
  <li>
    <div class="step-num">6</div>
    <div class="step-content">
      <strong>Confirm.</strong> Once booked, GHL automatically sends the seller a confirmation text and email, and posts to <strong>#appointments</strong> in Slack. Move the lead to the closer's pipeline stage immediately.
    </div>
  </li>
</ol>

<h2>Rescheduling</h2>
<p>Open the appointment in GHL, click <strong>Reschedule</strong>, pick the new time, and save. GHL sends updated confirmations to the seller and posts the change to <strong>#appointments</strong> automatically. Log the reschedule in the contact notes — reschedules are tracked separately on the scorecard.</p>

<h2>Cancellations</h2>
<div class="callout crimson">
  <div class="callout-icon">🚫</div>
  <div class="callout-body"><strong>Do NOT delete a cancelled appointment.</strong> Cancelled appointments are tracked on the scorecard. Deleting them corrupts reporting.</div>
</div>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content">Update the appointment status to <strong>Cancelled</strong> in GHL — do not delete it.</div></li>
  <li><div class="step-num">2</div><div class="step-content">Add a note with the reason for cancellation.</div></li>
  <li><div class="step-num">3</div><div class="step-content">If the seller wants to rebook, <strong>create a new appointment</strong> — do not edit the cancelled one.</div></li>
</ol>
`},
      { id: 'lm-appt-criteria', title: 'Appointment Criteria — 4 Pillars', dept: 'Lead Management', owner: 'Nicole',
        content: `
<h2>Appointment Criteria — 4 Pillars</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Nicole</span></div>

<p>Use the 4 Pillars questions on every qualifying call to determine whether to set a same-day appointment, schedule if they have a set timeline, or not set an appointment at all. Score each answer against the matrix below.</p>

<div class="callout crimson">
  <div class="callout-icon">🎯</div>
  <div class="callout-body"><strong>If you identify a high motivation seller, book them same-day or next-day. This is a top priority lead.</strong> If the seller wants to sell in the next 90 days AND has a reason (a "why") for selling the property — book the appointment.</div>
</div>

<div style="overflow-x:auto;margin-top:20px;">
<table style="width:100%;border-collapse:collapse;font-size:13px;">
  <thead>
    <tr>
      <th style="background:#1a1a2e;color:#fff;padding:10px 14px;text-align:left;width:35%;border:1px solid var(--fog);">4 Pillars Questions</th>
      <th style="background:#16a34a;color:#fff;padding:10px 14px;text-align:center;border:1px solid var(--fog);">🟢 High<br><span style="font-weight:400;font-size:11px;">SET SAME DAY APPOINTMENT</span></th>
      <th style="background:#d97706;color:#fff;padding:10px 14px;text-align:center;border:1px solid var(--fog);">🟡 Medium<br><span style="font-weight:400;font-size:11px;">Set appointment if they have a set timeline to sell</span></th>
      <th style="background:#dc2626;color:#fff;padding:10px 14px;text-align:center;border:1px solid var(--fog);">🔴 Low<br><span style="font-weight:400;font-size:11px;">Do Not Set Appointment</span></th>
    </tr>
  </thead>
  <tbody>
    <tr style="border-bottom:1px solid var(--fog);">
      <td style="padding:12px 14px;border:1px solid var(--fog);font-weight:600;color:var(--graphite);">If we agree on a fair price and all the other important details, when would you ideally like to finalize a sale?</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#f0fdf4;color:#15803d;font-weight:600;">ASAP, today, yesterday</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fffbeb;color:#92400e;">This month or next month, 30 days, 60 days, 90 days</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fef2f2;color:#991b1b;">You called me, when I get my price, everything is for sale at the right price, etc.</td>
    </tr>
    <tr style="border-bottom:1px solid var(--fog);">
      <td style="padding:12px 14px;border:1px solid var(--fog);font-weight:600;color:var(--graphite);">If you did sell it to us or anyone else right now, why would you?</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#f0fdf4;color:#15803d;font-weight:600;">Reason matches their timeline well</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fffbeb;color:#92400e;">Reason matches their timeline well</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fef2f2;color:#991b1b;">You called me, no real reason to sell.</td>
    </tr>
    <tr style="border-bottom:1px solid var(--fog);">
      <td style="padding:12px 14px;border:1px solid var(--fog);font-weight:600;color:var(--graphite);">In terms of condition — if you rated the property from 0 to 10, where 0 is horrible and 10 is a magazine cover, how would you rate it?</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#f0fdf4;color:#15803d;font-weight:600;">0 – 6</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fffbeb;color:#92400e;">7 – 8</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fef2f2;color:#991b1b;">9 – 10</td>
    </tr>
    <tr style="border-bottom:1px solid var(--fog);">
      <td style="padding:12px 14px;border:1px solid var(--fog);font-weight:600;color:var(--graphite);">I guess you don't happen to know what you owe on the property, do you?</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#f0fdf4;color:#15803d;font-weight:600;">They will tell you the #</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fffbeb;color:#92400e;"></td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fef2f2;color:#991b1b;">I don't want to tell you</td>
    </tr>
    <tr>
      <td style="padding:12px 14px;border:1px solid var(--fog);font-weight:600;color:var(--graphite);">Do you know what a fair price might be, or maybe understand what the neighbors are selling for?</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#f0fdf4;color:#15803d;font-weight:600;">Not sure but flexible</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fffbeb;color:#92400e;">Not sure, flexible</td>
      <td style="padding:12px 14px;border:1px solid var(--fog);text-align:center;background:#fef2f2;color:#991b1b;">You're not going to low ball me, fair market value, etc.</td>
    </tr>
  </tbody>
</table>
</div>

<h2 style="margin-top:28px;">How to Use This Matrix</h2>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;">
  <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px;">
    <div style="font-weight:700;color:#15803d;font-size:13px;margin-bottom:6px;">🟢 Mostly High Answers</div>
    <div style="font-size:12px;color:#166534;line-height:1.6;">Book a same-day or next-day appointment. This is a priority lead — do not let them cool off. Move to <span style="font-weight:700;">Priority Top 20%</span> and assign immediately.</div>
  </div>
  <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;">
    <div style="font-weight:700;color:#92400e;font-size:13px;margin-bottom:6px;">🟡 Mostly Medium Answers</div>
    <div style="font-size:12px;color:#78350f;line-height:1.6;">Book if they have a firm timeline to sell. If timeline is vague, move to <span style="font-weight:700;">Follow Up</span> and enroll in the drip sequence. Check back at 30 days.</div>
  </div>
  <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px;">
    <div style="font-weight:700;color:#991b1b;font-size:13px;margin-bottom:6px;">🔴 Mostly Low Answers</div>
    <div style="font-size:12px;color:#7f1d1d;line-height:1.6;">Do not set the appointment. No real motivation to sell. Tag appropriately and move to <span style="font-weight:700;">Redzones</span> or <span style="font-weight:700;">Long-Term Follow Up</span> — do not force an appointment that won't convert.</div>
  </div>
</div>
`},
      { id: 'lm-bpo', title: 'BPO Procedures', dept: 'Lead Management', owner: 'Ted',
        content: `
<h2>BPO Procedures</h2>
<div class="page-meta" style="margin-bottom:20px;"><span><strong>Last updated:</strong> Mar 2026</span><span><strong>Owner:</strong> Ted</span></div>

<p>A Broker Price Opinion (BPO) is a third-party valuation used to support our offer or provide confidence to a buyer. It is not ordered on every deal — only when the situation calls for it.</p>

<h2>When to Order a BPO</h2>
<table class="data-table">
  <tr><th>Condition</th><th>Why It Matters</th></tr>
  <tr><td>Deal ARV is over $200K</td><td>Higher-value deals warrant third-party validation to back up your numbers</td></tr>
  <tr><td>Comps are thin or conflicting</td><td>When MLS comps don't give a clear picture, a BPO provides independent support</td></tr>
  <tr><td>Property is unique</td><td>Large lot, mixed-use, non-standard construction — standard comps may not apply</td></tr>
  <tr><td>Buyer specifically requests one</td><td>Some buyers require a BPO before committing — providing one removes friction</td></tr>
</table>

<h2>Step-by-Step Process</h2>
<ol class="step-list">
  <li>
    <div class="step-num">1</div>
    <div class="step-content">
      <strong>Check the BPO card balance.</strong> Log into the BPO vendor account and verify there is sufficient balance before submitting anything.<br>
      <div class="callout amber" style="margin-top:10px;">
        <div class="callout-icon">💳</div>
        <div class="callout-body">If the balance is low, post in <strong>#impact-lead-management</strong> on Slack and tag Ashley:<br>
        <span style="font-family:var(--font-mono);font-size:12px;display:block;margin-top:6px;background:rgba(0,0,0,0.05);padding:6px 10px;border-radius:4px;">"BPO card needs refill — balance is $[amount]. Need to order for [Address]."</span>
        Do not proceed until the card is funded.</div>
      </div>
    </div>
  </li>
  <li>
    <div class="step-num">2</div>
    <div class="step-content">
      <strong>Submit the order.</strong> Enter the following:
      <ul style="margin-top:8px;font-size:13px;">
        <li>Property address — must match exactly what's on the A-B contract</li>
        <li>Contact name and phone number for access</li>
        <li>Gate codes or lockbox info if applicable</li>
        <li>Preferred appointment windows</li>
      </ul>
    </div>
  </li>
  <li>
    <div class="step-num">3</div>
    <div class="step-content">
      <strong>Track the order.</strong> BPOs typically take 3–5 business days. If the deal has a tight inspection deadline, note the urgency in the order and follow up with the vendor at the 3-day mark.
    </div>
  </li>
  <li>
    <div class="step-num">4</div>
    <div class="step-content">
      <strong>Review and distribute.</strong> When the BPO comes back, check it against your comp research. If the valuation is more than 10% off your ARV, flag it to Joshua for discussion before sharing with the buyer.
    </div>
  </li>
  <li>
    <div class="step-num">5</div>
    <div class="step-content">
      <strong>Upload and notify.</strong> Upload the BPO report to the opportunity card in GHL. Then post in the property Slack channel:<br>
      <span style="font-family:var(--font-mono);font-size:12px;display:block;margin-top:6px;background:rgba(0,0,0,0.05);padding:6px 10px;border-radius:4px;">"BPO received for [Address] — $[Value]. Uploaded to GHL."</span>
      Tag Joshua and whoever requested it.
    </div>
  </li>
</ol>
`}
    ]
  },

      { id: 'acq-overview', title: 'Department Overview', dept: 'Acquisitions', owner: 'Joshua Hines',
        content: `
<h2>Department Purpose</h2>
<p>Acquisitions is responsible for converting appointments into signed contracts. This requires mastery of property valuation (ARV and comps), offer structuring (MAO formula), in-person selling skills, and proper documentation of every deal.</p>

<h2>The Acquisitions Workflow</h2>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content"><strong>Review the appointment</strong> — Pull up GHL, review the lead notes, research the address on SDAT, check any prior contact history.</div></li>
  <li><div class="step-num">2</div><div class="step-content"><strong>Run preliminary comps</strong> — Before the appointment, know your ballpark ARV. Don't go in blind.</div></li>
  <li><div class="step-num">3</div><div class="step-content"><strong>Conduct the appointment</strong> — Walk the property, build rapport, screen motivation, present your offer.</div></li>
  <li><div class="step-num">4</div><div class="step-content"><strong>Get the contract signed</strong> — If offer is accepted, execute the purchase agreement on-site when possible.</div></li>
  <li><div class="step-num">5</div><div class="step-content"><strong>Create the Google Drive property folder</strong> — Immediately after a signed contract (see below).</div></li>
  <li><div class="step-num">6</div><div class="step-content"><strong>Hand off to TC</strong> — With the Drive link in GHL, TC can pick up the file without any additional communication required.</div></li>
</ol>

<h2>Your Pipelines in GHL</h2>

<h3>Pipeline 2: Mike the Closer — 4 Stages</h3>
<p>When Nicole books an appointment for Mike, the lead moves here immediately.</p>
<table class="data-table">
  <tr><th>Stage</th><th>Definition</th></tr>
  <tr><td><span class="ghl-field">Appointment Scheduled</span></td><td>Appointment booked and confirmed. Review the lead card and prep before arriving.</td></tr>
  <tr><td><span class="ghl-field">Offer Made/Followup</span></td><td>Appointment completed, offer presented. Awaiting seller response or in active negotiation.</td></tr>
  <tr><td><span class="ghl-field">1 YD LINE</span></td><td>Seller is nearly committed — one conversation or minor concession away from signing.</td></tr>
  <tr><td><span class="ghl-field" style="background:#fee2e2;color:#991b1b;">Lost Offer</span></td><td>Seller rejected the offer or went with another buyer. Log the reason in notes before leaving this stage.</td></tr>
</table>

<h3>Pipeline 3: Josh The Closer — 8 Stages</h3>
<p>When Nicole books an appointment for Joshua, the lead moves here immediately.</p>
<table class="data-table">
  <tr><th>Stage</th><th>Definition</th></tr>

      { id: 'acq-comping', title: 'Comping Properties & ARV', dept: 'Acquisitions', owner: 'Joshua Hines',
        content: `
<h2>The Comping Framework</h2>
<p>ARV (After Repair Value) is the foundation of every offer. A wrong ARV = a wrong offer = a deal that can't be assigned or a loss. Run comps carefully, every time.</p>

<h2>Comp Criteria</h2>
<table class="data-table">
  <tr><th>Criteria</th><th>Standard</th><th>Notes</th></tr>
  <tr><td>Distance</td><td>Within 1 mile (0.5 mile preferred)</td><td>Expand only in rural areas; note it</td></tr>
  <tr><td>Sale Date</td><td>Last 6 months preferred, 12 months max</td><td>Flag anything older than 9 months</td></tr>
  <tr><td>Square Footage</td><td>Within 15–20% of subject</td><td>Adjust if needed</td></tr>
  <tr><td>Bed/Bath</td><td>Same or ±1 bed; same bath preferred</td><td>Apply market adjustment for missing bath</td></tr>
  <tr><td>Property Type</td><td>Same type (SFR, rowhome, semi-detached)</td><td>Never mix types</td></tr>
  <tr><td>Condition</td><td>Renovated or retail condition only</td><td>Exclude REO, distressed, short sales</td></tr>
</table>

<h2>MAO Formula</h2>
<div class="callout amber">
  <div class="callout-icon">🧮</div>
  <div class="callout-body">
    <strong>Maximum Allowable Offer = ARV × 70% − Estimated Repairs</strong>
    The 70% covers our assignment fee, investor profit margin, holding costs, and closing costs. Never go above MAO without explicit approval from Ashley.
  </div>
</div>

<h2>Repair Estimation Guide</h2>
<table class="data-table">
  <tr><th>Item</th><th>Cosmetic</th><th>Moderate</th><th>Full Gut</th></tr>
  <tr><td>Kitchen</td><td>$3K–$8K</td><td>$15K–$25K</td><td>$30K–$50K</td></tr>
  <tr><td>Bathroom</td><td>$2K–$5K</td><td>$8K–$15K</td><td>$18K–$28K</td></tr>
  <tr><td>Flooring (per 1K sq ft)</td><td>$2K–$4K</td><td>$5K–$8K</td><td>$10K–$15K</td></tr>
  <tr><td>Roof</td><td>Repair $2K–$5K</td><td>—</td><td>Replace $8K–$18K</td></tr>
  <tr><td>HVAC</td><td>Service $500–$1K</td><td>—</td><td>Replace $5K–$12K</td></tr>
  <tr><td>Electrical</td><td>Updates $1K–$3K</td><td>Partial $5K–$12K</td><td>Full rewire $15K–$25K</td></tr>
  <tr><td>Plumbing</td><td>Repairs $500–$2K</td><td>Partial $5K–$10K</td><td>Full repipe $12K–$22K</td></tr>
  <tr><td>Paint (interior)</td><td>$2K–$5K</td><td>$4K–$8K</td><td>$8K–$15K</td></tr>
</table>
`}
    ]

<h2>Department Purpose</h2>
<p>Dispositions is responsible for marketing under-contract properties to qualified buyers, collecting offers, negotiating terms, executing assignment agreements, and coordinating with TC through to close. Dispo is where the deal becomes profit.</p>

<h2>The Dispo Process Starts With the Drive Link</h2>
<div class="callout amber">
  <div class="callout-icon">📁</div>
  <div class="callout-body">
    <strong>Step Zero: Pull the Google Drive Link from GHL</strong>

  </div>
</div>

<h2>Dispo Workflow Overview</h2>
<ol class="step-list">
  <li><div class="step-num">1</div><div class="step-content"><strong>Pull the Drive folder from GHL</strong> — Review the property info sheet: ARV, repairs estimate, purchase price, seller motivation, condition notes.</div></li>
  <li><div class="step-num">2</div><div class="step-content"><strong>Set the assignment fee target</strong> — Based on ARV, repair estimate, and market demand. Typical range: $5K–$25K depending on deal size.</div></li>
  <li><div class="step-num">3</div><div class="step-content"><strong>Build the listing</strong> — Headline with ARV and asking price. Include condition summary, repair notes, key features, and your assignment fee. See listing SOP for full template.</div></li>
  <li><div class="step-num">4</div><div class="step-content"><strong>VIP blast first</strong> — Send to your top-tier buyers before public marketing. Give them 24–48 hours of exclusivity.</div></li>
  <li><div class="step-num">5</div><div class="step-content"><strong>Broad marketing</strong> — Email blast, buyer group posts, social media if appropriate.</div></li>
  <li><div class="step-num">6</div><div class="step-content"><strong>Collect and evaluate offers</strong> — Score using the offer matrix (price, certainty, speed, relationship).</div></li>
  <li><div class="step-num">7</div><div class="step-content"><strong>Execute assignment agreement</strong> — Once buyer selected. Get signed B-C and EMD.</div></li>
  <li><div class="step-num">8</div><div class="step-content"><strong>Hand off to TC</strong> — Update GHL with buyer's info and assignment details. TC handles closing coordination.</div></li>
</ol>

<h2>Your Pipeline in GHL</h2>
<h3>Pipeline 6: Dispo — Buyer Marketing — 11 Stages</h3>
<p>This pipeline tracks your buyers, not the properties. Every investor in your database lives here, tiered by relationship and transaction history.</p>
<table class="data-table">
  <tr><th>Stage</th><th>Definition</th></tr>
  <tr><td><span class="ghl-field">General / Prospective Buyers</span></td><td>New buyer — not yet verified or tiered. Proof of funds not on file. Receives broad blast marketing only.</td></tr>
  <tr><td><span class="ghl-field">Priority</span></td><td>Verified funds, clear buy box, responds to blasts. Buying within 1–3 months. Gets priority deal alerts before the general list.</td></tr>

  <tr><td><span class="ghl-field" style="background:#d4edda;color:#155724;">VIP</span></td><td>Top-tier buyer. Proven closer, fast mover, funds verified. Gets 24–48 hour exclusivity window on every new deal before general list.</td></tr>
  <tr><td><span class="ghl-field">Community VIP</span></td><td>Active in the REI community — agents, connectors, referral sources. May not buy directly but sends deals and referrals.</td></tr>
  <tr><td><span class="ghl-field">Offer Received</span></td><td>Formal offer submitted with price, terms, POF attached. Being scored against other offers. Continue marketing to backup buyers until EMD is in hand.</td></tr>
  <tr><td><span class="ghl-field">JV Partners</span></td><td>Joint venture partner — brings deals, capital, or buyers in exchange for a split. Terms documented in contact record.</td></tr>
  <tr><td><span class="ghl-field" style="background:#fee2e2;color:#991b1b;">Dead Buyer / Black Listed</span></td><td>Buyer tied up a deal and couldn't close, or blacklisted for bad behavior. Never receives deal alerts again. Reason documented.</td></tr>
</table>

<div class="callout amber">
  <div class="callout-icon">⚡</div>
  <div class="callout-body"><strong>VIP buyers get first look — always.</strong> Send to VIP tier 24–48 hours before anyone else sees the deal. If you blast to everyone at once, your best buyers feel like everyone else and stop prioritizing your deals.</div>
</div>

<h2>Never Stop Marketing Until EMD Is In Hand</h2>
<div class="callout crimson">

    Continue marketing and showing the property to all buyers until you have a signed assignment agreement AND the earnest money deposit in escrow. A buyer who "loves it" but hasn't sent EMD is not a buyer.

</div>
`},

        content: `
<h2>Starting From the Drive Folder</h2>
<p>Your listing starts with the property info sheet in the Google Drive folder. Before you write a single word, you need to know:</p>
<ul>

  <li>Your purchase price (what IHT is paying the seller)</li>

<div class="callout amber">
  <div class="callout-icon">✏</div>
  <div class="callout-body">
    <strong>Lead with equity.</strong>
    Investors buy margins, not properties. Your headline should tell them the deal instantly.
    <br><br>
    <strong>Format:</strong> ARV $[X] | Asking $[Y] | [City, State] | [Beds/Baths/Sq Ft]
    <br>
    <strong>Example:</strong> ARV $285K | Asking $159K | Baltimore, MD | 3BD/1BA/1,200 sq ft
  </div>
</div>

<h2>Listing Template</h2>

<ol>
  <li><strong>Headline</strong> (ARV + asking + location + size)</li>

  <li><strong>Property Details</strong> — Address, beds/baths, sq ft, lot size, year built</li>

<h2>Department Purpose</h2>
<p>Transaction Coordination takes over once a seller has signed the purchase agreement. TC is responsible for managing the deal from contract to close — coordinating with title, tracking deadlines, ensuring all documents are in order, and keeping every stakeholder updated.</p>

  </div>
</div>

<h2>TC Responsibilities</h2>
<ul>
  <li>Order title search within 24 hours of receiving a signed contract</li>
  <li>Track all critical dates: inspection deadline, financing contingency, closing date</li>
  <li>Coordinate with title company / closing attorney</li>
  <li>Collect and verify buyer's assignment documents and EMD</li>
  <li>Flag any title issues, liens, or encumbrances to the acquisitions agent and Ashley</li>
  <li>Ensure all parties have their closing instructions 48 hours before closing</li>
  <li>Document every update in GHL and the Drive folder</li>
</ul>

<h2>Slack Communication</h2>
<p>Use the right channel for every message. Do not post deal-specific updates in general channels, and do not use random channels just because it's convenient.</p>
<table class="data-table">

function init() {

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  SECTIONS.forEach(sec => {
    html += `<div class="sidebar-section">
      <div class="sidebar-section-header" onclick="toggleSection('${sec.id}', this)">
        <div class="dot" style="background:${sec.color}"></div>
        <span>${sec.label}</span>
        <span class="arrow">▾</span>
      </div>
      <div class="sidebar-pages" id="sec-pages-${sec.id}">`;
    sec.pages.forEach(p => {
      html += `<a class="sidebar-page ${currentPage === p.id ? 'active' : ''}" onclick="showPage('${sec.id}','${p.id}')">${p.title}</a>`;
    });
    html += `</div></div>`;
  });
  sb.innerHTML = html;
}

function toggleSection(secId, el) {
  const pages = document.getElementById(`sec-pages-${secId}`);
  const isHidden = pages.classList.contains('hidden');
  pages.classList.toggle('hidden');
  el.classList.toggle('collapsed');
}

function renderHome() {
  currentPage = null;
  const area = document.getElementById('content-area');
  let html = `<div class="home-hero">
    <h1>Impact Home Team<br><span>Operations Manual</span></h1>
    <p>The complete guide to how we operate — from brand standards to closing the deal.</p>
  </div>
  <div class="home-grid">`;

  SECTIONS.forEach(sec => {
    html += `<div class="home-card" style="border-top-color:${sec.color}" onclick="showPage('${sec.id}','${sec.pages[0].id}')">
      <div class="dept-dot" style="background:${sec.color}"></div>
      <h3>${sec.label}</h3>
      <p>${sec.pages[0].dept}</p>
      <div class="pages-count">${sec.pages.length} page${sec.pages.length !== 1 ? 's' : ''}</div>
    </div>`;
  });
  html += `</div>`;
  area.innerHTML = html;
}

function showPage(secId, pageId) {
  const sec = SECTIONS.find(s => s.id === secId);
  const page = sec.pages.find(p => p.id === pageId);
  currentPage = pageId;

  document.querySelectorAll('.sidebar-page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidebar-page').forEach(el => {
    if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(pageId)) el.classList.add('active');
  });

  const area = document.getElementById('content-area');

  // Training home
  if (pageId === 'training-home') {
    area.innerHTML = renderTrainingHome();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // Quiz pages
  if (page.content && page.content.startsWith('__QUIZ__')) {
    const quizKey = page.content.replace('__QUIZ__', '');
    area.innerHTML = renderQuizPage(quizKey, page.title, sec.color);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // Normal page
  area.innerHTML = `
    <div class="page-header">
      <div class="page-dept-tag" style="background:${sec.color}22;color:${sec.color}">${page.dept}</div>
      <h1>${page.title}</h1>

        <span><strong>Department:</strong> ${page.dept}</span>
      </div>
    </div>
    <div class="prose">${page.content}</div>`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── QUIZ ENGINE ────────────────────────────────────────────
var quizState = {};

function renderQuizPage(key, title, color) {
  const qz = QUIZZES[key];
  if (!qz) return '<p>Quiz not found.</p>';

  // init state
  quizState[key] = quizState[key] || { current: 0, answers: {}, submitted: false, name: '' };
  const st = quizState[key];

  if (st.submitted) return renderQuizResults(key, color);

  const q = qz.questions[st.current];
  const total = qz.questions.length;
  const pct = Math.round((st.current / total) * 100);

  const choices = q.c.map((ch, i) => {
    const sel = st.answers[st.current] === i;
    return `<div class="qz-choice ${sel ? 'selected' : ''}" onclick="quizSelect('${key}',${i})">
      <div class="qz-choice-letter">${['A','B','C','D'][i]}</div>
      <div class="qz-choice-text">${ch}</div>
    </div>`;
  }).join('');

  const answered = st.answers[st.current] !== undefined;
  const isLast = st.current === total - 1;

  const nameField = st.current === 0 ? `
    <div style="margin-bottom:20px;">
      <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);display:block;margin-bottom:6px;">Your Name (for results)</label>
      <input id="qz-name-${key}" class="adm-input" style="max-width:280px;" placeholder="First Last" value="${st.name||''}" oninput="quizState['${key}'].name=this.value">
    </div>` : '';

  return `<div class="page-header">
    <div class="page-dept-tag" style="background:${color}22;color:${color};">Quiz</div>
    <h1>${title}</h1>
    <div class="page-meta"><span><strong>Question:</strong> ${st.current+1} of ${total}</span><span><strong>Pass:</strong> ${Math.ceil(total*0.8)}/${total} correct</span></div>
  </div>
  <div class="prose">
    <div class="qz-progress-wrap">
      <div class="qz-progress-bar"><div class="qz-progress-fill" style="width:${pct}%;background:${color};"></div></div>
      <span class="qz-progress-label">${pct}% complete</span>
    </div>
    ${nameField}
    <div class="qz-card">
      <div class="qz-q-num" style="color:${color};">Question ${st.current+1}</div>
      <div class="qz-q-text">${q.q}</div>
      <div class="qz-choices">${choices}</div>
    </div>
    <div class="qz-nav">
      ${st.current > 0 ? `<button class="qz-btn qz-btn-ghost" onclick="quizNav('${key}',-1)">← Back</button>` : '<span></span>'}
      ${isLast
        ? `<button class="qz-btn qz-btn-submit" ${!answered?'disabled':''} onclick="quizSubmit('${key}')">Submit Quiz</button>`
        : `<button class="qz-btn qz-btn-next" ${!answered?'disabled':''} onclick="quizNav('${key}',1)">Next →</button>`
      }
    </div>
  </div>`;
}

function quizSelect(key, idx) {
  const st = quizState[key];
  if (!st || st.submitted) return;
  st.answers[st.current] = idx;
  // re-render current page
  const sec = SECTIONS.find(s => s.id === 'training');
  const page = sec.pages.find(p => p.content === '__QUIZ__' + key);
  if (page) {
    document.getElementById('content-area').innerHTML =
      `<div class="page-header">
        <div class="page-dept-tag" style="background:#7C3AED22;color:#7C3AED;">Quiz</div>
        <h1>${page.title}</h1>
        <div class="page-meta"><span><strong>Question:</strong> ${st.current+1} of ${QUIZZES[key].questions.length}</span><span><strong>Pass:</strong> ${Math.ceil(QUIZZES[key].questions.length*0.8)}/${QUIZZES[key].questions.length} correct</span></div>
      </div>
      <div class="prose">${renderQuizBody(key, '#7C3AED')}</div>`;
  }
}

function renderQuizBody(key, color) {
  const qz = QUIZZES[key];
  const st = quizState[key];
  const q = qz.questions[st.current];
  const total = qz.questions.length;
  const pct = Math.round((st.current / total) * 100);
  const isLast = st.current === total - 1;
  const answered = st.answers[st.current] !== undefined;

  const choices = q.c.map((ch, i) => {
    const sel = st.answers[st.current] === i;
    return `<div class="qz-choice ${sel ? 'selected' : ''}" onclick="quizSelect('${key}',${i})">
      <div class="qz-choice-letter">${['A','B','C','D'][i]}</div>
      <div class="qz-choice-text">${ch}</div>
    </div>`;
  }).join('');

  const nameField = st.current === 0 ? `
    <div style="margin-bottom:20px;">
      <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);display:block;margin-bottom:6px;">Your Name (for results)</label>
      <input id="qz-name-${key}" class="adm-input" style="max-width:280px;" placeholder="First Last" value="${st.name||''}" oninput="quizState['${key}'].name=this.value">
    </div>` : '';

  return `<div class="qz-progress-wrap">
    <div class="qz-progress-bar"><div class="qz-progress-fill" style="width:${pct}%;background:${color};"></div></div>
    <span class="qz-progress-label">${pct}% complete</span>
  </div>
  ${nameField}
  <div class="qz-card">
    <div class="qz-q-num" style="color:${color};">Question ${st.current+1}</div>
    <div class="qz-q-text">${q.q}</div>
    <div class="qz-choices">${choices}</div>
  </div>
  <div class="qz-nav">
    ${st.current > 0 ? `<button class="qz-btn qz-btn-ghost" onclick="quizNav('${key}',-1)">← Back</button>` : '<span></span>'}
    ${isLast
      ? `<button class="qz-btn qz-btn-submit" ${!answered?'disabled':''} onclick="quizSubmit('${key}')">Submit Quiz</button>`
      : `<button class="qz-btn qz-btn-next" ${!answered?'disabled':''} onclick="quizNav('${key}',1)">Next →</button>`
    }
  </div>`;
}

function quizNav(key, dir) {
  const st = quizState[key];
  if (!st) return;
  st.current = Math.max(0, Math.min(QUIZZES[key].questions.length - 1, st.current + dir));
  const sec = SECTIONS.find(s => s.id === 'training');
  const page = sec.pages.find(p => p.content === '__QUIZ__' + key);
  if (page) showPage('training', page.id);
}

function quizSubmit(key) {
  const st = quizState[key];
  const qz = QUIZZES[key];
  if (!st || !qz) return;
  st.submitted = true;

  // score
  let correct = 0;
  qz.questions.forEach((q, i) => { if (st.answers[i] === q.a) correct++; });
  st.score = correct;
  st.total = qz.questions.length;
  st.pass = correct >= Math.ceil(qz.questions.length * 0.8);

  // submit to Google Sheets webhook
  const payload = {
    name: st.name || 'Anonymous',
    quiz: qz.title,
    score: correct,
    total: qz.questions.length,
    passed: st.pass,
    pct: Math.round((correct / qz.questions.length) * 100),
    timestamp: new Date().toISOString()
  };
  const WEBHOOK = 'https://script.google.com/macros/s/AKfycbxVBaVCKmXyJkNDxMgO6KoiGAVLLtDnjIcQMZ3vy6OEfDaP3bSmME3zN3bV3VbXuXA/exec';
  fetch(WEBHOOK, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) }).catch(()=>{});

  const sec = SECTIONS.find(s => s.id === 'training');
  const page = sec.pages.find(p => p.content === '__QUIZ__' + key);
  if (page) showPage('training', page.id);
}

function renderQuizResults(key, color) {
  const qz = QUIZZES[key];
  const st = quizState[key];
  const pct = Math.round((st.score / st.total) * 100);
  const pass = st.pass;

  const review = qz.questions.map((q, i) => {
    const userAns = st.answers[i];
    const correct = userAns === q.a;
    return `<div class="qz-review-item ${correct ? 'correct' : 'wrong'}">
      <div class="qz-review-q">${i+1}. ${q.q}</div>
      <div class="qz-review-row">
        <span class="qz-review-badge ${correct?'badge-correct':'badge-wrong'}">${correct ? '✓ Correct' : '✗ Wrong'}</span>
        ${!correct ? `<span class="qz-review-yours">Your answer: ${q.c[userAns] ?? 'skipped'}</span>` : ''}
        <span class="qz-review-correct">Correct: ${q.c[q.a]}</span>
      </div>
      ${!correct ? `<div class="qz-review-exp">${q.e || ''}</div>` : ''}
    </div>`;
  }).join('');

  const retakeBtn = `<button class="qz-btn qz-btn-ghost" onclick="quizRetake('${key}')">Retake Quiz</button>`;
  const backBtn = `<button class="qz-btn" style="background:#7C3AED;color:#fff;" onclick="showPage('training','training-home')">← All Quizzes</button>`;

  return `<div class="page-header">
    <div class="page-dept-tag" style="background:${pass?'#dcfce7':'#fee2e2'};color:${pass?'#16a34a':'#dc2626'};">${pass ? '✓ PASSED' : '✗ NOT PASSED'}</div>
    <h1>${qz.title}</h1>
    <div class="page-meta"><span><strong>Score:</strong> ${st.score}/${st.total} (${pct}%)</span><span><strong>Required:</strong> ${Math.ceil(st.total*0.8)}/${st.total}</span></div>
  </div>
  <div class="prose">
    <div class="qz-result-hero" style="border-color:${pass?'#16a34a':'#dc2626'};">
      <div class="qz-result-pct" style="color:${pass?'#16a34a':'#dc2626'};">${pct}%</div>
      <div class="qz-result-msg">${pass ? '🎉 Great work! You passed.' : 'Keep studying — review the answers below and retake when ready.'}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;">${backBtn}${retakeBtn}</div>
    </div>
    <h3 style="margin:24px 0 12px;font-size:15px;">Answer Review</h3>
    <div class="qz-review">${review}</div>
  </div>`;
}

function quizRetake(key) {
  quizState[key] = { current: 0, answers: {}, submitted: false, name: quizState[key]?.name || '' };
  const sec = SECTIONS.find(s => s.id === 'training');
  const page = sec.pages.find(p => p.content === '__QUIZ__' + key);
  if (page) showPage('training', page.id);
}

function handleSearch(val) {
  if (!val.trim()) { renderSidebar(); return; }
  const q = val.toLowerCase();
  const sb = document.getElementById('sidebar');
  let html = '';
  let found = 0;
  SECTIONS.forEach(sec => {
    sec.pages.forEach(p => {
      const text = (p.title + p.content).toLowerCase();
      if (text.includes(q)) {
        if (found === 0) html += `<div class="sidebar-label" style="margin-top:12px">Search Results</div>`;
        html += `<a class="sidebar-page" onclick="showPage('${sec.id}','${p.id}')">${p.title}</a>`;
        found++;
      }
    });
  });
  if (!found) html = `<div class="sidebar-label" style="margin-top:12px">No results found</div>`;
  sb.innerHTML = html;
}

function pcDetail(id) {
  var d = PC_DATA[id];
  if (!d) return;
  document.querySelectorAll('.pc-stage').forEach(function(el) { el.classList.remove('pc-active'); });
  event.currentTarget.classList.add('pc-active');
  var meansHTML = d.means.map(function(m) { return '<li>' + m + '</li>'; }).join('');
  var unlocksHTML = d.unlocks.map(function(u) { return '<li>' + u + '</li>'; }).join('');
  document.getElementById('pc-detail').innerHTML =
    '<div class="pc-detail-inner">' +
      '<div class="pc-detail-col">' +
        '<div class="pc-detail-title">' + d.name + '</div>' +
        '<div class="pc-detail-pipe">' + d.pipe + '</div>' +
        '<h4>What This Stage Means</h4>' +
        '<ul>' + meansHTML + '</ul>' +
      '</div>' +
      '<div class="pc-detail-col">' +
        '<h4>What It Unlocks</h4>' +
        '<ul>' + unlocksHTML + '</ul>' +
      '</div>' +
      '<div class="pc-detail-col">' +
        '<h4>If This Stage Is Skipped</h4>' +
        '<div class="pc-skip-box"><strong>&#9888; Consequence</strong><br>' + d.skip + '</div>' +
      '</div>' +
    '</div>';
}

// ── ADMIN OPEN / CLOSE ──
function openAdminLogin() {
  document.getElementById('admin-overlay').classList.add('active');
  document.getElementById('adm-login-screen').style.display = '';
  document.getElementById('adm-main-screen').style.display = 'none';
  setTimeout(function() { document.getElementById('adm-pw-input').focus(); }, 100);
}

function closeAdmin() {
  if (admDirtyPages && Object.keys(admDirtyPages).length > 0 || admDirtyQuizzes) {
    if (!confirm('You have unsaved changes. Close anyway?')) return;
  }
  document.getElementById('admin-overlay').classList.remove('active');
  document.getElementById('adm-pw-input').value = '';
  admAuthenticated = false;
}

function admLogin() {
  var pw = document.getElementById('adm-pw-input').value;
  if (pw === ADM_PASSWORD) {
    admAuthenticated = true;
    document.getElementById('adm-login-screen').style.display = 'none';
    document.getElementById('adm-main-screen').style.display = 'flex';
    admNav('content');
  } else {
    document.getElementById('adm-login-error').style.display = 'block';
    document.getElementById('adm-pw-input').value = '';
    document.getElementById('adm-pw-input').focus();
  }
}

// ── ADMIN NAVIGATION ──
function admNav(panel) {
  admCurrentPanel = panel;
  // highlight nav
  document.querySelectorAll('.adm-nav-item').forEach(function(el) { el.classList.remove('active'); });
  var navEl = document.getElementById('adm-nav-' + panel);
  if (navEl) navEl.classList.add('active');
  // render panel
  var area = document.getElementById('adm-content-area');
  if (panel === 'content') area.innerHTML = admRenderContentPanel();
  else if (panel === 'quizzes') area.innerHTML = admRenderQuizPanel();
  else if (panel === 'aigen') area.innerHTML = admRenderAiPanel();
  else if (panel === 'export') area.innerHTML = admRenderExportPanel();
}

function admRenderContentPanel() {
  // Build page options
  var options = '';
  SECTIONS.forEach(function(sec) {
    sec.pages.forEach(function(p) {
      var dirty = admDirtyPages[p.id] ? ' ●' : '';
      options += '<option value="' + sec.id + '|' + p.id + '">' + sec.label + ' › ' + p.title + dirty + '</option>';
    });
  });

  var selectedKey = admCurrentPage || (SECTIONS[0].id + '|' + SECTIONS[0].pages[0].id);
  var parts = selectedKey.split('|');
  var sec = SECTIONS.find(function(s) { return s.id === parts[0]; });
  var page = sec ? sec.pages.find(function(p) { return p.id === parts[1]; }) : null;
  if (!page) { sec = SECTIONS[0]; page = sec.pages[0]; selectedKey = sec.id + '|' + page.id; }

  var content = admDirtyPages[page.id] !== undefined ? admDirtyPages[page.id] : page.content;
  var escaped = content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  return '<div class="adm-card">' +
    '<div class="adm-card-head"><h3>📄 Page Content Editor</h3><span class="adm-card-sub">Edit SOP text, tables, and callouts for any page</span></div>' +

      '<select class="adm-page-select" id="adm-page-sel" onchange="admSelectPage(this.value)">' + options + '</select>' +
      '<div class="adm-field-row">' +
        '<div class="adm-field"><label>Page Title</label><input class="adm-input" id="adm-meta-title" value="' + page.title.replace(/"/g,'&quot;') + '"></div>' +
        '<div class="adm-field"><label>Owner</label><input class="adm-input" id="adm-meta-owner" value="' + page.owner.replace(/"/g,'&quot;') + '"></div>' +
      '</div>' +
      '<div class="adm-editor-tabs">' +
        '<div class="adm-tab active" id="tab-edit" onclick="admSwitchTab(\'edit\')">HTML Source</div>' +
        '<div class="adm-tab" id="tab-preview" onclick="admSwitchTab(\'preview\')">Preview</div>' +
      '</div>' +
      '<div class="adm-editor-panel active" id="panel-edit">' +
        '<textarea class="adm-textarea" id="adm-content-editor" oninput="admMarkDirty()">' + escaped + '</textarea>' +
      '</div>' +
      '<div class="adm-editor-panel" id="panel-preview">' +
        '<div class="adm-preview prose" id="adm-preview-box"></div>' +
      '</div>' +
      '<div class="adm-editor-actions">' +
        '<button class="adm-btn adm-btn-amber" onclick="admSavePage()">Save Page</button>' +
        '<button class="adm-btn adm-btn-ghost" onclick="admRevertPage()">Revert</button>' +
        '<span class="adm-save-status" id="adm-save-status">Changes saved in memory — export to make permanent</span>' +
      '</div>' +
    '</div></div>';
}

function admSelectPage(val) {
  admCurrentPage = val;
  admNav('content');
}

function admSwitchTab(tab) {
  document.getElementById('tab-edit').classList.toggle('active', tab === 'edit');
  document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
  document.getElementById('panel-edit').classList.toggle('active', tab === 'edit');
  document.getElementById('panel-preview').classList.toggle('active', tab === 'preview');
  if (tab === 'preview') {
    var html = document.getElementById('adm-content-editor').value;
    document.getElementById('adm-preview-box').innerHTML = html;
  }
}

function admMarkDirty() {
  var status = document.getElementById('adm-save-status');
  if (status) { status.textContent = '● Unsaved changes'; status.className = 'adm-save-status unsaved'; }
}

function admSavePage() {
  if (!admCurrentPage) return;
  var parts = admCurrentPage.split('|');
  var sec = SECTIONS.find(function(s) { return s.id === parts[0]; });
  if (!sec) return;
  var page = sec.pages.find(function(p) { return p.id === parts[1]; });
  if (!page) return;

  var newContent = document.getElementById('adm-content-editor').value;
  var newTitle = document.getElementById('adm-meta-title').value;
  var newOwner = document.getElementById('adm-meta-owner').value;

  page.content = newContent;
  page.title = newTitle;
  page.owner = newOwner;
  admDirtyPages[page.id] = newContent;

  var status = document.getElementById('adm-save-status');
  if (status) { status.textContent = '✓ Saved'; status.className = 'adm-save-status saved'; }
  admToast('Page saved: ' + page.title, 'success');
}

function admRevertPage() {
  if (!admCurrentPage) return;
  var parts = admCurrentPage.split('|');
  var sec = SECTIONS.find(function(s) { return s.id === parts[0]; });
  if (!sec) return;
  var page = sec.pages.find(function(p) { return p.id === parts[1]; });
  if (!page || !confirm('Revert to last saved version?')) return;
  delete admDirtyPages[page.id];
  admNav('content');
}

function admSaveAll() {
  // flush all dirty pages into SECTIONS
  Object.keys(admDirtyPages).forEach(function(pid) {
    SECTIONS.forEach(function(sec) {
      sec.pages.forEach(function(p) {
        if (p.id === pid) p.content = admDirtyPages[pid];
      });
    });
  });
  admDirtyPages = {};
  admDirtyQuizzes = false;
  admToast('All changes saved to memory. Use Export to make permanent.', 'success');
  if (admCurrentPanel) admNav(admCurrentPanel);
}

// ══════════════════════════════════════════════════════════
// QUIZ EDITOR PANEL
// ══════════════════════════════════════════════════════════
function admRenderQuizPanel() {
  var qzOpts = '';
  Object.keys(QUIZZES).forEach(function(k) {
    var sel = k === admCurrentQuiz ? ' selected' : '';
    qzOpts += '<option value="' + k + '"' + sel + '>' + QUIZZES[k].title + ' (' + QUIZZES[k].questions.length + ' questions)</option>';

            '<div class="adm-q-text">' + q.q + '</div>' +
            '<div class="adm-q-meta">Correct: ' + choices[q.a] + ' · ' + q.c[q.a].substring(0,50) + '</div>' +
          '</div>' +
          '<div class="adm-q-toggle" id="qtog_' + i + '">▾</div>' +
        '</div>' +
        '<div class="adm-q-body" id="qbody_' + i + '">' +
          '<div class="adm-q-field"><label>Question Text</label>' +
            '<input class="adm-q-input" id="qq_' + i + '" value="' + q.q.replace(/"/g,'&quot;') + '"></div>' +

          '<div class="adm-q-field"><label>Correct Answer</label>' +
            '<select class="adm-q-answer-select" id="qa_' + i + '">' + answerOpts + '</select></div>' +
          '<div class="adm-q-field"><label>Explanation</label>' +
            '<input class="adm-q-input" id="qe_' + i + '" value="' + (q.e||'').replace(/"/g,'&quot;') + '"></div>' +
          '<div class="adm-q-actions">' +
            '<button class="adm-btn adm-btn-amber adm-btn-sm" onclick="admSaveQ(' + i + ')">Save</button>' +
            '<button class="adm-btn adm-btn-danger adm-btn-sm" onclick="admDeleteQ(' + i + ')">Delete</button>' +

      '<span class="adm-card-sub">Edit questions for any quiz · Changes sync to export</span></div>' +
    '<div class="adm-card-body">' +
      '<label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);display:block;margin-bottom:6px;">Select Quiz</label>' +
      '<select class="adm-quiz-select" onchange="admSelectQuiz(this.value)">' + qzOpts + '</select>' +
      '<div style="font-size:12px;color:var(--steel);margin-bottom:12px;">' + qz.questions.length + ' questions · 80% pass threshold (≥' + Math.ceil(qz.questions.length * 0.8) + ' correct)</div>' +
      questionsHTML +

function admRenderNewQForm() {
  return '<div class="adm-new-q-form" id="adm-new-q-form">' +
    '<h4>+ Add New Question</h4>' +
    '<div class="adm-q-field"><label>Question Text</label>' +
      '<input class="adm-q-input" id="nq_q" placeholder="Enter question..."></div>' +
    '<div class="adm-q-answer-row">' +
      '<div class="adm-q-field"><label>Choice A</label><input class="adm-q-input" id="nq_c0" placeholder="Choice A"></div>' +
      '<div class="adm-q-field"><label>Choice B</label><input class="adm-q-input" id="nq_c1" placeholder="Choice B"></div>' +
      '<div class="adm-q-field"><label>Choice C</label><input class="adm-q-input" id="nq_c2" placeholder="Choice C"></div>' +
      '<div class="adm-q-field"><label>Choice D</label><input class="adm-q-input" id="nq_c3" placeholder="Choice D"></div>' +
    '</div>' +
    '<div class="adm-q-field"><label>Correct Answer</label>' +
      '<select class="adm-q-answer-select" id="nq_a">' +
        '<option value="0">A</option><option value="1">B</option>' +
        '<option value="2">C</option><option value="3">D</option>' +
      '</select></div>' +
    '<div class="adm-q-field"><label>Explanation</label>' +
      '<input class="adm-q-input" id="nq_e" placeholder="Why is this the correct answer?"></div>' +

}

function admSelectQuiz(key) {
  admCurrentQuiz = key;
  admNav('quizzes');
}

function admToggleQ(i) {
  var body = document.getElementById('qbody_' + i);
  var tog = document.getElementById('qtog_' + i);
  var open = body.classList.toggle('open');
  if (tog) tog.textContent = open ? '▴' : '▾';
}

function admSaveQ(i) {
  var qz = QUIZZES[admCurrentQuiz];
  var c = [
    document.getElementById('qc_'+i+'_0').value,
    document.getElementById('qc_'+i+'_1').value,
    document.getElementById('qc_'+i+'_2').value,
    document.getElementById('qc_'+i+'_3').value
  ];
  qz.questions[i] = {
    q: document.getElementById('qq_'+i).value,
    c: c,
    a: parseInt(document.getElementById('qa_'+i).value),
    e: document.getElementById('qe_'+i).value
  };
  admDirtyQuizzes = true;
  admToast('Question ' + (i+1) + ' saved', 'success');
  admNav('quizzes');
}

function admDeleteQ(i) {
  if (!confirm('Delete question ' + (i+1) + '?')) return;
  QUIZZES[admCurrentQuiz].questions.splice(i, 1);
  admDirtyQuizzes = true;
  admToast('Question deleted', '');
  admNav('quizzes');
}

function admAddQ() {
  var q = document.getElementById('nq_q').value.trim();
  if (!q) { admToast('Question text is required', 'error'); return; }
  var c = [
    document.getElementById('nq_c0').value.trim(),
    document.getElementById('nq_c1').value.trim(),
    document.getElementById('nq_c2').value.trim(),
    document.getElementById('nq_c3').value.trim()
  ];
  if (c.some(function(x){return !x;})) { admToast('All 4 choices are required', 'error'); return; }
  QUIZZES[admCurrentQuiz].questions.push({
    q: q, c: c,
    a: parseInt(document.getElementById('nq_a').value),
    e: document.getElementById('nq_e').value.trim()
  });
  admDirtyQuizzes = true;
  admToast('Question added to ' + QUIZZES[admCurrentQuiz].title, 'success');
  admNav('quizzes');
}
