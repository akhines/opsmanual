 that I\u0026#39;ll get some things ready for the next steps so we can get you onboarded.\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClose \u0026amp; Confirm:\u003c/strong\u003e \u0026quot;Once you click Sign, title opens today. I want to give you our Transaction Coordinator\u0026#39;s contact information since she will be your contact person for everything from here on out. Can you write it down right now?\u0026quot;\u003c/p\u003e\u003ch2\u003eFull Acquisitions Playbook\u003c/h2\u003e\u003cp\u003eThe complete document with all scripts, worksheets, and bonus tactics:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003ca href=\"https://docs.google.com/document/d/1xWzGJosG4ycXmxI3jASCfKFHRiyt6C0ZtKyA-iJ2lps/edit\" target=\"_blank\"\u003eAcquisitions Playbook \u0026mdash; Full Google Doc\u003c/a\u003e\u003c/strong\u003e\u003c/p\u003e\u003ch2\u003eRequired GHL Fields \u0026mdash; After the Appointment\u003c/h2\u003e\u003cp\u003eThese fields must be completed within 2 hours of the appointment:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLink to Comps:\u003c/strong\u003e The shareable comp research link.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDate of Appointment\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDropbox Link to Property Photos:\u003c/strong\u003e Upload all photos and paste the share link.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActual Cash Offer Submitted:\u003c/strong\u003e The offer amount presented to the seller.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAppointment Notes:\u003c/strong\u003e Summary of the appointment \u0026mdash; seller demeanor, property condition, negotiation notes, next steps, concerns.\u003c/p\u003e"},{"id":"comping-properties","title":"Comping Properties \u0026 ARV","dept":"Acquisitions","updated":"Mar 2026","owner":"Joshua","body":"\u003ch2\u003ePhase 1 — Gather Info\u003c/h2\u003e\u003cp\u003ePull property listing, paste call transcript into ChatGPT, pull SDAT tax record, check BrightMLS.\u003c/p\u003e\u003ch2\u003ePhase 2 — Run Comps\u003c/h2\u003e\u003cp\u003eSearch BrightMLS: within ¼ mile, last 6 months, within 300 sqft, same bed/bath, same property type. Always check photos — the list view will fool you.\u003c/p\u003e\u003ch2\u003ePhase 3 — Set the ARV\u003c/h2\u003e\u003cp\u003eBased on comps, determine After Repair Value. Copy the shareable comp link and save to the opportunity card in GHL.\u003c/p\u003e"},{"id":"repair-estimating","title":"Repair Estimating","dept":"Acquisitions","updated":"Mar 2026","owner":"Joshua / Mike","body":"\u003ch2\u003eHow to Estimate Repairs\u003c/h2\u003e\u003cp\u003eUse the table below as your baseline. Every property gets a repair estimate before we make an offer. When in doubt, round up. A deal that falls apart because repairs were underestimated costs more than padding your estimate by 10%.\u003c/p\u003e\u003ctable style=\"width:100%;border-collapse:collapse;margin:24px 0;font-size:14px\"\u003e\u003cthead\u003e\u003ctr style=\"background:#1A1A1A;color:#fff\"\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eCategory\u003c/th\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eCosmetic / Minor\u003c/th\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eModerate\u003c/th\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eFull Gut / Replace\u003c/th\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eCommon Triggers\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eKitchen\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;3K \u0026#8211; \u0026#36;8K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;8K \u0026#8211; \u0026#36;18K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;18K \u0026#8211; \u0026#36;35K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eOutdated cabinets, damaged counters, no dishwasher, old appliances, water damage under sink\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eBathroom (each)\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;2K \u0026#8211; \u0026#36;5K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;5K \u0026#8211; \u0026#36;12K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;12K \u0026#8211; \u0026#36;18K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eCracked tile, old vanity, leaky fixtures, mold around tub, non-functioning toilet\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eFlooring\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;3K \u0026#8211; \u0026#36;6K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;6K \u0026#8211; \u0026#36;12K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;12K \u0026#8211; \u0026#36;20K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eWorn carpet, damaged hardwood, uneven subfloor, pet stains, water damage warping\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eRoof\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;1K \u0026#8211; \u0026#36;4K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;4K \u0026#8211; \u0026#36;10K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;10K \u0026#8211; \u0026#36;18K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eMissing shingles, age 20+ years, visible sagging, active leaks, multiple layers\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eHVAC\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;500 \u0026#8211; \u0026#36;2K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;2K \u0026#8211; \u0026#36;6K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;6K \u0026#8211; \u0026#36;10K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eAge 15+ years, no central air, window units only, radiator heat, unusual noises\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eElectrical\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;1K \u0026#8211; \u0026#36;3K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;3K \u0026#8211; \u0026#36;8K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;8K \u0026#8211; \u0026#36;15K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eFuse box (no breakers), knob-and-tube, aluminum wiring, insufficient amperage, exposed wiring\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003ePlumbing\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;1K \u0026#8211; \u0026#36;3K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;3K \u0026#8211; \u0026#36;8K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;8K \u0026#8211; \u0026#36;15K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eGalvanized/lead pipes, low water pressure, sewer line issues, polybutylene, well/septic\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003ePaint (Int+Ext)\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;2K \u0026#8211; \u0026#36;4K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;4K \u0026#8211; \u0026#36;6K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;6K \u0026#8211; \u0026#36;8K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003ePeeling, smoke/nicotine staining, bold/dark colors, lead paint (pre-1978), exterior wood rot\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eFoundation\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;1K \u0026#8211; \u0026#36;5K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;5K \u0026#8211; \u0026#36;15K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;15K \u0026#8211; \u0026#36;30K+\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eCracks wider than 1/4 inch, bowing walls, water intrusion, uneven floors, stuck doors/windows\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eWindows\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;300 \u0026#8211; \u0026#36;500/ea\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;500 \u0026#8211; \u0026#36;800/ea\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;800 \u0026#8211; \u0026#36;1.2K/ea\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eSingle-pane, broken seals (foggy), cracked glass, painted shut, non-functional\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eSiding / Exterior\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;2K \u0026#8211; \u0026#36;5K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;5K \u0026#8211; \u0026#36;12K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;12K \u0026#8211; \u0026#36;20K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eRotting wood, damaged vinyl, missing sections, asbestos siding, brick repointing needed\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eWater Heater\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;500 \u0026#8211; \u0026#36;1K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;1K \u0026#8211; \u0026#36;2K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;2K \u0026#8211; \u0026#36;4K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eAge 10+ years, rust, slow heating, tankless conversion needed\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eLandscaping / Grading\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;500 \u0026#8211; \u0026#36;2K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;2K \u0026#8211; \u0026#36;5K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;5K \u0026#8211; \u0026#36;10K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eOvergrown, grading toward house, retaining wall failure, tree removal, driveway/walkway damage\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eDumpster / Cleanout\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;500 \u0026#8211; \u0026#36;1.5K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;1.5K \u0026#8211; \u0026#36;4K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;4K \u0026#8211; \u0026#36;8K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B;font-size:13px\"\u003eHoarder level, full basement/garage, appliance removal, hazardous materials\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003ch2\u003eQuick Reference Totals by Rehab Level\u003c/h2\u003e\u003ctable style=\"width:100%;border-collapse:collapse;margin:20px 0;font-size:14px\"\u003e\u003cthead\u003e\u003ctr style=\"background:#1A1A1A;color:#fff\"\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eRehab Level\u003c/th\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eTypical Range\u003c/th\u003e\u003cth style=\"padding:12px 14px;text-align:left;border-bottom:2px solid #E3A728\"\u003eWhat It Looks Like\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eLight Cosmetic\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;10K \u0026#8211; \u0026#36;25K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B\"\u003ePaint, carpet, minor fixtures, appliance swap, cleanout. Livable as-is.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#F5F4F1\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eModerate\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;25K \u0026#8211; \u0026#36;60K\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B\"\u003eKitchen/bath refresh, flooring throughout, some mechanicals, roof patch or replacement, drywall repairs.\u003c/td\u003e\u003c/tr\u003e\u003ctr style=\"background:#fff\"\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;font-weight:600\"\u003eHeavy / Full Gut\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8\"\u003e\u0026#36;60K \u0026#8211; \u0026#36;120K+\u003c/td\u003e\u003ctd style=\"padding:10px 14px;border-bottom:1px solid #E8E8E8;color:#6B6B6B\"\u003eStuds out. New kitchen, baths, all mechanicals (HVAC, electric, plumbing), roof, windows, foundation work. Uninhabitable before rehab.\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003ch2\u003eEstimating Rules\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eAlways round up.\u003c/strong\u003e A deal that falls apart because repairs were underestimated costs far more than padding your estimate by 10%.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAdd 10-15% contingency\u003c/strong\u003e on top of your line-item total. There are always surprises behind walls, under floors, and in crawlspaces.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAge of the house matters.\u003c/strong\u003e Pre-1970 homes are more likely to have knob-and-tube wiring, galvanized plumbing, lead paint, and asbestos. Budget higher for mechanicals on older properties.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUse the property photos.\u003c/strong\u003e Review your appointment photos against this table. If you did not photograph the mechanicals (HVAC label, electrical panel, water heater), you are guessing \u0026#8212; and guessing costs money.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhen in doubt, call a contractor.\u003c/strong\u003e For foundation, structural, and major mechanical items over \u0026#36;15K, get a contractor estimate before committing to a number. Do not guess on big-ticket items.\u003c/p\u003e\u003ch2\u003eHow This Feeds Your Offer\u003c/h2\u003e\u003cp\u003eYour repair estimate directly impacts the offer price. The formula: \u003cstrong\u003eOffer = ARV \u0026#215; 70% \u0026#8211; Repairs \u0026#8211; Our Fee\u003c/strong\u003e. If repairs are \u0026#36;40K on a \u0026#36;200K ARV property: \u0026#36;200K \u0026#215; 0.70 = \u0026#36;140K \u0026#8211; \u0026#36;40K repairs \u0026#8211; \u0026#36;10K fee = \u0026#36;90K max offer. If your repair estimate is wrong by \u0026#36;15K, your offer is wrong by \u0026#36;15K \u0026#8212; and that comes directly out of margin or kills the deal for the buyer.\u003c/p\u003e"},{"id":"ab-contract","title":"A-B Contract Overview","dept":"Acquisitions","updated":"Mar 2026","owner":"Joshua / Mike","body":"\u003ch2\u003eWhat Is the A-B Contract?\u003c/h2\u003e\u003cp\u003eThe purchase agreement between the seller (A) and Impact Home Team (B). This gives us equitable interest and the right to assign.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey fields:\u003c/strong\u003e Purchase Price, EMD ($100-500), Inspection Period (14-21 days), Closing Date (30-45 days), Assignment Clause (required).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAfter signing:\u003c/strong\u003e Upload contract to GHL, move to A-B Signed, notify TC, deliver EMD to title company.\u003c/p\u003e"},{"id":"photo-documentation","title":"Photo \u0026 Property Documentation","dept":"Acquisitions","updated":"Mar 2026","owner":"Joshua / Mike","body":"\u003ch2\u003eWhy This Matters\u003c/h2\u003e\u003cp\u003ePhotos are required for deal packaging, buyer marketing, and repair estimating. Bad photos kill buyer interest. Missing photos delay the handoff to Dispositions. Take them right the first time — you will not want to go back.\u003c/p\u003e\u003ch2\u003eMinimum Photo Requirements\u003c/h2\u003e\u003cp\u003eEvery appointment must produce at least 15 photos. Here is the shot list:\u003c/p\u003e\u003ch3\u003eExterior (minimum 4)\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eFront of house:\u003c/strong\u003e Full front elevation, straight on, from the sidewalk. Include the full facade, roof line, and yard.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBack of house:\u003c/strong\u003e Full rear elevation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLeft and right sides:\u003c/strong\u003e Show the condition of siding, windows, and any visible damage.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStreet view:\u003c/strong\u003e One photo showing the property in context with neighboring houses. This helps buyers assess the neighborhood.\u003c/p\u003e\u003ch3\u003eInterior — Every Room (minimum 8)\u003c/h3\u003e\u003cp\u003ePhotograph every room. For each room, take at least one wide-angle shot from the doorway showing the full space. For kitchens and bathrooms, take additional detail shots of counters, cabinets, fixtures, and any damage.\u003c/p\u003e\u003ch3\u003eDamage \u0026 Mechanicals (minimum 3)\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eAll visible damage:\u003c/strong\u003e Close-ups of water stains, cracks, mold, missing fixtures, damaged flooring, roof issues, foundation cracks. If you can see it, photograph it.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMechanicals:\u003c/strong\u003e HVAC unit (indoor and outdoor), water heater, electrical panel. Get close enough to read the manufacturer label — buyers use this to estimate age and replacement cost.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBasement/crawlspace:\u003c/strong\u003e If accessible, photograph the foundation walls, any water intrusion, and the general condition.\u003c/p\u003e\u003ch2\u003ePhoto Quality Standards\u003c/h2\u003e\u003cp\u003eUse your phone camera in landscape orientation. Make sure the lens is clean. Turn on lights in every room before shooting. No fingers, no shadows, no blurry shots. If a photo is dark or unclear, retake it on the spot.\u003c/p\u003e\u003ch2\u003eUpload Process\u003c/h2\u003e\u003cp\u003eUpload all photos to the opportunity card in GHL within 2 hours of the appointment. Create a folder or note labeled \"[Address] - Photos - [Date].\" These photos are what Ted and Joshua use for deal packaging — they should not have to ask you for them.\u003c/p\u003e"},{"id":"seller-communication","title":"Seller Communication Post-Contract","dept":"Acquisitions","updated":"Mar 2026","owner":"Joshua / Mike / Ashley","body":"\u003ch2\u003eWho Owns the Seller Relationship\u003c/h2\u003e\u003cp\u003eAfter the A-B contract is signed, the seller relationship transfers from Acquisitions to Ashley (TC). However, during the first 48 hours after signing, the acquisitions agent who built the rapport stays as the primary contact. Here is the timeline:\u003c/p\u003e\u003ch2\u003eCommunication Timeline\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eDay 0 (contract signing):\u003c/strong\u003e The acquisitions agent sends a thank-you text within 2 hours: \"Hey [Name], thanks again for meeting today. We\u0027re excited to move forward on [Address]. I\u0027m going to introduce you to Ashley, who handles our closing process. She\u0027ll be your main point of contact from here. You\u0027re in great hands.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 1:\u003c/strong\u003e Ashley sends an introduction text: \"Hi [Name], this is Ashley with Impact Home Team. [Agent Name] filled me in on everything — I\u0027ll be coordinating your closing from here. I\u0027ll keep you updated every step of the way. Feel free to text or call me here anytime.\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDay 3-5:\u003c/strong\u003e Ashley sends a progress update even if there is no news: \"Hi [Name], quick update — title work is underway on [Address] and everything is moving along. I\u0027ll reach out again in a few days with the next update.\" Silence is the #1 reason sellers get nervous and start shopping other offers.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWeekly:\u003c/strong\u003e Ashley sends a brief status text every 7 days until closing. Even if the update is \"no change, still on track,\" send it. The seller should never go more than 7 days without hearing from us.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePre-closing (3-5 days out):\u003c/strong\u003e Ashley calls (not texts) the seller to walk through closing logistics: date, time, location, what to bring, what to expect, when they\u0027ll receive funds.\u003c/p\u003e\u003ch2\u003eWhen Things Go Wrong\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eClosing delay:\u003c/strong\u003e Call the seller immediately. Do not text delays — call. Explain what happened, give a new timeline, and reassure them. Follow up the call with a text confirming the new date.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePrice renegotiation:\u003c/strong\u003e If we need to renegotiate the A-B price (due to inspection findings, title issues, etc.), the acquisitions agent who built the rapport makes this call, not Ashley. The person with the relationship delivers the difficult conversation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSeller getting cold feet:\u003c/strong\u003e If the seller starts expressing doubt, immediately escalate to Joshua. Do not wait. A warm conversation within 24 hours usually saves the deal. After 48 hours of doubt, the deal is significantly harder to save.\u003c/p\u003e\u003ch2\u003ePost-Closing\u003c/h2\u003e\u003cp\u003eAfter settlement, Ashley sends a closing text: \"Hi [Name], congratulations — your closing on [Address] is complete! Funds should hit your account within [timeframe]. It was a pleasure working with you. If you ever know anyone looking to sell, we\u0027d love the referral.\" Follow up 7 days later with a Google review request.\u003c/p\u003e"}]},{"id":"dispositions","label":"Dispositions","color":"#2563EB","pages":[{"id":"dispo-overview","title":"Dispositions Overview","dept":"Dispositions","updated":"Mar 2026","owner":"Ashley / Ted","body":"\u003ch2\u003eWhat Dispositions Does\u003c/h2\u003e\u003cp\u003eOnce Acquisitions signs an A-B contract, Dispositions finds a buyer, negotiates the B-C contract, and gets the deal to closing.\u003c/p\u003e\u003ch2\u003ePipeline Stages\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eNew Deal\u003c/strong\u003e → \u003cstrong\u003eMarketing Active\u003c/strong\u003e → \u003cstrong\u003eBuyer Interest\u003c/strong\u003e → \u003cstrong\u003eB-C Negotiation\u003c/strong\u003e → \u003cstrong\u003eB-C Signed\u003c/strong\u003e (moves to TC)\u003c/p\u003e"},{"id":"deal-packaging","title":"Deal Packaging \u0026 Publishing","dept":"Dispositions","updated":"Mar 2026","owner":"Joshua / Ted","body":"\u003ch2\u003ePrerequisites\u003c/h2\u003e\u003cp\u003eBefore starting deal packaging, confirm you have: completed comp research with a shareable link saved to GHL, your ChatGPT thread with the property details loaded, access to Deal IQ, and property photos from the appointment or MLS.\u003c/p\u003e\u003ch2\u003ePhase 1 — Write the Listing\u003c/h2\u003e\u003cp\u003eIn your ChatGPT thread (which already has property context from comping), use this prompt:\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"Now write an investor-focused property listing for this property. Include: property type, bed/bath, square footage, lot size, condition summary, ARV, estimated repair cost, and wholesale price. Write it in a direct, no-fluff style that appeals to experienced cash buyers. Also give me 5 headline options.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003eReview and edit the output. Make sure numbers match your actual analysis — do not let AI hallucinate figures. Cross-check ARV, repair estimate, and price against your comp data and Deal IQ.\u003c/p\u003e\u003ch2\u003ePhase 2 — Price the Deal (Deal IQ)\u003c/h2\u003e\u003cp\u003eEnter these fields into Deal IQ:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eARV:\u003c/strong\u003e Your final ARV from comping.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRepair Estimate:\u003c/strong\u003e From your repair estimating worksheet.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA-to-B Price:\u003c/strong\u003e What we\u0027re paying the seller (contract price).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWholesale Price:\u003c/strong\u003e What we\u0027re asking from the buyer.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAssignment Fee:\u003c/strong\u003e Your spread (B-to-C minus A-to-B). Minimum target: $10K.\u003c/p\u003e\u003ch2\u003ePhase 3 — Publish \u0026 Send\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1.\u003c/strong\u003e Upload the listing and photos to the deal platform (Community, InvestorLift, or your deal page).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\u003c/strong\u003e Send the VIP text blast through Community or GHL to your active buyer list.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\u003c/strong\u003e Send the Mailchimp email to the broader buyer database with the full deal package.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\u003c/strong\u003e Post on InvestorLift if using it for this market.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\u003c/strong\u003e Log on the opportunity card in GHL that the deal has been published, with the date and channels used.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\u003c/strong\u003e Post in \u003cstrong\u003e#transactions\u003c/strong\u003e on Slack: \"Deal published: [Address] — [Wholesale Price] — sent to VIP list + Mailchimp + InvestorLift.\" Tag Ashley.\u003c/p\u003e\u003cp\u003eThe first 24 hours after a deal is published are the most critical. Most buyer interest comes in the first day.\u003c/p\u003e"},{"id":"buyer-marketing","title":"Buyer Marketing Channels","dept":"Dispositions","updated":"Mar 2026","owner":"Ted","body":"\u003ch2\u003eChannel Breakdown\u003c/h2\u003e\u003cp\u003eEvery deal gets marketed through multiple channels simultaneously. The release timing follows the Investor Segmentation SOP — Tier 1 first, then Tier 2, then full release. Here is how each channel works operationally.\u003c/p\u003e\u003ch2\u003e1. VIP Text Blast (Hour 0-1)\u003c/h2\u003e\u003cp\u003eSent through GHL or Community to Tier 1 VIP buyers within 1 hour of deal packaging. The text includes: property address, bed/bath/sqft, ARV, wholesale price, assignment fee, and a link to the full listing or photos. Keep the text under 300 characters — link to the details.\u003c/p\u003e\u003cp\u003eThe VIP list is maintained in GHL under the tag \"VIP Buyer.\" Ted owns the list and updates it monthly based on buyer activity and tier qualifications.\u003c/p\u003e\u003ch2\u003e2. Mailchimp Email (Hour 24-48)\u003c/h2\u003e\u003cp\u003eFull deal package sent to the broader buyer database. Ted uses the \"Deal Alert\" template in Mailchimp. Segment by: market area (Baltimore, PG County, Anne Arundel, etc.), buyer budget range, and property type preference. The email includes: all property photos, full listing copy, deal numbers (ARV, price, repairs, fee), and a reply-to that goes directly to Ted\u0027s GHL inbox.\u003c/p\u003e\u003cp\u003eList maintenance: remove bounced emails monthly, move non-openers (no opens in 90 days) to a suppression list, and add new buyers as they come in through InvestorLift, Facebook, and referrals.\u003c/p\u003e\u003ch2\u003e3. InvestorLift (Hour 24-48)\u003c/h2\u003e\u003cp\u003eUpload the listing to InvestorLift with full details and photos. InvestorLift exposes the deal to a broader national investor network. Monitor responses through the InvestorLift dashboard and reply within 2 hours during business hours.\u003c/p\u003e\u003ch2\u003e4. Facebook Groups (Hour 48+)\u003c/h2\u003e\u003cp\u003ePost in approved Facebook investor groups — currently: [list your specific group names here]. Post format: short description with key numbers (beds, ARV, price), one or two photos, and \"DM for details.\" Never post the full address publicly in a Facebook group. Respond to DMs within 1 hour and direct serious buyers to the full listing via email or text.\u003c/p\u003e\u003ch2\u003e5. Community Platform\u003c/h2\u003e\u003cp\u003eIf using Community for direct buyer engagement, post deal alerts through the platform. This is an additional channel for VIP and active buyers who prefer the Community app over text/email.\u003c/p\u003e\u003ch2\u003eInspection / Showing Scheduling\u003c/h2\u003e\u003cp\u003eWhen a buyer requests to see the property, schedule the showing and update the \u003cstrong\u003eInspection (Showing) Scheduled Date\u003c/strong\u003e field on the opportunity card. This field is required — it tracks buyer activity and helps forecast which deals are moving toward B-C.\u003c/p\u003e\u003ch2\u003eTracking\u003c/h2\u003e\u003cp\u003eFor every deal, log in the opportunity card notes: which channels the deal was sent to, the date/time for each channel, and buyer response volume by channel. This data helps us optimize where we spend marketing time on future deals.\u003c/p\u003e"},{"id":"bc-contract","title":"B-C Contract Process","dept":"Dispositions","updated":"Mar 2026","owner":"Ashley / Ted","body":"\u003ch2\u003eWhen a Buyer Wants to Move Forward\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003e1.\u003c/strong\u003e Verify proof of funds before sending contract. No POF = no contract.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\u003c/strong\u003e Negotiate B-C price. Minimum target spread: \u0000K. See the Margin Protection SOP for price floor rules.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\u003c/strong\u003e Send B-C contract via DocuSign. Include all deal terms: B-C price, EMD amount, inspection period, closing date.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\u003c/strong\u003e Collect buyer EMD within 24 hours. This is non-negotiable. EMD MUST be received by title/escrow within 24 hours of B-C signing. If EMD is not received within 24 hours, the deal is at risk — activate the backup buyer protocol immediately.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\u003c/strong\u003e Update GHL: move to \u0026quot;B-C Assigned\u0026quot; stage in the TC pipeline. Fill in all B-C fields: buyer name, B-C Assignment Sales Price, B-C EMD amount, B-C Date Signed, and EMD status.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\u003c/strong\u003e Post in \u003cstrong\u003e#transactions\u003c/strong\u003e on Slack: \u0026quot;B-C signed: [Address] — Buyer: [Name] — B-C Price: $[Price] — Fee: $[Fee] — EMD due within 24hrs.\u0026quot; Tag Ashley.\u003c/p\u003e\u003ch2\u003eAfter B-C is Signed\u003c/h2\u003e\u003cp\u003eThe deal moves to TC. Ashley takes over from here with the TC Closing Process checklist. Dispositions remains responsible for buyer communication until Ashley introduces herself to the buyer (Step 9 of the TC checklist).\u003c/p\u003e"},{"id":"buy-box","title":"Buy Box Overview","dept":"Dispositions","updated":"Mar 2026","owner":"Joshua / Ashley","body":"\u003ch2\u003ePrimary Buy Box\u003c/h2\u003e\u003cp\u003eSFR or small multi-family (2-4 units), ARV $100K-$400K, active Maryland markets, motivated seller, purchase at 65-75% ARV minus repairs, clear or manageable title.\u003c/p\u003e\u003ch2\u003eWe Pass On\u003c/h2\u003e\u003cp\u003eCommercial properties, unresolvable title issues, unrealistic price expectations, markets without active buyers.\u003c/p\u003e"},{"id":"investor-segmentation","title":"Investor Segmentation \u0026 Release Strategy","dept":"Dispositions","updated":"Mar 2026","owner":"Ashley / Ted","body":"\u003ch2\u003eBuyer Tiers\u003c/h2\u003e\u003cp\u003eEvery buyer in our database is assigned a tier. The tier determines when they see deals, how we communicate with them, and how much priority their offers get. This is not optional — it directly protects our margins and rewards the buyers who actually close.\u003c/p\u003e\u003ch3\u003eTier 1 — VIP Buyers\u003c/h3\u003e\u003cp\u003eThese are our proven closers. To qualify for Tier 1, a buyer must meet \u003cstrong\u003eat least 3 of these 4 criteria:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFast closers:\u003c/strong\u003e History of closing within 14 days or less from B-C signing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProven EMD:\u003c/strong\u003e Has delivered non-refundable EMD on at least 2 previous deals with us.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRepeat buyers:\u003c/strong\u003e Has closed 3+ deals with Impact Home Team.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePay at or above ask:\u003c/strong\u003e Consistently offers at or above our wholesale asking price without excessive negotiation.\u003c/p\u003e\u003cp\u003eTier 1 buyers are tagged \u003cstrong\u003e\"VIP Buyer\"\u003c/strong\u003e in GHL. They get first access to every deal.\u003c/p\u003e\u003ch3\u003eTier 2 — Active Buyers\u003c/h3\u003e\u003cp\u003eBuyers who are engaged, have proof of funds on file, and have either closed 1-2 deals with us or are actively submitting offers. They respond to deal blasts, show up to showings, and are building a track record. Tagged \u003cstrong\u003e\"Active Buyer\"\u003c/strong\u003e in GHL.\u003c/p\u003e\u003ch3\u003eTier 3 — Inactive / Price Shoppers\u003c/h3\u003e\u003cp\u003eBuyers who are on the list but haven\u0027t closed a deal, rarely respond to blasts, consistently lowball, or have let deals fall through. They still see deals — but last, and only if the deal hasn\u0027t moved at higher tiers. Tagged \u003cstrong\u003e\"Buyer - General\"\u003c/strong\u003e in GHL.\u003c/p\u003e\u003ch2\u003eRelease Strategy\u003c/h2\u003e\u003cp\u003eEvery deal follows this release sequence. No exceptions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHour 0–24: VIP-Only Window.\u003c/strong\u003e The deal goes to Tier 1 buyers only via VIP text blast and direct outreach. This is their exclusive window to submit offers. Do NOT send to the broader list during this window.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHour 24–48: Tier 2 Release.\u003c/strong\u003e If no accepted offer from Tier 1, release to Tier 2 via Mailchimp and InvestorLift. VIP buyers can still submit, but the pool is now wider.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHour 48+: Full Release.\u003c/strong\u003e Deal goes to the entire buyer database including Tier 3 and Facebook groups. At this point, you\u0027re casting a wide net.\u003c/p\u003e\u003ch2\u003eOffer Deadline Structure\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eBuy It Now:\u003c/strong\u003e Any Tier 1 buyer who offers at or above asking price during the VIP window gets the deal immediately. First come, first served. No waiting for more offers.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBest \u0026 Final:\u003c/strong\u003e If multiple offers come in and none are at full ask, set a Best \u0026 Final deadline — typically 24 hours from when you notify buyers. Communicate clearly: \"We have multiple offers. Best and final is due by [Date/Time]. Highest and best wins.\" All buyers who have submitted get this notice.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEscalation:\u003c/strong\u003e If the VIP window passes with no offers, escalate to Tier 2 immediately. If 48 hours pass with no viable offers at any tier, reassess pricing (see Margin Protection SOP).\u003c/p\u003e"},{"id":"margin-protection","title":"Margin Protection SOP","dept":"Dispositions","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003ePurpose\u003c/h2\u003e\u003cp\u003eThis SOP exists to protect our revenue. The temptation when a deal isn\u0027t moving is to drop the price immediately. That kills margin and trains buyers to wait you out. These are the guardrails.\u003c/p\u003e\u003ch2\u003eRules\u003c/h2\u003e\u003ch3\u003e1. Never Reduce Price Within the First 24 Hours\u003c/h3\u003e\u003cp\u003eNo price reductions during the VIP window. Period. If no Tier 1 buyer bites at full ask, the deal goes to Tier 2 at the same price. The first price drop, if needed, happens no earlier than 48 hours after initial release.\u003c/p\u003e\u003ch3\u003e2. Minimum Assignment Floor\u003c/h3\u003e\u003cp\u003eBefore any deal is published, set the \u003cstrong\u003eminimum assignment fee floor\u003c/strong\u003e on the opportunity card. This is the absolute lowest spread you will accept. For most deals, the floor is \u003cstrong\u003e$7,500\u003c/strong\u003e. Any offer that would put the assignment fee below the floor requires Ashley\u0027s approval before accepting. No team member has authority to accept a below-floor deal on their own.\u003c/p\u003e\u003ch3\u003e3. Conditions Required to Renegotiate\u003c/h3\u003e\u003cp\u003eA price reduction is only justified if one or more of these conditions exist:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarket feedback:\u003c/strong\u003e 3+ serious buyers have all independently said the price is too high (not just one lowball).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNew information:\u003c/strong\u003e Inspection revealed issues not previously known that materially affect the buyer\u0027s rehab budget.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTime pressure:\u003c/strong\u003e The A-B inspection period or closing date is approaching and we have no viable buyer.\u003c/p\u003e\u003cp\u003eDocument the justification in the opportunity card notes before reducing price.\u003c/p\u003e\u003ch3\u003e4. When to Pivot to a Backup Buyer\u003c/h3\u003e\u003cp\u003eIf your primary buyer goes dark (no response in 24 hours after B-C is sent), is stalling on EMD, or fails to meet a deadline — immediately activate the backup buyer (see Backup Buyer Protocol). Do not wait and hope. Every day of delay costs money and erodes seller trust.\u003c/p\u003e\u003ch3\u003e5. When to Extend a Deadline\u003c/h3\u003e\u003cp\u003eExtend the offer deadline only if: a serious Tier 1 or Tier 2 buyer requests 24 additional hours and provides a specific reason (funding verification, partner review). Maximum one extension per deal. Document it in the opportunity card.\u003c/p\u003e\u003ch3\u003e6. When to Cancel and Relist\u003c/h3\u003e\u003cp\u003eIf after 7 days of marketing across all tiers there are no viable offers at or above the assignment floor, it\u0027s time for a strategy conversation between Ashley and Joshua. Options: renegotiate the A-B price with the seller, adjust the wholesale price and relist, or exercise the inspection contingency and walk away. Walking away from a bad deal is better than closing one that loses money or barely breaks even.\u003c/p\u003e"},{"id":"offer-management","title":"Offer Intake \u0026 Selection SOP","dept":"Dispositions","updated":"Mar 2026","owner":"Ashley / Ted","body":"\u003ch2\u003ePurpose\u003c/h2\u003e\u003cp\u003eEvery offer gets evaluated the same way. No gut feelings, no favoritism. This system ensures we select the buyer most likely to actually close at the best price.\u003c/p\u003e\u003ch2\u003eRequired From Every Buyer\u003c/h2\u003e\u003cp\u003eBefore an offer is considered, the buyer must provide all five of these. Incomplete offers are not reviewed — send them back with a checklist of what\u0027s missing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Proof of Funds:\u003c/strong\u003e Bank statement, proof of credit line, or hard money pre-approval dated within 30 days. Screenshots of account balances are acceptable. No verbal \"I have the money\" claims.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. EMD Amount:\u003c/strong\u003e Buyer must state their EMD amount. Our minimum is $2,000 or 2% of the B-C price, whichever is greater. Non-refundable EMD after 3 business days is strongly preferred.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Closing Date:\u003c/strong\u003e Buyer must commit to a specific closing date. It must fall within our A-B closing window. If they can\u0027t close within our timeline, they\u0027re not a viable buyer for this deal.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Inspection Terms:\u003c/strong\u003e Buyer must state their inspection timeline. Our preference: 5 business days or waived entirely. Anything over 10 days is a red flag — they may be using our contract to shop the deal.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Non-Refundable EMD Timeline:\u003c/strong\u003e When does the EMD go hard (non-refundable)? Best case: upon signing. Acceptable: 3-5 business days after contract execution. Anything beyond 7 days requires Ashley\u0027s approval.\u003c/p\u003e\u003ch2\u003eOffer Scoring Matrix\u003c/h2\u003e\u003cp\u003eWhen comparing multiple offers, score each one on these four criteria:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePrice — 40% weight.\u003c/strong\u003e How close is the offer to our asking price? At or above ask = 10 points. Within 5% = 7 points. 5-10% below = 4 points. More than 10% below = 1 point.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCertainty — 30% weight.\u003c/strong\u003e How likely is this buyer to actually close? Consider: proof of funds quality, EMD going hard quickly, no financing contingencies, track record with us. Tier 1 VIP with cash and non-refundable EMD = 10 points. New buyer with hard money and a long inspection = 4 points.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSpeed — 20% weight.\u003c/strong\u003e How fast can they close? Under 10 days = 10 points. 10-21 days = 7 points. 21-30 days = 4 points. Over 30 days = 1 point.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRelationship — 10% weight.\u003c/strong\u003e Have they closed with us before? Do they have a track record of clean, no-drama closings? Tier 1 repeat buyer = 10 points. New but responsive buyer = 5 points. Unknown = 2 points.\u003c/p\u003e\u003cp\u003eMultiply each score by its weight, add them up. Highest total score wins. Document the scoring on the opportunity card when you have multiple offers so there\u0027s a clear record of why you chose the buyer you chose.\u003c/p\u003e\u003ch2\u003eWhen Offers Are Equal\u003c/h2\u003e\u003cp\u003eIf two offers score within 5% of each other, the tiebreaker goes to: (1) the buyer who submitted first, then (2) the buyer willing to go non-refundable on EMD fastest, then (3) the Tier 1 buyer over a lower-tier buyer.\u003c/p\u003e"},{"id":"backup-buyer-protocol","title":"Backup Buyer Protocol","dept":"Dispositions","updated":"Mar 2026","owner":"Ashley / Ted","body":"\u003ch2\u003eWhy This Matters\u003c/h2\u003e\u003cp\u003eDeals fall through. Buyers go dark, financing falls apart, inspections kill the deal. If you don\u0027t have a backup buyer ready, you\u0027re starting the entire marketing process over from scratch — burning days you may not have before the A-B closing deadline. Fallout without a backup is the #1 deal killer at scale.\u003c/p\u003e\u003ch2\u003eThe Rule: Always Collect Backup Offers\u003c/h2\u003e\u003cp\u003eWhen you accept a primary buyer\u0027s offer, do NOT tell the other interested buyers the deal is gone. Instead, immediately send this message to every other buyer who submitted an offer or expressed serious interest:\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"Hey [Name], thanks for your interest in [Address]. We\u0027ve accepted an offer, but we\u0027re keeping backup positions open in case anything changes. You\u0027re [2nd/3rd] in line. I\u0027ll let you know within 48 hours if the deal opens back up. No action needed from you right now.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003eLog backup buyers on the opportunity card in order of preference (use the scoring matrix from the Offer Intake SOP to rank them).\u003c/p\u003e\u003ch2\u003eKeeping the Backup Warm\u003c/h2\u003e\u003cp\u003eWhile the primary buyer is moving through the B-C process, send the #2 buyer a brief check-in text at the 3-day mark:\u003c/p\u003e\u003cp\u003e\u003cem\u003e\"Hey [Name], quick update on [Address] — primary buyer is still in process. You\u0027re still next in line if anything changes. Just wanted to keep you in the loop.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThis keeps them engaged without creating a bidding war or making them feel jerked around.\u003c/p\u003e\u003ch2\u003e48-Hour Replacement Timeline\u003c/h2\u003e\u003cp\u003eIf the primary buyer falls through (fails to deliver EMD, goes dark, backs out), execute this immediately:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHour 0 (the moment you know):\u003c/strong\u003e Post in \u003cstrong\u003e#transactions\u003c/strong\u003e on Slack: \"⚠️ [Address] — primary buyer fell through. [Reason]. Activating backup.\" Tag Ashley. Update the opportunity card: move B-C status back to \"Buyer Interest\" and add a note with the fallout reason.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHour 0-2:\u003c/strong\u003e Call (not text) the #2 backup buyer. Use this script: \"Hey [Name], the deal at [Address] just opened back up. Are you still interested at [their original offer price]? I need to know within 24 hours if you want to move forward.\" If #2 passes, immediately move to #3.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHour 2-24:\u003c/strong\u003e If backup buyer confirms, send B-C contract via DocuSign same day. Collect EMD commitment. Move forward as normal through TC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHour 24-48:\u003c/strong\u003e If no backup buyer converts, immediately relaunch the deal. Re-send to the full buyer list with a \"BACK ON MARKET\" tag. Post on InvestorLift with the same flag. The goal is to have a new buyer under contract within 48 hours of fallout.\u003c/p\u003e\u003ch2\u003ePrevention\u003c/h2\u003e\u003cp\u003eThe best fallout strategy is preventing fallout in the first place. Prioritize buyers with non-refundable EMD, short inspection periods, and cash funding. Every extra contingency a buyer has is another exit door they can walk through. The Offer Scoring Matrix exists to weight certainty heavily for exactly this reason.\u003c/p\u003e"}]},{"id":"tc","label":"Transaction Coordination","color":"#7C3AED","pages":[{"id":"tc-ghl-management","title":"Transaction Management in GHL","dept":"Transaction Coordination","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eWhen a Deal Enters TC\u003c/h2\u003e\u003cp\u003eA deal enters TC when an A-B contract is signed. The opportunity card should already have the A-B contract, comp link, and all pricing fields from Acquisitions. TC then manages the deal through closing.\u003c/p\u003e\u003ch2\u003eSlack Communication\u003c/h2\u003e\u003cp\u003eAll TC updates must be posted in \u003cstrong\u003e#transactions\u003c/strong\u003e on Slack. This includes: new deals entering TC, closing date changes, title issues, document requests, EMD status updates, and settlement confirmations. Tag the relevant team members on every post. Do not rely on GHL notifications alone — the team reads Slack faster than they check GHL dashboards.\u003c/p\u003e\u003cp\u003eWhen a deal has an issue (title problem, seller delay, buyer backing out), post immediately in #transactions with a red flag: \u0026quot;\u0026#9888;\u0026#65039; [Address] — [Issue]. [What you need / what\u0026#39;s happening next].\u0026quot;\u003c/p\u003e\u003ch2\u003eRequired Opportunity Fields\u003c/h2\u003e\u003cp\u003eThese fields must be populated on every TC opportunity card:\u003c/p\u003e\u003ch3\u003eOpportunity Screen\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003ePipeline:\u003c/strong\u003e Transaction Coordination\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStatus:\u003c/strong\u003e Current stage (New Deal!, Marketing Phase 1, B-C Assigned, etc.)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOpportunity Value:\u003c/strong\u003e B-C price minus A-B price (this is the assignment fee / gross spread)\u003c/p\u003e\u003ch3\u003eA-B Contract Fields\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eA-B Date Signed\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA-B Contracted Price\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA-B Closing Date\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA-B Inspection Deadline\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA-B EMD\u003c/strong\u003e\u003c/p\u003e\u003ch3\u003eB-C Contract Fields\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eB-C Date Signed\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB-C Assignment Sales Price\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB-C EMD\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB-C EMD Status\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDate B-C EMD Received by Title\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClosing Confirmed Date B-C\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB-C Contract Upload\u003c/strong\u003e — upload the signed B-C contract file\u003c/p\u003e\u003ch3\u003eTransaction Checklist A-B\u003c/h3\u003e\u003cp\u003eEach of these items is a checkbox on the opportunity card. Complete them in order per the TC Closing Process SOP:\u003c/p\u003e\u003cp\u003e\u0026#9744; File sent to title company\u003c/p\u003e\u003cp\u003e\u0026#9744; All Opportunity Fields Completed\u003c/p\u003e\u003cp\u003e\u0026#9744; Call Seller + Set Expectations\u003c/p\u003e\u003cp\u003e\u0026#9744; Send Contract to Title + Notify of Timeline + File Notes\u003c/p\u003e\u003cp\u003e\u0026#9744; Preliminary Lien Info + Mortgage Payoff Received\u003c/p\u003e\u003cp\u003e\u0026#9744; Signed B-C\u003c/p\u003e\u003ch3\u003eTransaction Checklist B-C\u003c/h3\u003e\u003cp\u003e\u0026#9744; After 24 Hours Confirm EMD is Received\u003c/p\u003e\u003cp\u003e\u0026#9744; Call Buyer + Set the Stage + Expectations\u003c/p\u003e\u003cp\u003e\u0026#9744; Check in w/ Title Re: Buyer Financing Updates\u003c/p\u003e\u003cp\u003e\u0026#9744; Confirm w/ Title Lien Sheet/Payoff Info Received\u003c/p\u003e\u003cp\u003e\u0026#9744; Closing Scheduled w/ Seller\u003c/p\u003e\u003cp\u003e\u0026#9744; Closing Scheduled w/ Buyer\u003c/p\u003e\u003cp\u003e\u0026#9744; Upload HUD to Files\u003c/p\u003e\u003ch3\u003eClosing \u0026amp; Financial Fields\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eClosing Status\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGross Profit\u003c/strong\u003e — Fill in AFTER closing from the HUD\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJV Fee\u003c/strong\u003e (if applicable)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWholesale Fee\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNotes or Issues on Closing\u003c/strong\u003e\u003c/p\u003e\u003ch3\u003eAdditional Required Fields\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eSPA Seller Name\u003c/strong\u003e — seller name, other occupants, seller forwarding address, any relevant notes from the file\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFile Updates\u003c/strong\u003e — All updates on the file go here as running notes\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOccupancy Info\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLockbox Code\u003c/strong\u003e (if applicable)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRelevant File Info\u003c/strong\u003e — any additional notes or context about the transaction\u003c/p\u003e"},{"id":"closing-process","title":"TC Closing Process — Full Checklist","dept":"Transaction Coordination","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eOverview\u003c/h2\u003e\u003cp\u003eThis is the step-by-step process from the moment an A-B contract is received through settlement. Each step has a target day (counted from contract signing). Follow this checklist on every deal — no exceptions.\u003c/p\u003e\u003ch2\u003eStep 1 — A-B Contract Received (Day 1)\u003c/h2\u003e\u003cp\u003eContract is signed. File enters the TC pipeline at \u0026quot;New Deal!\u0026quot; stage. Confirm the contract is fully executed and uploaded to GHL.\u003c/p\u003e\u003ch2\u003eStep 2 — File Sent to Title Company (Day 1)\u003c/h2\u003e\u003cp\u003eSend the A-B contract to the assigned title company within 24 hours. Request title search and confirm they have everything needed to open the file.\u003c/p\u003e\u003ch2\u003eStep 3 — Dispositions File Completed (Day 1)\u003c/h2\u003e\u003cp\u003eConfirm the deal card in GHL has all required fields filled: property details, ARV, comp link, repair estimate, photos, listing copy. If anything is missing, send it back to Acquisitions.\u003c/p\u003e\u003ch2\u003eStep 4 — Call Seller, Introduce Yourself (Day 1)\u003c/h2\u003e\u003cp\u003eCall the seller to introduce yourself as their point of contact through closing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e12-Second Intro:\u003c/strong\u003e \u0026quot;I\u0026#39;m calling to introduce myself as your next point of contact, all the way through our settlement/closing.\u0026quot;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSeller Info Sheet:\u003c/strong\u003e Do we have it? If no, send it and ask the seller to complete it. If yes, verify all fields are filled. Any missing fields from the appointment need to be asked about and filled in.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOccupancy:\u003c/strong\u003e If occupied/rented, ask: \u0026quot;Have you informed the tenants that we\u0026#39;ll need access 1-2 times before we purchase?\u0026quot; If vacant, confirm lockbox/access details.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSet the Table:\u003c/strong\u003e Explain the timeline, what happens next (title search, inspection, closing), and set expectations on communication cadence.\u003c/p\u003e\u003ch3\u003eScheduling the Inspection\u003c/h3\u003e\u003cp\u003eInspections should be scheduled within 7 days of contract signing. For occupied properties, coordinate with the seller:\u003c/p\u003e\u003cp\u003e\u003cem\u003e\u0026quot;I hope you\u0026#39;re doing well. I wanted to reach out about scheduling the property inspection — we typically conduct inspections within 7 days after the contract has been signed. Having the inspection early gives both parties enough time to address anything that comes up.\u0026quot;\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eScheduling rules:\u003c/strong\u003e Book 72 hours after signing. Tuesday through Thursday only. Earliest slot: 12-1 PM. Latest: 4-5 PM. Do not book back-to-back inspections.\u003c/p\u003e\u003cp\u003eIf the property is vacant with a lockbox (FPS), no seller coordination needed — schedule the inspection directly.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOngoing until received:\u003c/strong\u003e Check daily with both title and seller until the seller information sheet is received (target: within 48 hours). Follow up with title for the lien sheet (1-2 weeks turnaround). Add initial title comments and any items required for closing to the deal file and notify the seller.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFollow-up script for title:\u003c/strong\u003e \u003cem\u003e\u0026quot;Good morning, I hope you are doing well. I want to ensure that you have everything you need for us to move forward. If there are any steps we need to take to expedite the process, please do not hesitate to let us know.\u0026quot;\u003c/em\u003e\u003c/p\u003e\u003ch2\u003eStep 5 — Forward All Documents to Title (Day 1-2)\u003c/h2\u003e\u003cp\u003eConfirm that title has everything they need to process the file. Confirm the target closing date with title: \u0026quot;We want to close on [date] and/or can close ASAP.\u0026quot;\u003c/p\u003e\u003ch2\u003eStep 6 — Check for Preliminary Lien Sheet (Day 7)\u003c/h2\u003e\u003cp\u003eFollow up with title: \u0026quot;Do you have the preliminary lien sheet or mortgage info back yet?\u0026quot;\u003c/p\u003e\u003ch2\u003eStep 7 — Check Dispo Status (Day 7)\u003c/h2\u003e\u003cp\u003eCheck with Dispositions: Do we have a buyer? What stage is the deal in?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePre-Marketing:\u003c/strong\u003e No buyer yet — deal is being packaged.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarketing Phase 1:\u003c/strong\u003e No buyer yet — sent to VIP list.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarketing Phase 2:\u003c/strong\u003e No buyer yet — sent to full database.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAssigned:\u003c/strong\u003e Buyer located.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImpact Buying:\u003c/strong\u003e We are purchasing directly.\u003c/p\u003e\u003ch3\u003eScreening Buyer Offers\u003c/h3\u003e\u003cp\u003eWhen offers come in, screen them: Cash or Hard Money? If hard money — have they worked with this lender before? How many deals have they closed with them? Are they approved for 100% of the property? Do they need inspection or appraisal?\u003c/p\u003e\u003ch2\u003eStep 8 — EMD Verification (Day 7)\u003c/h2\u003e\u003cp\u003eIf B-C is signed, has the buyer\u0026#39;s EMD been received by title/escrow? Confirm buyer has sent, then email title to verify receipt.\u003c/p\u003e\u003ch2\u003eStep 9 — Introduce Yourself to the Buyer (Day 7)\u003c/h2\u003e\u003cp\u003eCall the buyer to set expectations: \u0026quot;I want to make sure you have a 5-star experience with Impact Home Team.\u0026quot; Cover: timeline, closing process, what you need from them, and who to contact with questions.\u003c/p\u003e\u003ch2\u003eStep 10 — Buyer Lender Requirements (Day 8)\u003c/h2\u003e\u003cp\u003eAsk title: \u0026quot;Have you spoken to the buyer\u0026#39;s lender and received their requirements? Do you know how many days they need to fund and close after ALTA is approved?\u0026quot; If title hasn\u0026#39;t received lender info, ask: \u0026quot;Do you have the buyer\u0026#39;s lender contact information?\u0026quot;\u003c/p\u003e\u003ch2\u003eStep 11 — Title \u0026amp; Lien Clearance Check (Day 10-14)\u003c/h2\u003e\u003cp\u003eFollow up with title: \u0026quot;Do you have lien and title back on this one? Are we looking good to close on time or early?\u0026quot; Verify: Clear on liens? Clear on title? Clear to close?\u003c/p\u003e\u003ch2\u003eStep 12 — Preliminary ALTA Request (Day 10-14)\u003c/h2\u003e\u003cp\u003eAsk title: \u0026quot;Are we clear to close? Can you send us a preliminary ALTA ASAP?\u0026quot; Review the ALTA for accuracy — verify all numbers match contracts.\u003c/p\u003e\u003ch2\u003eStep 13 — Closing Scheduling (Day 10-14)\u003c/h2\u003e\u003cp\u003eConfirm: \u0026quot;Is the closing now scheduled with the buyer and seller?\u0026quot; All three parties must confirm date and time.\u003c/p\u003e\u003ch2\u003eStep 14 — Seller Ready Check\u003c/h2\u003e\u003cp\u003e\u0026quot;Hey [Seller], are you ready to close this week?\u0026quot; Confirm they have ID, know the location, and understand the timeline.\u003c/p\u003e\u003ch2\u003eStep 15 — Buyer Ready Check\u003c/h2\u003e\u003cp\u003e\u0026quot;Hey [Buyer], are you ready to close this week?\u0026quot; Confirm funding is ready, lender (if applicable) has approved, and they can attend.\u003c/p\u003e\u003ch2\u003ePost-Closing\u003c/h2\u003e\u003cp\u003eOnce settled, execute the 9-step post-closing checklist: confirm funds disbursed, upload HUD, upload closing docs, send review request, enter Settled Date, Gross Profit, Net Profit, add final note, and move to Settled. Post in \u003cstrong\u003e#transactions\u003c/strong\u003e on Slack.\u003c/p\u003e"},{"id":"probate-deals","title":"Probate \u0026 Inheritance Deals","dept":"Transaction Coordination","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eKey Considerations\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003ePersonal Representative:\u003c/strong\u003e Only court-appointed PR can sign. Verify Letters of Administration.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCourt Approval:\u003c/strong\u003e Some jurisdictions require it. Check with title company early.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTimeline:\u003c/strong\u003e Add 2-4 weeks to standard closing timeline.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMultiple Heirs:\u003c/strong\u003e All may need to consent. Get clarity upfront.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTitle Issues:\u003c/strong\u003e Run title early and budget for potential costs.\u003c/p\u003e"},{"id":"title-company","title":"Title Company \u0026 File Opening","dept":"Transaction Coordination","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003ePrimary Title Companies\u003c/h2\u003e\u003cp\u003eWe work with a short list of title companies who understand wholesale/assignment transactions. Not all title companies will handle double closings or assignments — use only approved companies unless Ashley approves an exception.\u003c/p\u003e\u003cp\u003eThe current approved title company list and contact info is maintained in the GHL \"Title Companies\" custom field dropdown. If a new title company needs to be added, Ashley must vet them first.\u003c/p\u003e\u003ch2\u003eHow to Open a Title File\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eStep 1:\u003c/strong\u003e Send the A-B contract to the title company within 24 hours of signing. Email it to your assigned contact with subject line: \"New File — [Property Address].\"\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 2:\u003c/strong\u003e Include in the email: fully executed A-B contract, seller name and contact info, buyer entity name (Impact Home Team LLC or applicable entity), target closing date, and any known title concerns (probate, liens, tax delinquency).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 3:\u003c/strong\u003e Request title search immediately. Standard turnaround is 5-7 business days. For tight timelines, request a rush and note it in the email.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 4:\u003c/strong\u003e Log in GHL: title company name, file number (when received), and date file was opened.\u003c/p\u003e\u003ch2\u003eTitle Issues\u003c/h2\u003e\u003cp\u003eWhen the title search comes back, review it immediately. Common issues:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLiens:\u003c/strong\u003e Tax liens, judgment liens, mechanic\u0027s liens. Determine the amount and whether the seller is willing/able to clear them at closing. Small liens can often be paid from proceeds.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUnpaid taxes:\u003c/strong\u003e Property tax delinquency. Title company can typically pay from closing proceeds. Get the exact payoff amount.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOwnership disputes:\u003c/strong\u003e Name on title doesn\u0027t match seller, or multiple owners. Verify with SDAT and get all parties to sign or provide authorization.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEstate/probate:\u003c/strong\u003e See the Probate \u0026 Inheritance Deals SOP for the full process.\u003c/p\u003e\u003cp\u003eIf title comes back with issues that could delay or kill the deal, post immediately in \u003cstrong\u003e#transactions\u003c/strong\u003e on Slack with the details and tag the acquisitions agent and Ashley.\u003c/p\u003e\u003ch2\u003eWhen to Switch Title Companies\u003c/h2\u003e\u003cp\u003eIf a title company is consistently slow (more than 7 business days for search), unresponsive (doesn\u0027t return calls within 24 hours), or unfamiliar with assignment/wholesale transactions, escalate to Ashley for reassignment.\u003c/p\u003e"},{"id":"emd-management","title":"EMD Management","dept":"Transaction Coordination","updated":"Mar 2026","owner":"Ashley","body":"\u003ch2\u003eWhat is EMD\u003c/h2\u003e\u003cp\u003eEarnest Money Deposit (EMD) is a good-faith deposit that demonstrates commitment to a real estate transaction. We deal with EMD on both sides: the deposit we put down with the seller (A-B EMD) and the deposit our buyer puts down with us (B-C EMD). Each has different rules.\u003c/p\u003e\u003ch2\u003eA-B EMD (Our Deposit to the Seller)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eStandard amount:\u003c/strong\u003e $100-500. We keep this low to minimize risk. The A-B contract specifies the exact amount.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhere it goes:\u003c/strong\u003e Delivered to the title company within 3 business days of contract execution. The title company holds it in escrow.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDelivery method:\u003c/strong\u003e Check or wire, per title company instructions. Keep a receipt or wire confirmation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGHL tracking:\u003c/strong\u003e Update the \"Seller EMD Status\" field on the opportunity card: \"Pending\" when contract is signed, \"Delivered\" when sent to title, \"In Escrow\" when title confirms receipt. Add the date delivered in notes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRefund/forfeiture:\u003c/strong\u003e If we exercise our inspection contingency and walk away, EMD is refundable. If we default outside of contingency, the seller may keep the EMD. Always exercise contingency in writing before the deadline.\u003c/p\u003e\u003ch2\u003eB-C EMD (Buyer\u0027s Deposit to Us)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eMinimum amount:\u003c/strong\u003e $2,000 or 2% of the B-C price, whichever is greater (per the Offer Intake SOP).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCollection timeline:\u003c/strong\u003e Buyer must deliver EMD within 48 hours of B-C contract execution. If EMD is not received within 48 hours, the deal is at risk — escalate immediately (see Backup Buyer Protocol).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhere it goes:\u003c/strong\u003e Buyer sends EMD directly to the title company. We do NOT hold buyer EMD ourselves. This protects us legally.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNon-refundable timeline:\u003c/strong\u003e Per the B-C contract, buyer EMD goes hard (non-refundable) after the agreed inspection period. Our preference is 3 business days or upon signing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGHL tracking:\u003c/strong\u003e Update the \"Buyer EMD Status\" field: \"Pending\" when B-C is sent, \"Received by Title\" when confirmed, \"Hard/Non-Refundable\" when the inspection period expires. Log all dates in notes.\u003c/p\u003e\u003ch2\u003eEMD Red Flags\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eBuyer asks to send EMD to us directly:\u003c/strong\u003e Decline. EMD always goes to title. This is non-negotiable.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBuyer asks for EMD extension:\u003c/strong\u003e One extension of 24 hours maximum, with a specific reason. If they need more time, they\u0027re not a serious buyer — activate backup.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBuyer\u0027s EMD check bounces:\u003c/strong\u003e Deal is dead immediately. Activate backup buyer protocol. Do not give a second chance on a bounced EMD.\u003c/p\u003e\u003ch2\u003eMonthly Reconciliation\u003c/h2\u003e\u003cp\u003eOn the 1st of each month, Ashley reconciles all open EMD positions: verify every active deal has the correct EMD status in GHL, confirm with title companies that all deposits are accounted for, and flag any EMD that has been \"Pending\" for more than 5 business days.\u003c/p\u003e"}]},{"id":"deal-lifecycle","label":"Deal Lifecycle","color":"#D97706","pages":[{"id":"pipeline-stages","title":"Pipeline Stages \u0026 Definitions","dept":"Deal Lifecycle","updated":"Mar 2026","owner":"Ashley / Joshua","body":"\u003ch2\u003ePipeline Architecture\u003c/h2\u003e\u003cp\u003eWe use 10 pipelines in GHL, each representing a different phase of the deal lifecycle or a specific function. Understanding which pipeline a lead belongs in — and when to move them — is critical.\u003c/p\u003e\u003ch2\u003ePipeline 1: Leads (10 stages)\u003c/h2\u003e\u003cp\u003eThis is where every new lead starts. Nicole owns this pipeline.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProspects:\u003c/strong\u003e New leads that have entered the system but have not been contacted yet.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRedzones:\u003c/strong\u003e High-priority leads with strong motivation or time urgency. These get called first, every time.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePriority Top 20%:\u003c/strong\u003e Leads that score in the top 20% based on motivation and deal potential. Call these after Redzones.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFollow Up:\u003c/strong\u003e Leads that have been contacted but need additional follow-up before qualifying.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNot MD Lead:\u003c/strong\u003e Leads that are outside our Maryland target markets. Tagged for potential referral or removal.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAI Follow Up Queue:\u003c/strong\u003e Leads being worked by the AI assistant for initial outreach and qualification.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAI - Review:\u003c/strong\u003e Leads the AI has flagged for human review — needs a real person to evaluate the conversation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAI - Appointment Booked:\u003c/strong\u003e The AI has booked an appointment. Lead manager must verify and confirm.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAI - Return to Queue:\u003c/strong\u003e AI was unable to qualify or engage. Returns to the manual calling queue.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAI - DNC:\u003c/strong\u003e Contact requested DNC through AI interaction. Automatically tagged and removed from outreach.\u003c/p\u003e\u003ch2\u003ePipeline 2: Mike the Closer (4 stages)\u003c/h2\u003e\u003cp\u003eMike\u0026#39;s acquisitions pipeline. When Nicole books an appointment for Mike, the lead moves HERE — not to the main Leads pipeline.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAppointment Scheduled:\u003c/strong\u003e Appointment is booked and confirmed. Mike reviews the lead card and preps.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOffer Made/Followup:\u003c/strong\u003e Mike has met the seller and presented an offer. Awaiting response or in negotiation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1 YD LINE:\u003c/strong\u003e Deal is very close — seller is nearly committed. One more conversation or minor concession away from signing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLost Offer:\u003c/strong\u003e Seller rejected the offer or went with another buyer. Log the reason in notes.\u003c/p\u003e\u003ch2\u003ePipeline 3: Josh The Closer (8 stages)\u003c/h2\u003e\u003cp\u003eJoshua\u0026#39;s acquisitions pipeline. Same concept as Mike\u0026#39;s but with more granular stages for Joshua\u0026#39;s workflow. When Nicole books for Joshua, the lead moves here.\u003c/p\u003e\u003ch2\u003ePipeline 4: Offer Followup (4 stages)\u003c/h2\u003e\u003cp\u003eDeals where an offer has been made but no contract signed. Used for systematic follow-up on pending offers across both closers.\u003c/p\u003e\u003ch2\u003ePipeline 5: Transaction Coordination (15 stages)\u003c/h2\u003e\u003cp\u003eThis is the TC pipeline — the largest and most critical. Deals enter here after a contract is signed. Ashley owns this pipeline.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNew Deal!:\u003c/strong\u003e A-B contract just signed. File needs to be sent to title company.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePre-Marketing/New File Received:\u003c/strong\u003e Title file opened, seller info sheet sent/collected, inspection being scheduled.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarketing Phase 1 (VIP):\u003c/strong\u003e Deal is packaged and sent to Tier 1 VIP buyers only.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarketing Phase 2 (All Buyers + New Buyers):\u003c/strong\u003e Expanded to full buyer database via Mailchimp, InvestorLift, etc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarketing Phase 3 (Retrade on Price, Refresh Listing):\u003c/strong\u003e Deal has not moved. Price adjustment or listing refresh being considered.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReady for DocuSign \u0026gt; B-C Contract:\u003c/strong\u003e Buyer identified, terms agreed, B-C contract being prepared for signature.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB-C Assigned:\u003c/strong\u003e B-C contract signed. Buyer and seller are both under contract. EMD being collected.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExtension Needed:\u003c/strong\u003e Closing deadline needs to be extended. Addendum required from one or both parties.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClosing Scheduled:\u003c/strong\u003e Closing date confirmed with title, seller, and buyer. All clear to close.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAT RISK (Title or Closing Issue):\u003c/strong\u003e Red flag — deal has a problem. Title issue, buyer backing out, seller delay, or other blocker. Post in #transactions immediately.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClosed - Dispo Complete:\u003c/strong\u003e Both sides closed. Funds disbursed. Post-closing checklist in progress.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIMPACT Buying (sends deal to our properties):\u003c/strong\u003e Impact Home Team is purchasing this property directly (not assigning). Different closing process applies.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActive Short Sale:\u003c/strong\u003e Property is in short sale proceedings. Extended timeline, bank approval required.\u003c/p\u003e\u003ch2\u003ePipeline 6: Dispo - Buyer Marketing (11 stages)\u003c/h2\u003e\u003cp\u003eBuyer-side pipeline tracking investor interest and buyer activity on active deals.\u003c/p\u003e\u003ch2\u003ePipeline 7: Deals (4 stages)\u003c/h2\u003e\u003cp\u003eHigh-level deal tracking for closed/settled deals and their financial outcomes.\u003c/p\u003e\u003ch2\u003ePipeline 8: Wholesalers (4 stages)\u003c/h2\u003e\u003cp\u003eTracking deals sourced from other wholesalers where we act as the buyer.\u003c/p\u003e\u003ch2\u003ePipeline 9: Dead/No Opportunity (6 stages)\u003c/h2\u003e\u003cp\u003eCategorized dead leads. Separated by reason for reporting and potential recycling.\u003c/p\u003e\u003ch2\u003ePipeline 10: Objection Proof (5 stages)\u003c/h2\u003e\u003cp\u003eTraining pipeline for objection handling practice and role-play tracking.\u003c/p\u003e\u003ch2\u003eCritical Rule: Pipeline Movement on Appointment Booking\u003c/h2\u003e\u003cp\u003eWhen Nicole books an appointment, she must move the lead from the Leads pipeline to the correct closer\u0026#39;s pipeline:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIf assigned to Mike:\u003c/strong\u003e Move to \u0026quot;2) Mike the Closer\u0026quot; pipeline, \u0026quot;Appointment Scheduled\u0026quot; stage.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIf assigned to Joshua:\u003c/strong\u003e Move to \u0026quot;3) Josh The Closer\u0026quot; pipeline, equivalent appointment stage.\u003c/p\u003e\u003cp\u003eDo NOT leave the lead in the Leads pipeline after booking. The closer needs to see the appointment in their own pipeline to prep. If the lead stays in Leads, the closer may not see it and the appointment gets missed.\u003c/p\u003e"},{"id":"handoff-triggers","title":"Department Handoff Triggers","dept":"Deal Lifecycle","updated":"Mar 2026","owner":"Ashley / Joshua","body":"\u003ch2\u003eLead Management \u0026#8594; Acquisitions (Closer\u0026#39;s Pipeline)\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eTrigger:\u003c/strong\u003e Appointment booked and confirmed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRequired before handoff:\u003c/strong\u003e 4 Pillars fields filled, lead source tagged, property address verified in GHL, appointment logged in the calendar with property address in title.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePipeline movement:\u003c/strong\u003e Nicole moves the opportunity from \u0026quot;1) Leads\u0026quot; to the assigned closer\u0026#39;s pipeline:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIf assigned to Mike:\u003c/strong\u003e Move to \u0026quot;2) Mike the Closer\u0026quot; \u0026#8594; \u0026quot;Appointment Scheduled\u0026quot; stage.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIf assigned to Joshua:\u003c/strong\u003e Move to \u0026quot;3) Josh The Closer\u0026quot; \u0026#8594; appointment stage.\u003c/p\u003e\u003cp\u003ePost in \u003cstrong\u003e#impact-lead-management\u003c/strong\u003e on Slack: \u0026quot;Booked: [Address] — [Date/Time] — [In-Person/Virtual] — moved to [Mike/Josh]\u0026#39;s pipeline.\u0026quot; Tag the closer.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCritical:\u003c/strong\u003e Do NOT leave the lead in the Leads pipeline after bo
